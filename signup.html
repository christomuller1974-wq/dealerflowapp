<!DOCTYPE html>
<html>
<head>
  <title>Dealer Signup - DealerFlow</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
    }

    .wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: white;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 10px;
      font-size: 28px;
    }

    p {
      color: #475569;
      line-height: 1.5;
      margin-bottom: 16px;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 15px;
      background: white;
      margin-bottom: 12px;
    }

    button {
      width: 100%;
      background: #2f55c7;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px 16px;
      font-weight: bold;
      cursor: pointer;
      font-size: 15px;
    }

    .status {
      margin-top: 14px;
      padding: 12px;
      border-radius: 8px;
      font-weight: bold;
      background: #e2e8f0;
      color: #111827;
      min-height: 20px;
      line-height: 1.4;
    }

    .links {
      margin-top: 16px;
      text-align: center;
    }

    .links a {
      color: #2f55c7;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="wrap">
    <div class="card">
      <h1>Dealer Signup</h1>
      <p>Create your DealerFlow account and dealer profile.</p>

      <form id="signupForm">
        <input type="text" id="dealer_name" placeholder="Dealer / Business Name" required>
        <input type="text" id="phone" placeholder="Phone Number" required>
        <input type="email" id="email" placeholder="Email address" required>
        <input type="password" id="password" placeholder="Create password (min 6 characters)" required>
        <button type="submit" id="signupButton">Create Account</button>
      </form>

      <div id="status" class="status">Ready</div>

      <div class="links">
        Already have an account?
        <a href="login.html">Login here</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseUrl = "https://ddmvzypiccryjndcwlre.supabase.co";
    const supabaseKey = "sb_publishable_D7saHOTE_JhSlMnSgBnIhQ_mOAOUD9s";
    const client = window.supabase.createClient(supabaseUrl, supabaseKey);

    const form = document.getElementById("signupForm");
    const statusBox = document.getElementById("status");
    const signupButton = document.getElementById("signupButton");

    form.addEventListener("submit", async function(event) {
      event.preventDefault();

      const dealerName = document.getElementById("dealer_name").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!dealerName || !phone || !email || !password) {
        statusBox.textContent = "Please complete all fields.";
        return;
      }

      if (password.length < 6) {
        statusBox.textContent = "Password must be at least 6 characters.";
        return;
      }

      signupButton.disabled = true;
      signupButton.textContent = "Creating account...";
      statusBox.textContent = "Creating account...";

      try {
        const { data, error } = await client.auth.signUp({
          email: email,
          password: password
        });

        if (error) {
          console.log("Signup error:", error);
          statusBox.textContent = "Signup failed: " + error.message;
          signupButton.disabled = false;
          signupButton.textContent = "Create Account";
          return;
        }

        if (!data.user) {
          statusBox.textContent = "Account created, but user data not returned.";
          signupButton.disabled = false;
          signupButton.textContent = "Create Account";
          return;
        }

        const userId = data.user.id;

        const { error: profileError } = await client
          .from("profiles")
          .upsert([{
            id: userId,
            dealer_name: dealerName,
            phone: phone
          }]);

        if (profileError) {
          console.log("Profile error:", profileError);
          statusBox.textContent = "Account created, but profile save failed: " + profileError.message;
          signupButton.disabled = false;
          signupButton.textContent = "Create Account";
          return;
        }

        statusBox.textContent = "Account and profile created successfully. You can now log in.";
        form.reset();

      } catch (err) {
        console.log("Unexpected signup error:", err);
        statusBox.textContent = "Something went wrong: " + err.message;
      }

      signupButton.disabled = false;
      signupButton.textContent = "Create Account";
    });
  </script>

</body>
</html>
