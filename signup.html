<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Create Dealer Account - DealerFlow</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      min-height: 100vh;
    }

    .hero {
      background: linear-gradient(135deg, #3156c7, #1f3f9e);
      color: white;
      padding: 28px 20px;
      text-align: center;
    }

    .hero h1 {
      margin: 0 0 8px 0;
      font-size: 36px;
    }

    .hero p {
      margin: 0;
      font-size: 16px;
    }

    .container {
      max-width: 560px;
      margin: 0 auto;
      padding: 20px;
    }

    .top-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 16px;
      justify-content: center;
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      text-align: center;
      font-weight: 700;
      font-size: 12px;
      padding: 10px 14px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      color: white;
    }

    .btn-dark { background: #020617; }
    .btn-blue { background: #1d4ed8; }

    .status {
      background: rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 16px;
      font-weight: bold;
      font-size: 14px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .card {
      background: rgba(255,255,255,0.06);
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.22);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .card h2 {
      margin-top: 0;
      margin-bottom: 18px;
      font-size: 30px;
      color: #f8fafc;
    }

    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-size: 13px;
      font-weight: bold;
      color: #cbd5e1;
      margin-bottom: 6px;
    }

    .field input,
    .field select {
      width: 100%;
      box-sizing: border-box;
      padding: 14px;
      border: 1px solid #475569;
      border-radius: 14px;
      background: rgba(255,255,255,0.04);
      font-size: 15px;
      font-family: Arial, sans-serif;
      color: #f8fafc;
      outline: none;
    }

    .field input::placeholder {
      color: #94a3b8;
    }

    .field select {
      appearance: none;
    }

    .submit-btn {
      background: #1e40af;
      width: 100%;
      font-size: 14px;
      padding: 14px;
      border-radius: 14px;
      border: none;
      color: white;
      font-weight: 800;
      cursor: pointer;
    }

    .submit-btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .muted {
      color: #cbd5e1;
      font-size: 14px;
      line-height: 1.5;
      margin-top: 16px;
    }

    .muted a {
      color: #60a5fa;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="hero">
    <h1>Create Account</h1>
    <p>Register your dealership to start listing vehicles</p>
  </div>

  <div class="container">
    <div class="top-actions">
      <a href="index.html" class="btn btn-dark">Back to Website</a>
      <a href="login.html" class="btn btn-blue">Login</a>
    </div>

    <div id="status" class="status">Fill in your details to create an account.</div>

    <div class="card">
      <h2>Dealer Registration</h2>

      <div class="field">
        <label for="dealer">Dealer Name</label>
        <input type="text" id="dealer" placeholder="Dealer name">
      </div>

      <div class="field">
        <label for="phone">Phone</label>
        <input type="text" id="phone" placeholder="Phone number">
      </div>

      <div class="field">
        <label for="province">Province</label>
        <select id="province">
          <option value="">Select province</option>
          <option value="Gauteng">Gauteng</option>
          <option value="Western Cape">Western Cape</option>
          <option value="KwaZulu-Natal">KwaZulu-Natal</option>
          <option value="Eastern Cape">Eastern Cape</option>
          <option value="Free State">Free State</option>
          <option value="Limpopo">Limpopo</option>
          <option value="Mpumalanga">Mpumalanga</option>
          <option value="North West">North West</option>
          <option value="Northern Cape">Northern Cape</option>
        </select>
      </div>

      <div class="field">
        <label for="town">Town / City</label>
        <input type="text" id="town" placeholder="e.g. Kimberley">
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Email address">
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Password">
      </div>

      <button class="submit-btn" onclick="signupDealer()" id="signupBtn">
        Create Account
      </button>

      <div class="muted">
        Already registered?
        <a href="login.html">Login here</a>.
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseUrl = "https://ddmvzypiccryjndcwlre.supabase.co";
    const supabaseKey = "sb_publishable_D7saHOTE_JhSlMnSgBnIhQ_mOAOUD9s";
    const client = window.supabase.createClient(supabaseUrl, supabaseKey);

    function setStatus(msg) {
      document.getElementById("status").textContent = msg;
      console.log(msg);
    }

    function setBusy(isBusy) {
      const btn = document.getElementById("signupBtn");
      btn.disabled = isBusy;
      btn.textContent = isBusy ? "Creating account..." : "Create Account";
    }

    async function signupDealer() {
      const dealer = document.getElementById("dealer").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const province = document.getElementById("province").value.trim();
      const town = document.getElementById("town").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      if (!dealer || !phone || !province || !town || !email || !password) {
        setStatus("Please fill in all fields.");
        return;
      }

      const location = [town, province].filter(Boolean).join(", ");

      try {
        setBusy(true);
        setStatus("Creating account...");

        const { data, error } = await client.auth.signUp({
          email,
          password
        });

        if (error) {
          if (error.message && error.message.toLowerCase().includes("already registered")) {
            setStatus("Account already exists. Please login instead.");
          } else {
            setStatus("Signup failed: " + error.message);
          }
          setBusy(false);
          return;
        }

        const user = data.user;

        if (!user) {
          setStatus("Signup failed: user not created.");
          setBusy(false);
          return;
        }

        setStatus("Creating dealer profile...");

        const profilePayload = {
          id: user.id,
          dealer_name: dealer,
          phone: phone,
          province: province,
          town: town,
          location: location,
          is_active: false
        };

        const { error: profileError } = await client
          .from("profiles")
          .upsert([profilePayload], { onConflict: "id" });

        if (profileError) {
          console.log(profileError);
          setStatus("Profile error: " + profileError.message);
          setBusy(false);
          return;
        }

        setStatus("Account created. Awaiting activation.");

        setTimeout(() => {
          window.location.href = "login.html";
        }, 1500);

      } catch (err) {
        console.log(err);
        setStatus("Something went wrong.");
        setBusy(false);
      }
    }
  </script>

</body>
</html>
