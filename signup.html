<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dealer Registration</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
* { box-sizing:border-box; }

body {
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#1e3a8a,#2563eb);
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:100vh;
}

.card {
  width:100%;
  max-width:420px;
  background:rgba(17,24,39,0.95);
  padding:28px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
  color:white;
}

h1 {
  margin:0 0 18px;
  font-size:32px;
  font-weight:900;
}

label {
  display:block;
  margin-top:12px;
  font-weight:700;
  font-size:14px;
}

input, select {
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  margin-top:6px;
  font-size:15px;
  background:#1f2937;
  color:white;
}

input::placeholder {
  color:#9ca3af;
}

select {
  background:#1f2937;
}

button {
  width:100%;
  margin-top:18px;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#2563eb;
  color:white;
  font-size:16px;
  font-weight:900;
  cursor:pointer;
}

button:hover {
  background:#1d4ed8;
}

.status {
  margin-top:12px;
  font-size:14px;
  font-weight:bold;
}

.login-link {
  margin-top:14px;
  display:block;
  text-align:center;
  color:#9ca3af;
  font-size:14px;
}

.login-link a {
  color:#3b82f6;
  text-decoration:none;
  font-weight:bold;
}

</style>
</head>

<body>

<div class="card">
  <h1>Dealer Registration</h1>

  <label>Dealer Name</label>
  <input id="dealer" placeholder="Dealer name">

  <label>Phone</label>
  <input id="phone" placeholder="Phone number">

  <label>Province</label>
  <select id="province">
    <option value="">Select province</option>
    <option value="Gauteng">Gauteng</option>
    <option value="Western Cape">Western Cape</option>
    <option value="Eastern Cape">Eastern Cape</option>
    <option value="KwaZulu-Natal">KwaZulu-Natal</option>
    <option value="Free State">Free State</option>
    <option value="Limpopo">Limpopo</option>
    <option value="Mpumalanga">Mpumalanga</option>
    <option value="North West">North West</option>
    <option value="Northern Cape">Northern Cape</option>
  </select>

  <label>Email</label>
  <input id="email" placeholder="Email address">

  <label>Password</label>
  <input id="password" type="password" placeholder="Password">

  <button onclick="signup()">Create Account</button>

  <div id="status" class="status"></div>

  <div class="login-link">
    Already have an account? <a href="login.html">Login</a>
  </div>
</div>

<script>
const supabaseUrl = "https://ddmvzypiccryjndcwlre.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkbXZ6eXBpY2NyeWpuZGN3bHJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NTQ2NzYsImV4cCI6MjA5MTQzMDY3Nn0.mNkODdvX8gllTZeqfr7nllMWfF7ATdj9MY-EKEE3G6w";
const client = window.supabase.createClient(supabaseUrl, supabaseKey);

function setStatus(msg) {
  document.getElementById("status").innerText = msg;
}

async function signup() {
  const dealer = document.getElementById("dealer").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const province = document.getElementById("province").value;
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!dealer || !phone || !province || !email || !password) {
    setStatus("Please fill all fields");
    return;
  }

  setStatus("Creating account...");

  // create auth user
  const { data, error } = await client.auth.signUp({
    email: email,
    password: password
  });

  if (error) {
    console.log(error);
    setStatus(error.message);
    return;
  }

  const user = data.user;

  if (!user) {
    setStatus("Signup failed");
    return;
  }

  // insert profile
  const { error: profileError } = await client.from("profiles").insert({
    id: user.id,
    dealer_name: dealer,
    phone: phone,
    province: province,
    is_active: false
  });

  if (profileError) {
    console.log(profileError);
    setStatus("Account created but profile failed.");
    return;
  }

  setStatus("Account created! Waiting for approval...");

  setTimeout(() => {
    window.location.href = "login.html";
  }, 2000);
}
</script>

</body>
</html>
