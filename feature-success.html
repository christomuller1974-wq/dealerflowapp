<style>
body{
  font-family:Arial,sans-serif;

  color:#1d4ed8;

  color:#444;

  display:inline-block;

<body>

<div class="card">
  <h1>⭐ Featured Activated</h1>
  <p>Your vehicle is now featured for 7 days.</p>
  <a href="dealer-admin.html">Back to Dashboard</a>
</div>

<script>

const supabaseUrl = "https://ddmvzypiccryjndcwlre.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkbXZ6eXBpY2NyeWpuZGN3bHJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NTQ2NzYsImV4cCI6MjA5MTQzMDY3Nn0.mNkODdvX8gllTZeqfr7nllMWfF7ATdj9MY-EKEE3G6w";

const client = supabase.createClient(
  supabaseUrl,
  supabaseKey
);

async function activateFeatured(){

  const params = new URLSearchParams(window.location.search);

  const vehicleId = params.get("vehicle");

  if(!vehicleId) return;

  const expiry = new Date();

  expiry.setDate(expiry.getDate() + 7);

  await client
    .from("vehicles")
    .update({
      featured: true,
      featured_until: expiry.toISOString()
    })
    .eq("id", vehicleId);

}

activateFeatured();

</script>

</body>
