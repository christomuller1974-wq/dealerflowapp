<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CarScoutZA SEO Page Generator</title>

<style>
body{
font-family:Arial,sans-serif;
max-width:1000px;
margin:auto;
padding:30px;
line-height:1.6;
}

input,select,textarea,button{
width:100%;
padding:12px;
margin:8px 0 18px;
font-size:16px;
}

button{
background:#0056c9;
color:white;
border:0;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

textarea{
height:420px;
font-family:monospace;
}
</style>
</head>

<body>

<h1>CarScoutZA SEO Page Generator</h1>

<label>Vehicle Name</label>
<input id="vehicle" placeholder="Example: Toyota Hilux">

<label>City</label>
<input id="city" placeholder="Example: Bloemfontein">

<label>Province</label>
<input id="province" placeholder="Example: Free State">

<button onclick="generatePage()">Generate SEO Page</button>

<h2>File Name</h2>
<input id="filename" readonly>

<h2>Copy This Code</h2>
<textarea id="output" readonly></textarea>

<button onclick="copyCode()">Copy Code</button>

<script>
function slugify(text){
  return text
    .toLowerCase()
    .replace(/&/g,"and")
    .replace(/[^a-z0-9]+/g,"-")
    .replace(/^-+|-+$/g,"");
}

function generatePage(){
  const vehicle = document.getElementById("vehicle").value.trim();
  const city = document.getElementById("city").value.trim();
  const province = document.getElementById("province").value.trim();

  if(!vehicle || !city || !province){
    alert("Please enter vehicle, city and province.");
    return;
  }

  const fileName = slugify(vehicle) + "-for-sale-" + slugify(city) + ".html";
  const url = "https://carscoutza.com/" + fileName;

  const code = `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>${vehicle} for Sale in ${city} | CarScoutZA</title>

<meta name="description" content="Browse ${vehicle} vehicles for sale in ${city}. Find trusted dealerships, finance options and quality used vehicles on CarScoutZA.">

<meta name="keywords" content="${vehicle} for sale ${city}, used ${vehicle} ${city}, ${vehicle} for sale ${province}, ${vehicle} South Africa">

<link rel="canonical" href="${url}">

<style>
body{
font-family:Arial,sans-serif;
max-width:1000px;
margin:auto;
padding:40px;
line-height:1.8;
color:#333;
}

h1{
color:#0056c9;
}

h2{
margin-top:40px;
}

a{
color:#0056c9;
text-decoration:none;
font-weight:bold;
}

.button{
display:inline-block;
margin-top:30px;
padding:15px 30px;
background:#0056c9;
color:white;
border-radius:6px;
text-decoration:none;
}
</style>
</head>

<body>

<h1>${vehicle} for Sale in ${city}</h1>

<p>
Looking for a ${vehicle} for sale in ${city}? CarScoutZA helps buyers connect directly with trusted dealerships across ${province}. Browse quality used vehicles, compare options and contact dealers directly by phone or WhatsApp.
</p>

<h2>Why Buy Through CarScoutZA?</h2>

<ul>
<li>Trusted South African dealerships</li>
<li>Finance available</li>
<li>Trade-ins welcome</li>
<li>Quality used vehicles</li>
<li>Direct dealer contact</li>
<li>WhatsApp enquiries</li>
<li>No middlemen</li>
</ul>

<h2>Find ${vehicle} Deals in ${city}</h2>

<p>
CarScoutZA makes it simple to find ${vehicle} vehicles for sale in ${city}. Whether you are buying your first vehicle, upgrading your family car, or looking for a reliable work vehicle, CarScoutZA helps you connect with dealerships quickly and easily.
</p>

<h2>Browse More Vehicles</h2>

<p>
You can also browse other used cars, bakkies, SUVs and hatchbacks available from dealers across South Africa.
</p>

<a class="button" href="https://carscoutza.com">
Browse All Vehicles
</a>

</body>
</html>`;

  document.getElementById("filename").value = fileName;
  document.getElementById("output").value = code;
}

function copyCode(){
  const output = document.getElementById("output");
  output.select();
  document.execCommand("copy");
  alert("Code copied.");
}
</script>

</body>
</html>
