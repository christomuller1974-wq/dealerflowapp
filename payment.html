<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dealer Payment | CarScoutZA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#eef2f7;
  color:#111827;
}

.hero{
  background:linear-gradient(135deg,#111827,#1e3a8a,#2563eb);
  color:white;
  padding:45px 20px;
  text-align:center;
}

.hero h1{
  margin:0;
  font-size:40px;
  font-weight:900;
}

.container{
  max-width:850px;
  margin:0 auto;
  padding:22px;
}

.card{
  background:white;
  border-radius:22px;
  padding:28px;
  box-shadow:0 8px 24px rgba(0,0,0,0.12);
}

.price{
  font-size:56px;
  font-weight:900;
  color:#2563eb;
  margin:15px 0;
}

.price span{
  font-size:20px;
  color:#64748b;
}

.feature{
  background:#f8fafc;
  padding:14px;
  border-radius:14px;
  margin:10px 0;
  font-weight:800;
}

.pay-btn{
  width:100%;
  margin-top:24px;
  padding:18px;
  border:none;
  border-radius:16px;
  background:#16a34a;
  color:white;
  font-size:20px;
  font-weight:900;
  cursor:pointer;
}

.back{
  display:inline-block;
  margin-top:18px;
  background:#111827;
  color:white;
  text-decoration:none;
  padding:12px 16px;
  border-radius:12px;
  font-weight:900;
}
</style>
</head>

<body>

<div class="hero">
  <h1>Dealer Subscription</h1>
  <p>Activate your CarScoutZA dealer account</p>
</div>

<div class="container">
  <div class="card">

    <h2>Monthly Dealer Package</h2>

    <div class="price">
      R2000 <span>/ month</span>
    </div>

    <div class="feature">✅ Dealer dashboard access</div>
    <div class="feature">✅ Upload and manage vehicles</div>
    <div class="feature">✅ Dealer profile page</div>
    <div class="feature">✅ WhatsApp and call enquiries</div>
    <div class="feature">✅ Vehicle limit: 40 vehicles</div>

    <form action="https://www.payfast.co.za/eng/process" method="post">

      <input type="hidden" name="merchant_id" value="34937955">

      <input type="hidden" name="merchant_key" value="eeo8gbmdxxey2">

      <input type="hidden" name="return_url" value="https://carscoutza.com/dealer-admin.html">

      <input type="hidden" name="cancel_url" value="https://carscoutza.com/payment.html">

      <input type="hidden" name="amount" value="2000.00">

      <input type="hidden" name="item_name" value="CarScoutZA Monthly Dealer Subscription">

      <button type="submit" class="pay-btn">
        Pay R2000 Now
      </button>

    </form>

    <a href="dealer-admin.html" class="back">
      Back to Dashboard
    </a>

  </div>
</div>

</body>
</html>
