<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Edit Vehicle</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #e5e7eb;
      color: #111827;
    }

    .hero {
      background: #2f55c7;
      color: white;
      padding: 24px 20px;
      text-align: center;
    }

    .hero h1 {
      margin: 0 0 8px 0;
      font-size: 34px;
    }

    .hero p {
      margin: 0;
      font-size: 16px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 18px;
    }

    .top-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 14px;
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      text-align: center;
      font-weight: 600;
      font-size: 12px;
      padding: 8px 12px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      color: white;
    }

    .btn-blue { background: #3f5cc9; }
    .btn-dark { background: #1f2937; }
    .btn-red { background: #dc2626; }

    .card {
      background: #ffffff;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-bottom: 18px;
    }

    .status {
      background: #ffffff;
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      font-weight: bold;
      font-size: 14px;
    }

    .warning {
      background: #fff7ed;
      color: #9a3412;
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      font-weight: bold;
      font-size: 14px;
      display: none;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .field label {
      display: block;
      font-size: 13px;
      font-weight: bold;
      color: #334155;
      margin-bottom: 5px;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      background: white;
      font-size: 14px;
      font-family: Arial, sans-serif;
      color: #111827;
    }

    .field textarea {
      min-height: 100px;
      resize: vertical;
    }

    .preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 12px;
      margin-top: 14px;
    }

    .preview-card {
      background: #f8fafc;
      border-radius: 12px;
      padding: 10px;
      box-shadow: inset 0 0 0 1px #e5e7eb;
    }

    .preview-image-wrap {
      width: 100%;
      height: 120px;
      background: #eef2f7;
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 8px;
    }

    .preview-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #eef2f7;
      display: block;
    }

    .preview-label {
      font-size: 12px;
      color: #475569;
      text-align: center;
      word-break: break-word;
    }

    .submit-row {
      margin-top: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    @media (min-width: 768px) {
      .form-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .full-width {
        grid-column: 1 / -1;
      }
    }
  </style>
</head>
<body>

  <div class="hero">
    <h1>Edit Vehicle</h1>
    <p>Update your vehicle details and photos</p>
  </div>

  <div class="container">
    <div class="top-actions">
      <a href="dealer-admin.html" class="btn btn-dark">Back to Dashboard</a>
      <a href="index.html" class="btn btn-dark">Website</a>
      <button type="button" class="btn btn-dark" onclick="logoutUser()">Logout</button>
    </div>

    <div id="status" class="status">Starting edit page...</div>
    <div id="warningBox" class="warning"></div>

    <div class="card">
      <h2 style="margin-top:0;">Edit Vehicle</h2>

      <div class="form-grid">
        <div class="field full-width">
          <label for="photoInput">Replace Vehicle Photos (optional)</label>
          <input type="file" id="photoInput" accept="image/*" multiple onchange="handleFiles(event)">
        </div>

        <div class="field full-width">
          <label>Photo Preview</label>
          <div id="previewGrid" class="preview-grid">
            <div class="preview-card">Loading vehicle photos...</div>
          </div>
        </div>

        <div class="field full-width">
          <label for="title">Vehicle Title</label>
          <input type="text" id="title" placeholder="e.g. Nissan NP200 1.5 dci safety pack">
        </div>

        <div class="field">
          <label for="year">Select Year</label>
          <select id="year">
            <option value="">Select Year</option>
            <option>2026</option><option>2025</option><option>2024</option><option>2023</option>
            <option>2022</option><option>2021</option><option>2020</option><option>2019</option>
            <option>2018</option><option>2017</option><option>2016</option><option>2015</option>
            <option>2014</option><option>2013</option><option>2012</option><option>2011</option>
            <option>2010</option><option>2009</option><option>2008</option><option>2007</option>
            <option>2006</option><option>2005</option><option>2004</option><option>2003</option>
            <option>2002</option><option>2001</option><option>2000</option><option>1999</option>
            <option>1998</option><option>1997</option><option>1996</option><option>1995</option>
            <option>1994</option><option>1993</option><option>1992</option><option>1991</option>
            <option>1990</option><option>1989</option><option>1988</option><option>1987</option>
            <option>1986</option><option>1985</option><option>1984</option><option>1983</option>
            <option>1982</option><option>1981</option><option>1980</option>
          </select>
        </div>

        <div class="field">
          <label for="price">Price</label>
          <input type="number" id="price" placeholder="e.g. 169900">
        </div>

        <div class="field">
          <label for="mileage">Mileage</label>
          <input type="number" id="mileage" placeholder="e.g. 164000">
        </div>

        <div class="field">
          <label for="location">Location</label>
          <input type="text" id="location" placeholder="e.g. Kimberley">
        </div>

        <div class="field">
          <label for="dealer">Dealer Name</label>
          <input type="text" id="dealer" placeholder="Dealer name">
        </div>

        <div class="field">
          <label for="phone">Phone</label>
          <input type="text" id="phone" placeholder="e.g. 0825744526">
        </div>

        <div class="field full-width">
          <label for="description">Description</label>
          <textarea id="description" placeholder="Vehicle description"></textarea>
        </div>
      </div>

      <div class="submit-row">
        <button type="button" id="saveBtn" class="btn btn-blue" onclick="saveVehicle()">Save Changes</button>
        <button type="button" class="btn btn-red" onclick="deleteVehicle()">Delete Vehicle</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseUrl = "https://ddmvzypiccryjndcwlre.supabase.co";
    const supabaseKey = "sb_publishable_D7saHOTE_JhSlMnSgBnIhQ_mOAOUD9s";
    const client = window.supabase.createClient(supabaseUrl, supabaseKey);

    let currentUser = null;
    let currentProfile = null;
    let currentVehicle = null;
    let selectedFiles = [];

    function getVehicleId() {
      const params = new URLSearchParams(window.location.search);
      return params.get("id");
    }

    function setStatus(message) {
      document.getElementById("status").textContent = message;
      console.log(message);
    }

    function setWarning(message) {
      const box = document.getElementById("warningBox");
      if (!message) {
        box.style.display = "none";
        box.textContent = "";
      } else {
        box.style.display = "block";
        box.textContent = message;
      }
    }

    function setSaveBusy(isBusy) {
      const btn = document.getElementById("saveBtn");
      btn.disabled = isBusy;
      btn.textContent = isBusy ? "Saving..." : "Save Changes";
    }

    function showExistingPreview(imageUrls) {
      const grid = document.getElementById("previewGrid");
      grid.innerHTML = "";

      if (!imageUrls || imageUrls.length === 0) {
        grid.innerHTML = "<div class='preview-card'>No photos saved.</div>";
        return;
      }

      imageUrls.forEach((url, index) => {
        const card = document.createElement("div");
        card.className = "preview-card";
        card.innerHTML = `
          <div class="preview-image-wrap">
            <img src="${url}" class="preview-image" alt="Preview">
          </div>
          <div class="preview-label">${index === 0 ? "Main image" : "Extra image"}</div>
        `;
        grid.appendChild(card);
      });
    }

    function handleFiles(event) {
      selectedFiles = Array.from(event.target.files || []);
      const grid = document.getElementById("previewGrid");
      grid.innerHTML = "";

      if (selectedFiles.length === 0) {
        const oldImages = currentVehicle && currentVehicle.images
          ? currentVehicle.images.split(",").map(x => x.trim()).filter(Boolean)
          : (currentVehicle && currentVehicle.image ? [currentVehicle.image] : []);
        showExistingPreview(oldImages);
        return;
      }

      selectedFiles.forEach((file, index) => {
        const imageUrl = URL.createObjectURL(file);
        const card = document.createElement("div");
        card.className = "preview-card";
        card.innerHTML = `
          <div class="preview-image-wrap">
            <img src="${imageUrl}" class="preview-image" alt="Preview">
          </div>
          <div class="preview-label">${index === 0 ? "New main image" : "New extra image"}</div>
        `;
        grid.appendChild(card);
      });
    }

    async function logoutUser() {
      await client.auth.signOut();
      window.location.href = "login.html";
    }

    async function loadProfile(userId) {
      const { data, error } = await client
        .from("profiles")
        .select("*")
        .eq("id", userId)
        .single();

      if (error || !data) return false;
      currentProfile = data;
      return true;
    }

    async function loadVehicle() {
      const vehicleId = getVehicleId();

      if (!vehicleId) {
        setStatus("Vehicle ID missing.");
        return false;
      }

      const { data, error } = await client
        .from("vehicles")
        .select("*")
        .eq("id", vehicleId)
        .single();

      if (error || !data) {
        setStatus("Vehicle not found.");
        return false;
      }

      currentVehicle = data;

      document.getElementById("title").value = data.title || "";
      document.getElementById("year").value = data.year || "";
      document.getElementById("price").value = data.price || "";
      document.getElementById("mileage").value = data.mileage || "";
      document.getElementById("location").value = data.location || "";
      document.getElementById("dealer").value = data.dealer || "";
      document.getElementById("phone").value = data.phone || "";
      document.getElementById("description").value = data.description || "";

      const imageList = data.images
        ? data.images.split(",").map(x => x.trim()).filter(Boolean)
        : (data.image ? [data.image] : []);

      showExistingPreview(imageList);
      return true;
    }

    async function uploadSingleFile(file) {
      const ext = file.name.split(".").pop() || "jpg";
      const fileName = Date.now() + "-" + Math.random().toString(36).slice(2) + "." + ext;
      const filePath = "vehicles/" + fileName;

      const { error } = await client.storage
        .from("vehicle-images")
        .upload(filePath, file);

      if (error) throw error;

      const { data } = client.storage
        .from("vehicle-images")
        .getPublicUrl(filePath);

      return data.publicUrl;
    }

    async function saveVehicle() {
      if (!currentUser || !currentProfile || !currentVehicle) {
        setStatus("Vehicle not ready yet.");
        return;
      }

      const title = document.getElementById("title").value.trim();
      const year = document.getElementById("year").value.trim();
      const price = document.getElementById("price").value.trim();
      const mileage = document.getElementById("mileage").value.trim();
      const location = document.getElementById("location").value.trim();
      const dealer = document.getElementById("dealer").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const description = document.getElementById("description").value.trim();

      if (!title || !year || !price || !mileage || !location || !dealer || !phone) {
        setStatus("Please complete all required fields.");
        return;
      }

      try {
        setSaveBusy(true);

        let mainImage = currentVehicle.image || "";
        let allImages = currentVehicle.images || "";

        if (selectedFiles.length > 0) {
          setStatus("Uploading new photos...");

          const uploadedUrls = [];
          for (const file of selectedFiles) {
            const url = await uploadSingleFile(file);
            uploadedUrls.push(url);
          }

          mainImage = uploadedUrls[0] || "";
          allImages = uploadedUrls.join(",");
        }

        setStatus("Saving changes...");

        const { error } = await client
          .from("vehicles")
          .update({
            title: title,
            year: year,
            price: price,
            mileage: mileage,
            location: location,
            dealer: dealer,
            phone: phone,
            description: description,
            image: mainImage,
            images: allImages
          })
          .eq("id", currentVehicle.id)
          .eq("user_id", currentUser.id);

        if (error) {
          setStatus("Could not save changes: " + error.message);
          setSaveBusy(false);
          return;
        }

        setStatus("Vehicle updated successfully.");
        selectedFiles = [];
        await loadVehicle();
        setSaveBusy(false);
      } catch (err) {
        console.log(err);
        setStatus("Save failed: " + err.message);
        setSaveBusy(false);
      }
    }

    async function deleteVehicle() {
      if (!currentVehicle) return;

      const ok = confirm("Are you sure you want to delete this vehicle?");
      if (!ok) return;

      setStatus("Deleting vehicle...");

      const { error } = await client
        .from("vehicles")
        .delete()
        .eq("id", currentVehicle.id)
        .eq("user_id", currentUser.id);

      if (error) {
        setStatus("Could not delete vehicle: " + error.message);
        return;
      }

      setStatus("Vehicle deleted successfully.");
      setTimeout(() => {
        window.location.href = "dealer-admin.html";
      }, 1200);
    }

    async function startEditPage() {
      try {
        setStatus("Checking login...");

        const { data, error } = await client.auth.getUser();

        if (error || !data || !data.user) {
          setStatus("Not logged in. Redirecting...");
          setTimeout(function () {
            window.location.href = "login.html";
          }, 1200);
          return;
        }

        currentUser = data.user;

        setStatus("Loading dealer profile...");
        const profileOk = await loadProfile(currentUser.id);

        if (!profileOk) {
          setStatus("Profile not found.");
          return;
        }

        if (!currentProfile.is_active) {
          setWarning("Your account is not active yet. Please contact admin after payment.");
        } else {
          setWarning("");
        }

        setStatus("Loading vehicle...");
        const vehicleOk = await loadVehicle();

        if (!vehicleOk) return;

        if (currentVehicle.user_id !== currentUser.id) {
          setStatus("You do not have permission to edit this vehicle.");
          return;
        }

        setStatus("Edit page ready.");
      } catch (err) {
        console.log(err);
        setStatus("Error starting edit page.");
      }
    }

    startEditPage();
  </script>
</body>
</html>
