<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Edit Vehicle</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #dfe3ea;
      color: #111827;
    }

    .hero {
      background: linear-gradient(135deg, #3156c7, #1f3f9e);
      color: white;
      text-align: center;
      padding: 36px 18px 28px;
    }

    .hero h1 {
      margin: 0;
      font-size: 34px;
      font-weight: 800;
    }

    .hero p {
      margin: 8px 0 0;
      font-size: 18px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 18px;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .top-btn {
      background: #1f2937;
      color: white;
      text-decoration: none;
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .top-btn.blue {
      background: #3156c7;
    }

    .status {
      background: white;
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 16px;
      font-weight: bold;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .card {
      background: #f7f7f8;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .card h2 {
      margin: 0 0 14px;
      font-size: 30px;
    }

    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      font-weight: 700;
      margin-bottom: 6px;
      font-size: 14px;
    }

    input,
    select,
    textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 13px 14px;
      border-radius: 12px;
      border: 1px solid #cbd5e1;
      font-size: 15px;
      background: white;
      color: #111827;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: white;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid #cbd5e1;
    }

    .checkbox-row input[type="checkbox"] {
      width: auto;
      margin: 0;
      transform: scale(1.2);
    }

    .image-manager {
      background: #eef2f7;
      border: 1px solid #d1d5db;
      border-radius: 16px;
      padding: 14px;
      margin-top: 10px;
    }

    .manager-note {
      font-size: 13px;
      color: #475569;
      margin-top: 4px;
    }

    .preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 14px;
      margin-top: 12px;
    }

    .preview-card {
      background: white;
      border: 2px solid #dbe2ea;
      border-radius: 16px;
      padding: 10px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.06);
    }

    .preview-card.main {
      border-color: #3156c7;
      box-shadow: 0 0 0 3px rgba(49, 86, 199, 0.12);
    }

    .preview-card img {
      width: 100%;
      height: 145px;
      object-fit: cover;
      border-radius: 12px;
      background: #e5e7eb;
      display: block;
      margin-bottom: 10px;
    }

    .img-label {
      font-size: 13px;
      font-weight: 800;
      color: #334155;
      margin-bottom: 8px;
      text-align: center;
    }

    .img-actions {
      display: grid;
      gap: 8px;
    }

    .action-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .small-btn {
      border: none;
      border-radius: 10px;
      padding: 9px 10px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      color: white;
      width: 100%;
    }

    .btn-main {
      background: #3156c7;
    }

    .btn-remove {
      background: #dc2626;
    }

    .btn-move {
      background: #0f766e;
    }

    .btn-disabled {
      background: #64748b;
      cursor: default;
    }

    .save-btn {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 15px;
      font-weight: 800;
      background: #3156c7;
      color: white;
      cursor: pointer;
      margin-top: 8px;
    }

    .save-btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    @media (max-width: 800px) {
      .hero h1 {
        font-size: 30px;
      }

      .two-col {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <div class="hero">
    <h1>Edit Vehicle</h1>
    <p>Ultra image manager with compression</p>
  </div>

  <div class="container">
    <div class="top-actions">
      <a href="dealer-admin.html" class="top-btn">Back to Dashboard</a>
      <a href="index.html" class="top-btn blue">Website</a>
      <button class="top-btn" onclick="logout()">Logout</button>
    </div>

    <div id="status" class="status">Loading edit page...</div>

    <div class="card">
      <h2>Edit Vehicle</h2>

      <div class="field">
        <label for="vehiclePhotos">Add More Vehicle Photos</label>
        <input type="file" id="vehiclePhotos" multiple accept="image/*" />
        <div class="manager-note">
          First image is the main image. Images are compressed before upload.
        </div>
      </div>

      <div class="field">
        <label>Image Manager</label>
        <div class="image-manager">
          <div id="photoPreview" class="preview-grid"></div>
        </div>
      </div>

      <div class="field">
        <label for="title">Vehicle Title</label>
        <input type="text" id="title" />
      </div>

      <div class="two-col">
        <div class="field">
          <label for="year">Select Year</label>
          <select id="year"></select>
        </div>

        <div class="field">
          <label for="price">Price</label>
          <input type="text" id="price" />
        </div>
      </div>

      <div class="two-col">
        <div class="field">
          <label for="mileage">Mileage</label>
          <input type="text" id="mileage" />
        </div>

        <div class="field">
          <label for="location">Location</label>
          <input type="text" id="location" />
        </div>
      </div>

      <div class="two-col">
        <div class="field">
          <label for="dealer">Dealer Name</label>
          <input type="text" id="dealer" />
        </div>

        <div class="field">
          <label for="phone">Phone</label>
          <input type="text" id="phone" />
        </div>
      </div>

      <div class="field">
        <label for="description">Description</label>
        <textarea id="description"></textarea>
      </div>

      <div class="field">
        <label>Featured Vehicle</label>
        <div class="checkbox-row">
          <input type="checkbox" id="featured" />
          <span>Show this vehicle as featured</span>
        </div>
      </div>

      <button id="saveBtn" class="save-btn" onclick="saveVehicle()">Update Vehicle</button>
    </div>
  </div>

  <script>
    const supabaseUrl = "https://ddmvzypiccryjndcwlre.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkbXZ6eXBpY2NyeWpuZGN3bHJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NTQ2NzYsImV4cCI6MjA5MTQzMDY3Nn0.mNkODdvX8gllTZeqfr7nllMWfF7ATdj9MY-EKEE3G6w";
    const client = window.supabase.createClient(supabaseUrl, supabaseKey);
    const STORAGE_BUCKET = "vehicle-images";

    let currentUser = null;
    let vehicleId = null;
    let currentVehicle = null;
    let originalStorageUrls = [];
    let imageList = [];

    function setStatus(message) {
      document.getElementById("status").textContent = message;
      console.log("[STATUS]", message);
    }

    function getIdFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get("id");
    }

    function populateYears() {
      const yearSelect = document.getElementById("year");
      yearSelect.innerHTML = '<option value="">Select year</option>';

      const currentYear = new Date().getFullYear();
      for (let y = currentYear; y >= 1980; y--) {
        const option = document.createElement("option");
        option.value = y;
        option.textContent = y;
        yearSelect.appendChild(option);
      }
    }

    async function requireUser() {
      const { data, error } = await client.auth.getUser();

      if (error || !data.user) {
        window.location.href = "login.html";
        return false;
      }

      currentUser = data.user;
      return true;
    }

    function parseImages(mainImage, imagesText) {
      const arr = [];

      if (mainImage && String(mainImage).trim()) {
        arr.push({
          url: String(mainImage).trim(),
          isNew: false,
          file: null
        });
      }

      if (imagesText && String(imagesText).trim()) {
        String(imagesText)
          .split(",")
          .map(x => x.trim())
          .filter(Boolean)
          .forEach(url => {
            if (!arr.some(item => item.url === url)) {
              arr.push({
                url,
                isNew: false,
                file: null
              });
            }
          });
      }

      return arr;
    }

    function revokeBlobIfNeeded(item) {
      if (item && item.isNew && item.url && item.url.startsWith("blob:")) {
        URL.revokeObjectURL(item.url);
      }
    }

    function renderImageManager() {
      const preview = document.getElementById("photoPreview");
      preview.innerHTML = "";

      if (!imageList.length) {
        preview.innerHTML = `
          <div class="preview-card">
            <div class="img-label">No images available.</div>
          </div>
        `;
        return;
      }

      imageList.forEach((item, index) => {
        const card = document.createElement("div");
        card.className = "preview-card" + (index === 0 ? " main" : "");

        const mainButtonHtml = index === 0
          ? `<button type="button" class="small-btn btn-disabled">Main image</button>`
          : `<button type="button" class="small-btn btn-main" onclick="makeMain(${index})">Set as Main</button>`;

        const moveLeftHtml = index === 0
          ? `<button type="button" class="small-btn btn-disabled">Move Left</button>`
          : `<button type="button" class="small-btn btn-move" onclick="moveLeft(${index})">Move Left</button>`;

        const moveRightHtml = index === imageList.length - 1
          ? `<button type="button" class="small-btn btn-disabled">Move Right</button>`
          : `<button type="button" class="small-btn btn-move" onclick="moveRight(${index})">Move Right</button>`;

        card.innerHTML = `
          <img src="${item.url}" alt="Vehicle image ${index + 1}">
          <div class="img-label">${index === 0 ? "Main image" : "Extra image " + index}</div>
          <div class="img-actions">
            ${mainButtonHtml}
            <div class="action-row">
              ${moveLeftHtml}
              ${moveRightHtml}
            </div>
            <button type="button" class="small-btn btn-remove" onclick="removeImage(${index})">Remove image</button>
          </div>
        `;

        preview.appendChild(card);
      });
    }

    function setupPhotoInput() {
      const fileInput = document.getElementById("vehiclePhotos");

      fileInput.addEventListener("change", function () {
        const files = Array.from(fileInput.files || []);

        files.forEach(file => {
          const localUrl = URL.createObjectURL(file);
          imageList.push({
            url: localUrl,
            isNew: true,
            file: file
          });
        });

        renderImageManager();
        fileInput.value = "";
      });
    }

    function makeMain(index) {
      if (index < 0 || index >= imageList.length) return;
      const chosen = imageList.splice(index, 1)[0];
      imageList.unshift(chosen);
      renderImageManager();
    }

    function moveLeft(index) {
      if (index <= 0 || index >= imageList.length) return;
      const temp = imageList[index - 1];
      imageList[index - 1] = imageList[index];
      imageList[index] = temp;
      renderImageManager();
    }

    function moveRight(index) {
      if (index < 0 || index >= imageList.length - 1) return;
      const temp = imageList[index + 1];
      imageList[index + 1] = imageList[index];
      imageList[index] = temp;
      renderImageManager();
    }

    function removeImage(index) {
      if (index < 0 || index >= imageList.length) return;
      const removed = imageList[index];
      revokeBlobIfNeeded(removed);
      imageList.splice(index, 1);
      renderImageManager();
    }

    function extractStoragePath(publicUrl) {
      try {
        if (!publicUrl || typeof publicUrl !== "string") return null;
        const marker = `/storage/v1/object/public/${STORAGE_BUCKET}/`;
        const idx = publicUrl.indexOf(marker);
        if (idx === -1) return null;
        return publicUrl.substring(idx + marker.length);
      } catch {
        return null;
      }
    }

    function getStorageBackedUrls(urls) {
      return urls.filter(url => extractStoragePath(url));
    }

    async function loadVehicle() {
      setStatus("Loading vehicle...");

      const { data, error } = await client
        .from("vehicles")
        .select("*")
        .eq("id", vehicleId)
        .single();

      if (error || !data) {
        console.log(error);
        setStatus("Could not load vehicle.");
        return false;
      }

      currentVehicle = data;

      document.getElementById("title").value = data.title || "";
      document.getElementById("year").value = data.year || "";
      document.getElementById("price").value = data.price || "";
      document.getElementById("mileage").value = data.mileage || "";
      document.getElementById("location").value = data.location || "";
      document.getElementById("dealer").value = data.dealer || "";
      document.getElementById("phone").value = data.phone || "";
      document.getElementById("description").value = data.description || "";
      document.getElementById("featured").checked = !!data.featured;

      imageList = parseImages(data.image, data.images);
      originalStorageUrls = getStorageBackedUrls(imageList.map(item => item.url));
      renderImageManager();

      return true;
    }

    async function compressImage(file, maxWidth = 1600, quality = 0.82) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();

        reader.onload = function (event) {
          const img = new Image();

          img.onload = function () {
            let width = img.width;
            let height = img.height;

            if (width > maxWidth) {
              height = Math.round((height * maxWidth) / width);
              width = maxWidth;
            }

            const canvas = document.createElement("canvas");
            canvas.width = width;
            canvas.height = height;

            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, width, height);

            canvas.toBlob(
              function (blob) {
                if (!blob) {
                  reject(new Error("Compression failed."));
                  return;
                }

                const compressedFile = new File(
                  [blob],
                  file.name.replace(/\.\w+$/, "") + ".jpg",
                  { type: "image/jpeg" }
                );

                resolve(compressedFile);
              },
              "image/jpeg",
              quality
            );
          };

          img.onerror = function () {
            reject(new Error("Could not load image for compression."));
          };

          img.src = event.target.result;
        };

        reader.onerror = function () {
          reject(new Error("Could not read image file."));
        };

        reader.readAsDataURL(file);
      });
    }

    async function uploadOneFile(file) {
      const compressedFile = await compressImage(file, 1600, 0.82);

      const extension = "jpg";
      const randomPart = Math.random().toString(36).slice(2);
      const fileName = Date.now() + "-" + randomPart + "." + extension;
      const filePath = "vehicles/" + fileName;

      const { error } = await client.storage
        .from(STORAGE_BUCKET)
        .upload(filePath, compressedFile, {
          contentType: "image/jpeg",
          upsert: false
        });

      if (error) throw error;

      const { data } = client.storage
        .from(STORAGE_BUCKET)
        .getPublicUrl(filePath);

      return data.publicUrl;
    }

    async function normalizeImageList() {
      const finalUrls = [];
      let uploadCount = 0;

      for (const item of imageList) {
        if (item.isNew && item.file) {
          uploadCount++;
          setStatus("Compressing and uploading image " + uploadCount + "...");
          const uploadedUrl = await uploadOneFile(item.file);
          finalUrls.push(uploadedUrl);
        } else {
          finalUrls.push(item.url);
        }
      }

      return finalUrls;
    }

    function getDeletedStoragePaths(finalUrls) {
      const finalSet = new Set(getStorageBackedUrls(finalUrls));
      const deleted = originalStorageUrls.filter(url => !finalSet.has(url));
      return deleted
        .map(url => extractStoragePath(url))
        .filter(Boolean);
    }

    async function deleteRemovedStorageFiles(paths) {
      if (!paths.length) return;

      const { error } = await client.storage
        .from(STORAGE_BUCKET)
        .remove(paths);

      if (error) {
        console.log("Storage remove warning:", error);
      }
    }

    async function saveVehicle() {
      const saveBtn = document.getElementById("saveBtn");
      saveBtn.disabled = true;

      try {
        const title = document.getElementById("title").value.trim();
        const year = document.getElementById("year").value;
        const price = document.getElementById("price").value.trim();
        const mileage = document.getElementById("mileage").value.trim();
        const location = document.getElementById("location").value.trim();
        const dealer = document.getElementById("dealer").value.trim();
        const phone = document.getElementById("phone").value.trim();
        const description = document.getElementById("description").value.trim();
        const featured = document.getElementById("featured").checked;

        if (!title || !year || !price || !mileage || !location || !dealer || !phone) {
          setStatus("Please complete all required fields.");
          saveBtn.disabled = false;
          return;
        }

        if (!imageList.length) {
          setStatus("At least one image is required.");
          saveBtn.disabled = false;
          return;
        }

        const finalUrls = await normalizeImageList();

        const mainImage = finalUrls[0] || "";
        const extraImages = finalUrls.slice(1);

        setStatus("Updating vehicle...");
        const { error } = await client
          .from("vehicles")
          .update({
            title: title,
            year: year,
            price: price,
            mileage: mileage,
            location: location,
            dealer: dealer,
            phone: phone,
            description: description,
            featured: featured,
            image: mainImage,
            images: extraImages.join(",")
          })
          .eq("id", vehicleId);

        if (error) {
          console.log(error);
          setStatus("Could not update vehicle.");
          saveBtn.disabled = false;
          return;
        }

        setStatus("Removing deleted images from storage...");
        const deletedPaths = getDeletedStoragePaths(finalUrls);
        await deleteRemovedStorageFiles(deletedPaths);

        imageList.forEach(item => revokeBlobIfNeeded(item));

        imageList = finalUrls.map(url => ({
          url,
          isNew: false,
          file: null
        }));

        originalStorageUrls = getStorageBackedUrls(finalUrls);
        renderImageManager();
        setStatus("Vehicle updated successfully.");
      } catch (err) {
        console.log(err);
        setStatus("Something went wrong while updating.");
      }

      saveBtn.disabled = false;
    }

    async function logout() {
      await client.auth.signOut();
      window.location.href = "login.html";
    }

    async function startPage() {
      populateYears();
      setupPhotoInput();

      vehicleId = getIdFromUrl();
      if (!vehicleId) {
        setStatus("Missing vehicle ID.");
        return;
      }

      const okUser = await requireUser();
      if (!okUser) return;

      const okVehicle = await loadVehicle();
      if (!okVehicle) return;

      setStatus("Edit page ready.");
    }

    window.makeMain = makeMain;
    window.moveLeft = moveLeft;
    window.moveRight = moveRight;
    window.removeImage = removeImage;

    startPage();
  </script>
</body>
</html>
