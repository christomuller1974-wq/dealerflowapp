<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Super Admin - DealerFlow</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #e5e7eb;
      color: #111827;
    }

    .hero {
      background: #2f55c7;
      color: white;
      padding: 24px 20px;
      text-align: center;
    }

    .hero h1 {
      margin: 0 0 8px 0;
      font-size: 36px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 18px;
    }

    .btn {
      padding: 8px 12px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      color: white;
      font-size: 12px;
    }

    .btn-green { background: #16a34a; }
    .btn-red { background: #dc2626; }

    .status {
      background: white;
      padding: 12px;
      margin-bottom: 16px;
      border-radius: 10px;
      font-weight: bold;
    }

    .dealer-card {
      background: white;
      padding: 14px;
      border-radius: 12px;
      margin-bottom: 12px;
    }
  </style>
</head>
<body>

  <div class="hero">
    <h1>Super Admin</h1>
  </div>

  <div class="container">
    <div id="status" class="status">Loading...</div>
    <div id="dealerGrid"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseUrl = "https://ddmvzypiccryjndcwlre.supabase.co";
    const supabaseKey = "sb_publishable_D7saHOTE_JhSlMnSgBnIhQ_mOAOUD9s";
    const client = window.supabase.createClient(supabaseUrl, supabaseKey);

    const ADMIN_EMAIL = "autoexcellence@telkomsa.net";

    function setStatus(msg) {
      document.getElementById("status").textContent = msg;
    }

    async function startAdmin() {
      setStatus("Checking admin access...");

      const { data, error } = await client.auth.getUser();

      if (error || !data || !data.user) {
        setStatus("Not logged in.");
        window.location.href = "login.html";
        return;
      }

      if (data.user.email !== ADMIN_EMAIL) {
        setStatus("Access denied.");
        setTimeout(() => {
          window.location.href = "index.html";
        }, 1200);
        return;
      }

      setStatus("Admin access granted.");
      loadDealers();
    }

    async function loadDealers() {
      const { data, error } = await client
        .from("profiles")
        .select("*");

      if (error) {
        setStatus("Error loading dealers.");
        return;
      }

      const grid = document.getElementById("dealerGrid");
      grid.innerHTML = "";

      data.forEach(d => {
        const card = document.createElement("div");
        card.className = "dealer-card";

        card.innerHTML = `
          <strong>${d.dealer_name}</strong><br>
          ${d.phone}<br>
          ${d.location}<br><br>

          Status: ${d.is_active ? "Active" : "Inactive"}<br><br>

          <button class="btn btn-green" onclick="setStatusDealer('${d.id}', true)">Activate</button>
          <button class="btn btn-red" onclick="setStatusDealer('${d.id}', false)">Deactivate</button>
        `;

        grid.appendChild(card);
      });
    }

    async function setStatusDealer(id, active) {
      setStatus(active ? "Activating..." : "Deactivating...");

      const { error } = await client
        .from("profiles")
        .update({ is_active: active })
        .eq("id", id);

      if (error) {
        setStatus("Error updating.");
        return;
      }

      setStatus("Updated successfully.");
      loadDealers();
    }

    startAdmin();
  </script>

</body>
</html>
