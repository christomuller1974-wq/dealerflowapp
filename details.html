[16:43, 4/16/2026] Christo Muller: <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vehicle Details</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #e5e7eb;
  color: #111827;
}

.hero {
  background: #2f55c7;
  color: white;
  padding: 20px;
}

.container {
  max-width: 1200px;
  margin: 20px auto;
  padding: 15px;
}

/* LAYOUT */
.layout {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
}

@media (min-width: 900px) {
  .layout {
    grid-template-columns: 1.2fr 0.8fr;
  }
}

/* CARD */
.card {
  background: white;
  border-radius: 12px;
  padding: 14px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

/* IMAGE FIX (NO CUTTING) */
.main-image-wrap {
  height: 320px;
  background: #ddd;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.main-image {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

/* THUMBS */
.thumbs {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  margin-top: 8px;
}

.thumb-wrap {
  height: 70px;
  background: #eee;
  border-radius: 6px;
  overflow: hidden;
}

.thumb-wrap img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  cursor: pointer;
}

/* TEXT */
.title {
  font-size: 22px;
  font-weight: bold;
}

.price {
  font-size: 24px;
  color: #c53030;
  font-weight: bold;
  margin: 8px 0;
}

.meta {
  font-size: 14px;
  margin: 4px 0;
}

/* SMALL CLEAN BUTTONS */
.action-stack {
  display: grid;
  gap: 6px;
  margin-top: 10px;
}

.action-btn {
  display: block;
  text-align: center;
  padding: 9px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 600;
  text-decoration: none;
  color: white;
}

.call { background: #3f5cc9; }
.wa { background: #25d366; }
.dealer { background: #16a34a; }
.back { background: #1f2937; }

/* FORM */
input, textarea {
  width: 100%;
  padding: 9px;
  margin-top: 6px;
  border-radius: 6px;
  border: 1px solid #ccc;
  font-size: 13px;
}

textarea {
  height: 90px;
}

.send-btn {
  margin-top: 8px;
  background: #3f5cc9;
  color: white;
  border: none;
  padding: 9px;
  border-radius: 6px;
  cursor: pointer;
}

.status {
  margin-top: 8px;
  background: #eee;
  padding: 8px;
  border-radius: 6px;
  font-size: 13px;
}

</style>
</head>

<body>

<div class="hero">
  <h2>Vehicle Details</h2>
</div>

<div class="container">
<div class="layout">

<!-- LEFT -->
<div class="card">
  <div class="main-image-wrap">
    <img id="mainImage" class="main-image">
  </div>

  <div id="thumbs" class="thumbs"></div>
</div>

<!-- RIGHT -->
<div>

<div class="card">
  <div id="title" class="title"></div>
  <div id="price" class="price"></div>

  <div class="meta" id="year"></div>
  <div class="meta" id="mileage"></div>
  <div class="meta" id="location"></div>
  <div class="meta" id="dealer"></div>
  <div class="meta" id="phone"></div>

  <div class="action-stack">
    <a id="callBtn" class="action-btn call">Call Dealer</a>
    <a id="waBtn" class="action-btn wa">WhatsApp Dealer</a>
    <a id="dealerBtn" class="action-btn dealer">View Dealer Stock</a>
    <a href="index.html" class="action-btn back">Back to Listings</a>
  </div>
</div>

<div class="card">
  <h3>Send Enquiry</h3>

  <input id="name" placeholder="Your Name">
  <input id="phoneInput" placeholder="Phone Number">
  <textarea id="message"></textarea>

  <button onclick="sendEnquiry()" class="send-btn">Send</button>

  <div id="status" class="status"></div>
</div>

</div>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://ddmvzypiccryjndcwlre.supabase.co";
const supabaseKey = "sb_publishable_D7saHOTE_JhSlMnSgBnIhQ_mOAOUD9s";
const client = window.supabase.createClient(supabaseUrl, supabaseKey);

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

let vehicle = null;

async function loadVehicle() {

  const { data, error } = await client
    .from("vehicles")
    .select("*")
    .eq("id", id)
    .single();

  if (error || !data) {
    document.body.innerHTML = `
      <div style="padding:40px;text-align:center">
        <h2>Vehicle not found</h2>
        <a href="index.html">Back</a>
      </div>
    `;
    return;
  }

  vehicle = data;

  document.getElementById("title").innerText = data.title;
  document.getElementById("price").innerText = "R" + data.price;
  document.getElementById("year").innerText = "Year: " + data.year;
  document.getElementById("mileage").innerText = "Mileage: " + data.mileage;
  document.getElementById("location").innerText = "Location: " + data.location;
  document.getElementById("dealer").innerText = "Dealer: " + data.dealer;
  document.getElementById("phone").innerText = "Phone: " + data.phone;

  document.getElementById("callBtn").href = "tel:" + data.phone;

  document.getElementById("waBtn").href =
    "https://wa.me/27" + data.phone.replace(/^0/, "");

  document.getElementById("dealerBtn").href =
    "dealer.html?dealer=" + encodeURIComponent(data.dealer);

  const mainImage = document.getElementById("mainImage");
  mainImage.src = data.image;

  const thumbs = document.getElementById("thumbs");

  if (data.images) {
    data.images.split(",").forEach(img => {
      const wrap = document.createElement("div");
      wrap.className = "thumb-wrap";

      const image = document.createElement("img");
      image.src = img;

      image.onclick = () => mainImage.src = img;

      wrap.appendChild(image);
      thumbs.appendChild(wrap);
    });
  }
}

async function sendEnquiry() {
  const name = document.getElementById("name").value;
  const phone = document.getElementById("phoneInput").value;
  const message = document.getElementById("message").value;

  const { error } = await client.from("leads").insert([{
    vehicle_id: vehicle.id,
    buyer_name: name,
    buyer_phone: phone,
    message: message
  }]);

  document.getElementById("status").innerText =
    error ? "Error sending enquiry" : "Enquiry sent!";
}

loadVehicle();
</script>

</body>
</html>
