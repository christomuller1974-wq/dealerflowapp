<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title id="pageTitle">Vehicle Details | CarScoutZA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=AW-18195864875">
</script>

  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}

  gtag('config', 'AW-18195864875');
</script>
<meta id="metaDesc" name="description" content="View used vehicle details on CarScoutZA. Used cars for sale in South Africa.">
<meta property="og:title" id="ogTitle" content="Vehicle Details | CarScoutZA">
<meta property="og:description" id="ogDesc" content="View used vehicle details on CarScoutZA.">
<meta property="og:image" id="ogImage" content="">

<style>
* { box-sizing: border-box; }

html, body {
  margin: 0;
  width: 100%;
  max-width: 100%;
  overflow-x: hidden;
  font-family: Arial, sans-serif;
  background: #eef1f5;
  color: #111827;
}

.hero {
  background: #3156c7;
  color: white;
  text-align: center;
  padding: 26px 15px;
}

.hero h1 {
  margin: 0;
  font-size: 34px;
  font-weight: 900;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 18px;
}

.top-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}

.top-btn {
  text-decoration: none;
  background: #111827;
  color: white;
  padding: 10px 14px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 900;
}

.top-btn.blue {
  background: #3156c7;
}

.status {
  background: white;
  padding: 12px 14px;
  border-radius: 12px;
  margin-bottom: 16px;
  font-weight: 900;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.layout {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 20px;
  align-items: start;
}

.gallery-box,
.info-box,
.side-box {
  background: white;
  border-radius: 16px;
  padding: 14px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.10);
}

.main-image-wrap {
  background: #f1f5f9;
  border-radius: 14px;
  overflow: hidden;
  position: relative;
  width: 100%;
}

.main-image {
  width: 100%;
  max-width: 100%;
  height: 390px;
  object-fit: contain;
  background: #f1f5f9;
  display: block;
  cursor: zoom-in;
}

.image-badge,
.fullscreen-badge {
  position: absolute;
  bottom: 12px;
  background: rgba(17,24,39,0.85);
  color: white;
  padding: 7px 10px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 900;
}

.image-badge { left: 12px; }
.fullscreen-badge { right: 12px; }

.thumb-row {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  padding: 12px 2px 4px;
  width: 100%;
}

.thumb {
  width: 92px;
  height: 68px;
  object-fit: cover;
  border-radius: 10px;
  cursor: pointer;
  border: 3px solid transparent;
  background: #e5e7eb;
  flex: 0 0 auto;
}

.thumb.active {
  border-color: #3156c7;
}

.side-box {
  position: sticky;
  top: 18px;
}

.dealer-name {
  font-size: 22px;
  font-weight: 900;
  margin-bottom: 12px;
}

.price {
  color: #dc2626;
  font-size: 30px;
  font-weight: 900;
  margin: 8px 0 16px;
}

.btn {
  display: block;
  width: 100%;
  text-align: center;
  text-decoration: none;
  color: white;
  border: none;
  border-radius: 12px;
  padding: 13px;
  margin-top: 10px;
  font-size: 15px;
  font-weight: 900;
  cursor: pointer;
}

.btn-call { background: #111827; }
.btn-whatsapp { background: #25d366; }
.btn-dealer { background: #3156c7; }
.btn-enquire { background: #0ea5e9; }

.info-box {
  margin-top: 18px;
}

.vehicle-title {
  font-size: 30px;
  font-weight: 900;
  margin: 0 0 12px;
}

.spec-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.spec {
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  border-radius: 12px;
  padding: 12px;
  font-size: 15px;
  color: #334155;
}

.description {
  margin-top: 18px;
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  border-radius: 12px;
  padding: 14px;
  line-height: 1.6;
  white-space: pre-wrap;
  color: #334155;
}

.modal {
  display: none;
  position: fixed;
  z-index: 9999;
  inset: 0;
  background: rgba(0,0,0,0.93);
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.modal.show {
  display: flex;
}

.modal-img {
  max-width: 94vw;
  max-height: 84vh;
  object-fit: contain;
  border-radius: 12px;
}

.modal-close,
.modal-prev,
.modal-next {
  position: fixed;
  border: none;
  color: white;
  background: rgba(17,24,39,0.85);
  cursor: pointer;
  font-weight: 900;
  z-index: 10000;
}

.modal-close {
  top: 18px;
  right: 18px;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  font-size: 28px;
}

.modal-prev,
.modal-next {
  top: 50%;
  transform: translateY(-50%);
  width: 54px;
  height: 70px;
  border-radius: 14px;
  font-size: 34px;
}

.modal-prev { left: 18px; }
.modal-next { right: 18px; }

.modal-count {
  position: fixed;
  bottom: 18px;
  left: 50%;
  transform: translateX(-50%);
  color: white;
  background: rgba(17,24,39,0.85);
  padding: 9px 14px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 900;
}

.enquire-box {
  background: white;
  max-width: 430px;
  width: 100%;
  border-radius: 16px;
  padding: 20px;
}

.enquire-box h2 {
  margin: 0 0 14px;
}

.enquire-box input,
.enquire-box textarea {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 10px;
  border: 1px solid #cbd5e1;
  font-size: 15px;
}

.enquire-box textarea {
  min-height: 110px;
  resize: vertical;
}

.empty-box {
  background: white;
  border-radius: 14px;
  padding: 24px;
  text-align: center;
  color: #475569;
  font-weight: 900;
}

@media(max-width: 900px) {
  html, body {
    width: 100%;
    max-width: 100%;
    overflow-x: hidden;
  }

  .hero {
    padding: 22px 10px;
  }

  .hero h1 {
    font-size: 38px;
  }

  .container {
    width: 100%;
    max-width: 100%;
    padding: 10px;
    overflow-x: hidden;
  }

  .top-actions {
    gap: 8px;
  }

  .top-btn {
    flex: 1;
    text-align: center;
    padding: 12px 10px;
    font-size: 14px;
  }

  .layout {
    display: block;
    width: 100%;
  }

  .gallery-box,
  .info-box,
  .side-box {
    width: 100%;
    max-width: 100%;
    padding: 10px;
    border-radius: 14px;
    overflow: hidden;
  }

  .side-box {
    position: static;
    margin-top: 18px;
  }

  .main-image-wrap {
    width: 100%;
    max-width: 100%;
    overflow: hidden;
  }

  .main-image {
    width: 100%;
    max-width: 100%;
    height: 230px;
    object-fit: contain;
  }

  .thumb-row {
    width: 100%;
    max-width: 100%;
    overflow-x: auto;
    gap: 8px;
  }

  .thumb {
    width: 76px;
    height: 56px;
  }

  .vehicle-title {
    font-size: 24px;
  }

  .spec-grid {
    grid-template-columns: 1fr;
  }

  .fullscreen-badge {
    display: none;
  }
}
</style>
</head>

<body>

<div class="hero">
  <h1>CarScoutZA Vehicle Details</h1>
</div>

<div class="container">
  <div class="top-actions">
    <a href="index.html" class="top-btn">Back to Website</a>
    <a href="dealer-admin.html" class="top-btn blue">Dealer Login</a>
  </div>

  <div id="status" class="status">Loading vehicle details...</div>
  <div id="content"></div>
</div>

<div id="imageModal" class="modal">
  <button class="modal-close" onclick="closeModal()">×</button>
  <button class="modal-prev" onclick="prevImage()">‹</button>
  <img id="modalImage" class="modal-img" src="">
  <button class="modal-next" onclick="nextImage()">›</button>
  <div id="modalCount" class="modal-count"></div>
</div>

<div id="enquireModal" class="modal">
  <div class="enquire-box">
    <h2>Enquire about this vehicle</h2>

    <input id="enqName" placeholder="Your Name">
    <input id="enqPhone" placeholder="Your Phone">
    <textarea id="enqMsg">Hi, I'm interested in this vehicle.</textarea>

    <button class="btn btn-whatsapp" onclick="sendEnquiry()">Send via WhatsApp</button>
    <button class="btn btn-call" onclick="closeEnquire()">Cancel</button>
  </div>
</div>

<script>
const supabaseUrl = "https://ddmvzypiccryjndcwlre.supabase.co";

const supabaseKey =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkbXZ6eXBpY2NyeWpuZGN3bHJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NTQ2NzYsImV4cCI6MjA5MTQzMDY3Nn0.mNkODdvX8gllTZeqfr7nllMWfF7ATdj9MY-EKEE3G6w";

let images = [];
let current = 0;
let currentVehicle = null;
let currentTitle = "";

function setStatus(message){
  document.getElementById("status").textContent = message;
}

function getId(){
  return new URLSearchParams(window.location.search).get("id");
}

function formatPrice(price){

  const num =
    Number(
      String(price || "")
      .replace(/\D/g, "")
    );

  if (!num) return "R0";

  return "R" +
    num.toLocaleString("en-ZA");
}

function cleanPhone(phone){

  return String(phone || "")
    .replace(/\D/g, "");
}

function callLink(phone){

  const phoneClean =
    cleanPhone(phone);

  if (!phoneClean) return "#";

  return "tel:" + phoneClean;
}

function whatsappLink(phone, title){

  let phoneClean =
    cleanPhone(phone);

  if (!phoneClean) return "#";

  if (phoneClean.startsWith("0")) {

    phoneClean =
      "27" + phoneClean.substring(1);
  }

  return "https://wa.me/" +
    phoneClean +
    "?text=" +
    encodeURIComponent(
      "Hi, I saw the " +
      (title || "vehicle") +
      " on CarScoutZA and I'm interested."
    );
}

function dealerStockLink(vehicle) {

  if (!vehicle.user_id) {
    return "dealer.html";
  }

  return "dealer.html?dealer=" + encodeURIComponent(vehicle.user_id);

}

function getImages(vehicle){

  const arr = [];

  if (
    vehicle.image &&
    String(vehicle.image).trim()
  ){
    arr.push(
      String(vehicle.image).trim()
    );
  }

  if (
    vehicle.images &&
    String(vehicle.images).trim()
  ){

    String(vehicle.images)
      .split(",")
      .map(x => x.trim())
      .filter(Boolean)
      .forEach(url => {

        if (!arr.includes(url)) {
          arr.push(url);
        }
      });
  }

  if (!arr.length) {

    arr.push(
      "https://via.placeholder.com/900x600?text=No+Image"
    );
  }

  return arr;
}

function updateSEO(vehicle, title, imageUrl){

  const seoLocation =
    vehicle.location ||
    vehicle.province ||
    "South Africa";

  const seoTitle =
    title +
    " for sale in " +
    seoLocation +
    " | CarScoutZA";

  const seoDesc =
    title +
    " for sale in " +
    seoLocation +
    ". " +
    (
      vehicle.mileage
      ? vehicle.mileage + " km. "
      : ""
    ) +
    "View price, photos and dealer contact details on CarScoutZA.";

  document.title = seoTitle;

  document
    .getElementById("pageTitle")
    .textContent = seoTitle;

  document
    .getElementById("metaDesc")
    .setAttribute("content", seoDesc);

  document
    .getElementById("ogTitle")
    .setAttribute("content", seoTitle);

  document
    .getElementById("ogDesc")
    .setAttribute("content", seoDesc);

  document
    .getElementById("ogImage")
    .setAttribute("content", imageUrl || "");
}

async function trackSiteVisit(vehicle){

  try {

    await fetch(
      supabaseUrl + "/rest/v1/site_visits",
      {
        method:"POST",

        headers:{
          apikey:supabaseKey,
          Authorization:"Bearer " + supabaseKey,
          "Content-Type":"application/json",
          Prefer:"return=minimal"
        },

        body: JSON.stringify({
          page:"details",
          dealer:
            vehicle.dealer ||
            vehicle.dealer_name ||
            null,
          vehicle_id:
            vehicle.id || null
        })
      }
    );

  } catch(err){
    console.log(err);
  }
}

async function trackVehicleClick(type, vehicle){

  if (!vehicle || !vehicle.id) return;

  try {

    await fetch(
      supabaseUrl + "/rest/v1/vehicle_clicks",
      {
        method:"POST",

        headers:{
          apikey:supabaseKey,
          Authorization:"Bearer " + supabaseKey,
          "Content-Type":"application/json",
          Prefer:"return=minimal"
        },

        body: JSON.stringify({
          vehicle_id: vehicle.id,
          dealer_user_id:
            vehicle.user_id || null,
          click_type: type
        })
      }
    );

  } catch(err){
    console.log(err);
  }
}

function setMain(index){

  current = index;

  const main =
    document.getElementById("mainImage");

  if (main) {
    main.src = images[current];
  }

  document
    .querySelectorAll(".thumb")
    .forEach((thumb, i) => {

      thumb.classList.toggle(
        "active",
        i === current
      );
    });

  const badge =
    document.getElementById("imageBadge");

  if (badge) {

    badge.textContent =
      "📷 " +
      (current + 1) +
      " / " +
      images.length;
  }
}

function openModal(index){

  current = index;

  updateModal();

  document
    .getElementById("imageModal")
    .classList.add("show");
}

function closeModal(){

  document
    .getElementById("imageModal")
    .classList.remove("show");
}

function updateModal(){

  document
    .getElementById("modalImage")
    .src = images[current];

  document
    .getElementById("modalCount")
    .textContent =
      (current + 1) +
      " / " +
      images.length;
}

function nextImage(){

  if (!images.length) return;

  current =
    (current + 1) %
    images.length;

  updateModal();
  setMain(current);
}

function prevImage(){

  if (!images.length) return;

  current =
    (current - 1 + images.length) %
    images.length;

  updateModal();
  setMain(current);
}

function openEnquire(){

  document
    .getElementById("enquireModal")
    .classList.add("show");
}

function closeEnquire(){

  document
    .getElementById("enquireModal")
    .classList.remove("show");
}

function sendEnquiry(){

  if (!currentVehicle){

    alert("Vehicle not ready yet.");
    return;
  }

  const name =
    document.getElementById("enqName")
    .value.trim();

  const phone =
    document.getElementById("enqPhone")
    .value.trim();

  const msg =
    document.getElementById("enqMsg")
    .value.trim();

  if (!name || !phone || !msg){

    alert(
      "Please complete all fields."
    );

    return;
  }

  const dealerPhone =
    cleanPhone(
      currentVehicle.phone ||
      currentVehicle.dealer_phone
    );

  trackVehicleClick(
    "whatsapp",
    currentVehicle
  );

  const fullMsg =
`Vehicle enquiry from CarScoutZA:

Vehicle: ${currentTitle}
Price: ${formatPrice(currentVehicle.price)}

Name: ${name}
Phone: ${phone}

${msg}`;

  const url =
    "https://wa.me/27" +
    dealerPhone.replace(/^0/, "") +
    "?text=" +
    encodeURIComponent(fullMsg);

  window.open(url, "_blank");

  closeEnquire();
}

async function loadVehicle(){

  const id = getId();

  if (!id){

    setStatus("Missing vehicle ID.");

    return;
  }

  try {

    const res = await fetch(
      supabaseUrl +
      "/rest/v1/vehicles?select=*&id=eq." +
      encodeURIComponent(id),

      {
        headers:{
          apikey:supabaseKey,
          Authorization:"Bearer " + supabaseKey
        }
      }
    );

    const data =
      await res.json();

    const v =
      Array.isArray(data)
      ? data[0]
      : null;

    if (!v){

      setStatus("Vehicle not found.");

      return;
    }

    currentVehicle = v;

    images =
      getImages(v);

    current = 0;

    const fallbackTitle =
      [
        v.year,
        v.make,
        v.model
      ]
      .filter(Boolean)
      .join(" ");

    const title =
      v.title ||
      fallbackTitle ||
      "Vehicle";

    currentTitle = title;

    updateSEO(
      v,
      title,
      images[0]
    );

    trackSiteVisit(v);

    trackVehicleClick(
      "view",
      v
    );

    const dealerName =
      v.dealer ||
      v.dealer_name ||
      "Dealer";

    const dealerPhone =
      v.phone ||
      v.dealer_phone ||
      "";

    const featuredBadge =
  v.featured
    ? '<div style="background:#facc15;color:#111827;padding:6px 14px;border-radius:999px;font-weight:900;display:inline-block;margin-bottom:10px;">⭐ Featured</div>'
    : "";

    let thumbs = "";

    images.forEach((img, i) => {

      thumbs += `
        <img
          src="${img}"
          class="thumb ${i === 0 ? "active" : ""}"
          onclick="setMain(${i})"
        >
      `;
    });

    document
      .getElementById("content")
      .innerHTML = `

      <div class="layout">

        <div>

          <div class="gallery-box">

            <div class="main-image-wrap">

              ${featuredBadge}

              <img
                id="mainImage"
                src="${images[0]}"
                class="main-image"
                onclick="openModal(current)"
              >

              <div
                id="imageBadge"
                class="image-badge"
              >
                📷 1 / ${images.length}
              </div>

              <div class="fullscreen-badge">
                🔍 Fullscreen
              </div>

            </div>

            <div class="thumb-row">
              ${thumbs}
            </div>

          </div>

          <div class="info-box">

            <h2 class="vehicle-title">
              ${title}
            </h2>

            <div class="spec-grid">

              <div class="spec">
                <strong>Year:</strong>
                ${v.year || "-"}
              </div>

              <div class="spec">
                <strong>Make:</strong>
                ${v.make || "-"}
              </div>

              <div class="spec">
                <strong>Model:</strong>
                ${v.model || "-"}
              </div>

              <div class="spec">
                <strong>Mileage:</strong>
                ${v.mileage || "-"}
              </div>

              <div class="spec">
                <strong>Province:</strong>
                ${
  v.province ||
  (
    String(v.location || "").includes(",")
      ? String(v.location).split(",").pop().trim()
      : "-"
  )
}
              </div>

              <div class="spec">
                <strong>Location:</strong>
                ${v.location || "-"}
              </div>

              <div class="spec">
                <strong>Dealer:</strong>
                ${dealerName}
              </div>

            </div>

            <div class="description">
              ${v.description || "No description available."}
            </div>

          </div>

        </div>

        <div class="side-box">

          <div class="dealer-name">
            ${dealerName}
          </div>

          <div class="price">
            ${formatPrice(v.price)}
          </div>

          <a
            href="${callLink(dealerPhone)}"
            onclick="trackVehicleClick('call', currentVehicle)"
            class="btn btn-call"
          >
            Call Dealer
          </a>
<div style="
  text-align:center;
  font-size:14px;
  font-weight:700;
  color:#333;
  margin-top:6px;
  margin-bottom:10px;
">
  ${dealerPhone}
</div>
          <a
            href="${whatsappLink(dealerPhone, title)}"
            onclick="trackVehicleClick('whatsapp', currentVehicle)"
            target="_blank"
            class="btn btn-whatsapp"
          >
            WhatsApp
          </a>

          <button
            class="btn btn-enquire"
            onclick="openEnquire()"
          >
            Enquire
          </button>

          <a
            href="${dealerStockLink(v)}"
            class="btn btn-dealer"
          >
            View Dealer Stock
          </a>

        </div>

      </div>
    `;

    setStatus(
      "Vehicle loaded successfully."
    );

  } catch(err){

    console.log(err);

    setStatus(
      "Could not load vehicle."
    );
  }
}

loadVehicle();
</script>

</body>
</html>
