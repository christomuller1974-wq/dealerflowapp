<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vehicle Details</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #e5e7eb;
      color: #111827;
    }

    .container {
      max-width: 860px;
      margin: 20px auto;
      padding: 20px;
    }

    .card {
      background: #f8fafc;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .main-image {
      width: 100%;
      height: 420px;
      object-fit: cover;
      border-radius: 16px;
      background: #cbd5e1;
      margin-bottom: 14px;
    }

    .thumbs {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: 10px;
      margin-bottom: 18px;
    }

    .thumbs img {
      width: 100%;
      height: 90px;
      object-fit: cover;
      border-radius: 10px;
      cursor: pointer;
      border: 2px solid transparent;
    }

    .title {
      font-size: 32px;
      font-weight: bold;
      line-height: 1.15;
      margin-bottom: 12px;
    }

    .year-badge {
      display: inline-block;
      background: #dbeafe;
      color: #1d4ed8;
      font-weight: bold;
      padding: 8px 12px;
      border-radius: 999px;
      margin-bottom: 14px;
      font-size: 14px;
    }

    .price {
      font-size: 34px;
      font-weight: bold;
      color: #c53030;
      margin-bottom: 18px;
    }

    .meta {
      font-size: 18px;
      line-height: 1.6;
      margin-bottom: 10px;
    }

    .meta strong {
      color: #000;
    }

    .action-btn {
      display: block;
      width: 100%;
      box-sizing: border-box;
      text-align: center;
      text-decoration: none;
      color: white;
      font-weight: bold;
      padding: 16px;
      border-radius: 16px;
      margin-top: 14px;
      font-size: 18px;
    }

    .call-btn {
      background: #3f5cc9;
    }

    .wa-btn {
      background: #66cc6a;
    }

    .back-btn {
      background: #0f172a;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="card">
      <img id="mainImage" class="main-image" src="" alt="Vehicle image">
      <div id="thumbs" class="thumbs"></div>

      <div id="title" class="title"></div>
      <div id="year" class="year-badge"></div>
      <div id="price" class="price"></div>

      <div class="meta"><strong>Mileage:</strong> <span id="mileage"></span></div>
      <div class="meta"><strong>Location:</strong> <span id="location"></span></div>
      <div class="meta"><strong>Dealer:</strong> <span id="dealer"></span></div>
      <div class="meta"><strong>Phone:</strong> <span id="phone"></span></div>

      <a id="callBtn" class="action-btn call-btn" href="#">📞 Call Dealer</a>
      <a id="waBtn" class="action-btn wa-btn" href="#" target="_blank">💬 WhatsApp Dealer</a>
      <a href="index.html" class="action-btn back-btn">← Back to Listings</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseUrl = "https://ddmvzypiccryjndcwlre.supabase.co";
    const supabaseKey = "sb_publishable_D7saHOTE_JhSlMnSgBnIhQ_mOAOUD9s";
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    function getVehicleId() {
      const params = new URLSearchParams(window.location.search);
      return params.get("id");
    }

    function normalisePhone(phone) {
      return String(phone || "").replace(/\s+/g, "");
    }

    function setMainImage(url) {
      document.getElementById("mainImage").src = url || "";
    }

    function renderThumbs(imagesString, mainImage) {
      const thumbs = document.getElementById("thumbs");
      thumbs.innerHTML = "";

      let images = [];
      if (imagesString && imagesString.trim() !== "") {
        images = imagesString.split(",").map(x => x.trim()).filter(Boolean);
      }

      if (!images.length && mainImage) {
        images = [mainImage];
      }

      images.forEach(url => {
        const img = document.createElement("img");
        img.src = url;
        img.onclick = function() {
          setMainImage(url);
        };
        thumbs.appendChild(img);
      });
    }

    async function loadVehicle() {
      const id = getVehicleId();

      if (!id) {
        document.body.innerHTML = "<p style='padding:20px;'>No vehicle selected.</p>";
        return;
      }

      const { data, error } = await supabase
        .from("vehicles")
        .select("*")
        .eq("id", id)
        .single();

      if (error || !data) {
        console.log(error);
        document.body.innerHTML = "<p style='padding:20px;'>Vehicle not found.</p>";
        return;
      }

      const phoneClean = normalisePhone(data.phone);
      const whatsappLink = "https://wa.me/27" + phoneClean.replace(/^0/, "") + "?text=" + encodeURIComponent("Hi, I'm interested in the " + (data.title || "vehicle"));

      document.getElementById("title").textContent = data.title || "";
      document.getElementById("year").textContent = "Year: " + (data.year || "Not set");
      document.getElementById("price").textContent = "R" + (data.price || "");
      document.getElementById("mileage").textContent = (data.mileage || "") + " km";
      document.getElementById("location").textContent = data.location || "";
      document.getElementById("dealer").textContent = data.dealer || "";
      document.getElementById("phone").textContent = data.phone || "";

      document.getElementById("callBtn").href = "tel:" + phoneClean;
      document.getElementById("waBtn").href = whatsappLink;

      setMainImage(data.image || "");
      renderThumbs(data.images || "", data.image || "");
    }

    loadVehicle();
  </script>

</body>
</html>
