<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vehicle Details</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #eef1f5;
  color: #111827;
}

.hero {
  background: #3156c7;
  color: white;
  text-align: center;
  padding: 26px 15px;
}

.hero h1 {
  margin: 0;
  font-size: 34px;
  font-weight: 800;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 18px;
}

.top-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}

.top-btn {
  text-decoration: none;
  background: #111827;
  color: white;
  padding: 10px 14px;
  border-radius: 10px;
  font-size: 13px;
  font-weight: 800;
}

.top-btn.blue { background: #3156c7; }

.status {
  background: white;
  padding: 12px 14px;
  border-radius: 12px;
  margin-bottom: 16px;
  font-weight: 800;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.layout {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 20px;
  align-items: start;
}

.gallery-box,
.info-box,
.side-box {
  background: white;
  border-radius: 16px;
  padding: 14px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.10);
}

.main-image-wrap {
  background: #f1f5f9;
  border-radius: 14px;
  overflow: hidden;
  position: relative;
}

.main-image {
  width: 100%;
  height: 390px;
  object-fit: contain;
  background: #f1f5f9;
  display: block;
  cursor: zoom-in;
}

.image-badge,
.fullscreen-badge {
  position: absolute;
  bottom: 12px;
  background: rgba(17,24,39,0.85);
  color: white;
  padding: 7px 10px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 800;
}

.image-badge { left: 12px; }
.fullscreen-badge { right: 12px; }

.thumb-row {
  display: flex;
  gap: 10px;
  overflow-x: auto;
  padding: 12px 2px 4px;
}

.thumb {
  width: 92px;
  height: 68px;
  object-fit: cover;
  border-radius: 10px;
  cursor: pointer;
  border: 3px solid transparent;
  background: #e5e7eb;
  flex: 0 0 auto;
}

.thumb.active { border-color: #3156c7; }

.side-box {
  position: sticky;
  top: 18px;
}

.dealer-name {
  font-size: 22px;
  font-weight: 900;
  margin-bottom: 12px;
}

.price {
  color: #dc2626;
  font-size: 30px;
  font-weight: 900;
  margin: 8px 0 16px;
}

.btn {
  display: block;
  width: 100%;
  text-align: center;
  text-decoration: none;
  color: white;
  border: none;
  border-radius: 12px;
  padding: 13px;
  margin-top: 10px;
  font-size: 15px;
  font-weight: 900;
  cursor: pointer;
}

.btn-call { background: #111827; }
.btn-whatsapp { background: #25d366; }
.btn-dealer { background: #3156c7; }
.btn-enquire { background: #0ea5e9; }

.info-box { margin-top: 18px; }

.vehicle-title {
  font-size: 30px;
  font-weight: 900;
  margin: 0 0 12px;
}

.spec-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.spec {
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  border-radius: 12px;
  padding: 12px;
  font-size: 15px;
  color: #334155;
}

.description {
  margin-top: 18px;
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  border-radius: 12px;
  padding: 14px;
  line-height: 1.6;
  white-space: pre-wrap;
  color: #334155;
}

.modal {
  display: none;
  position: fixed;
  z-index: 9999;
  inset: 0;
  background: rgba(0,0,0,0.93);
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.modal.show { display: flex; }

.modal-img {
  max-width: 94vw;
  max-height: 84vh;
  object-fit: contain;
  border-radius: 12px;
}

.modal-close,
.modal-prev,
.modal-next {
  position: fixed;
  border: none;
  color: white;
  background: rgba(17,24,39,0.85);
  cursor: pointer;
  font-weight: 900;
  z-index: 10000;
}

.modal-close {
  top: 18px;
  right: 18px;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  font-size: 28px;
}

.modal-prev,
.modal-next {
  top: 50%;
  transform: translateY(-50%);
  width: 54px;
  height: 70px;
  border-radius: 14px;
  font-size: 34px;
}

.modal-prev { left: 18px; }
.modal-next { right: 18px; }

.modal-count {
  position: fixed;
  bottom: 18px;
  left: 50%;
  transform: translateX(-50%);
  color: white;
  background: rgba(17,24,39,0.85);
  padding: 9px 14px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 800;
}

.enquire-box {
  background: white;
  max-width: 430px;
  width: 100%;
  border-radius: 16px;
  padding: 20px;
}

.enquire-box h2 {
  margin: 0 0 14px;
}

.enquire-box input,
.enquire-box textarea {
  width: 100%;
  padding: 12px;
  margin-bottom: 10px;
  border-radius: 10px;
  border: 1px solid #cbd5e1;
  font-size: 15px;
}

.enquire-box textarea {
  min-height: 110px;
  resize: vertical;
}

.empty-box {
  background: white;
  border-radius: 14px;
  padding: 24px;
  text-align: center;
  color: #475569;
  font-weight: 800;
}

@media(max-width: 900px) {
  .container {
    padding: 10px;
  }

  .layout {
    grid-template-columns: 1fr;
  }

  .gallery-box,
  .info-box,
  .side-box {
    padding: 10px;
    border-radius: 14px;
  }

  .side-box {
    position: static;
  }

  .main-image-wrap {
    max-width: 100%;
    overflow: hidden;
  }

  .main-image {
    height: 230px;
    width: 100%;
    max-width: 100%;
    object-fit: contain;
  }

  .thumb-row {
    gap: 8px;
    overflow-x: auto;
  }

  .thumb {
    width: 76px;
    height: 56px;
  }

  .vehicle-title {
    font-size: 24px;
  }

  .spec-grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>

<body>

<div class="hero">
  <h1>Vehicle Details</h1>
</div>

<div class="container">
  <div class="top-actions">
    <a href="index.html" class="top-btn">Back to Website</a>
    <a href="dealer-admin.html" class="top-btn blue">Dealer Login</a>
  </div>

  <div id="status" class="status">Loading vehicle details...</div>
  <div id="content"></div>
</div>

<div id="imageModal" class="modal">
  <button class="modal-close" onclick="closeModal()">×</button>
  <button class="modal-prev" onclick="prevImage()">‹</button>
  <img id="modalImage" class="modal-img" src="">
  <button class="modal-next" onclick="nextImage()">›</button>
  <div id="modalCount" class="modal-count"></div>
</div>

<div id="enquireModal" class="modal">
  <div class="enquire-box">
    <h2>Enquire about this vehicle</h2>

    <input id="enqName" placeholder="Your Name">
    <input id="enqPhone" placeholder="Your Phone">
    <textarea id="enqMsg">Hi, I'm interested in this vehicle.</textarea>

    <button class="btn btn-whatsapp" onclick="sendEnquiry()">Send via WhatsApp</button>
    <button class="btn btn-call" onclick="closeEnquire()">Cancel</button>
  </div>
</div>

<script>
const supabaseUrl = "https://ddmvzypiccryjndcwlre.supabase.co";
const supabaseKey = "sb_publishable_D7saHOTE_JhSlMnSgBnIhQ_mOAOUD9s";

let images = [];
let current = 0;
let currentVehicle = null;
let currentTitle = "";

function setStatus(message) {
  document.getElementById("status").textContent = message;
}

function getId() {
  return new URLSearchParams(window.location.search).get("id");
}

function formatPrice(price) {
  const num = Number(String(price || "").replace(/\D/g, ""));
  if (!num) return "R0";
  return "R" + num.toLocaleString("en-ZA");
}

function cleanPhone(phone) {
  return String(phone || "").replace(/\s+/g, "");
}

function callLink(phone) {
  const phoneClean = cleanPhone(phone);
  if (!phoneClean) return "#";
  return "tel:" + phoneClean;
}

function whatsappLink(phone, title) {
  const phoneClean = cleanPhone(phone);
  if (!phoneClean) return "#";
  return "https://wa.me/27" + phoneClean.replace(/^0/, "") +
    "?text=" + encodeURIComponent("Hi, I'm interested in the " + (title || "vehicle") + ".");
}

function dealerStockLink(vehicle) {
  const dealerName = vehicle.dealer || vehicle.dealer_name || "Dealer";
  return "dealer.html?dealer=" + encodeURIComponent(dealerName);
}

function getImages(vehicle) {
  const arr = [];

  if (vehicle.image && String(vehicle.image).trim()) {
    arr.push(String(vehicle.image).trim());
  }

  if (vehicle.images && String(vehicle.images).trim()) {
    String(vehicle.images)
      .split(",")
      .map(x => x.trim())
      .filter(Boolean)
      .forEach(url => {
        if (!arr.includes(url)) arr.push(url);
      });
  }

  if (!arr.length) {
    arr.push("https://via.placeholder.com/900x600?text=No+Image");
  }

  return arr;
}

function setMain(index) {
  current = index;

  const main = document.getElementById("mainImage");
  if (main) main.src = images[current];

  document.querySelectorAll(".thumb").forEach((thumb, i) => {
    thumb.classList.toggle("active", i === current);
  });

  const badge = document.getElementById("imageBadge");
  if (badge) badge.textContent = "📷 " + (current + 1) + " / " + images.length;
}

function openModal(index) {
  current = index;
  updateModal();
  document.getElementById("imageModal").classList.add("show");
}

function closeModal() {
  document.getElementById("imageModal").classList.remove("show");
}

function updateModal() {
  document.getElementById("modalImage").src = images[current];
  document.getElementById("modalCount").textContent = (current + 1) + " / " + images.length;
}

function nextImage() {
  if (!images.length) return;
  current = (current + 1) % images.length;
  updateModal();
  setMain(current);
}

function prevImage() {
  if (!images.length) return;
  current = (current - 1 + images.length) % images.length;
  updateModal();
  setMain(current);
}

function openEnquire() {
  document.getElementById("enquireModal").classList.add("show");
}

function closeEnquire() {
  document.getElementById("enquireModal").classList.remove("show");
}

function sendEnquiry() {
  if (!currentVehicle) {
    alert("Vehicle not ready yet.");
    return;
  }

  const name = document.getElementById("enqName").value.trim();
  const phone = document.getElementById("enqPhone").value.trim();
  const msg = document.getElementById("enqMsg").value.trim();

  if (!name || !phone || !msg) {
    alert("Please fill in your name, phone and message.");
    return;
  }

  const dealerPhone = cleanPhone(currentVehicle.phone);

  if (!dealerPhone) {
    alert("Dealer phone number missing.");
    return;
  }

  const fullMsg =
`Vehicle enquiry: ${currentTitle}
Price: ${formatPrice(currentVehicle.price)}
From: ${name}
Phone: ${phone}

${msg}`;

  const url = "https://wa.me/27" + dealerPhone.replace(/^0/, "") +
    "?text=" + encodeURIComponent(fullMsg);

  window.open(url, "_blank");
  closeEnquire();
}

document.addEventListener("keydown", function(event) {
  const imageModal = document.getElementById("imageModal");
  const enquireModal = document.getElementById("enquireModal");

  if (event.key === "Escape") {
    imageModal.classList.remove("show");
    enquireModal.classList.remove("show");
  }

  if (!imageModal.classList.contains("show")) return;

  if (event.key === "ArrowRight") nextImage();
  if (event.key === "ArrowLeft") prevImage();
});

document.getElementById("imageModal").addEventListener("click", function(event) {
  if (event.target.id === "imageModal") closeModal();
});

document.getElementById("enquireModal").addEventListener("click", function(event) {
  if (event.target.id === "enquireModal") closeEnquire();
});

async function loadVehicle() {
  const id = getId();

  if (!id) {
    setStatus("Missing vehicle ID.");
    document.getElementById("content").innerHTML =
      '<div class="empty-box">Vehicle not found.</div>';
    return;
  }

  try {
    const res = await fetch(
      supabaseUrl + "/rest/v1/active_vehicles?select=*&id=eq." + encodeURIComponent(id),
      {
        headers: {
          apikey: supabaseKey,
          Authorization: "Bearer " + supabaseKey
        }
      }
    );

    const data = await res.json();
    const v = Array.isArray(data) ? data[0] : null;

    if (!v) {
      setStatus("Vehicle not found.");
      document.getElementById("content").innerHTML =
        '<div class="empty-box">Vehicle not found.</div>';
      return;
    }

    currentVehicle = v;

    images = getImages(v);
    current = 0;

    const fallbackTitle = [v.year, v.make, v.model].filter(Boolean).join(" ");
    const title = v.title || fallbackTitle || "Vehicle";
    currentTitle = title;

    const dealerName = v.dealer || v.dealer_name || "Dealer";

    let thumbs = "";
    images.forEach((img, i) => {
      thumbs += `
        <img
          src="${img}"
          class="thumb ${i === 0 ? "active" : ""}"
          onclick="setMain(${i})"
          onerror="this.src='https://via.placeholder.com/120x90?text=No+Image'"
        >
      `;
    });

    document.getElementById("content").innerHTML = `
      <div class="layout">

        <div>
          <div class="gallery-box">
            <div class="main-image-wrap">
              <img
                id="mainImage"
                src="${images[0]}"
                class="main-image"
                alt="${title}"
                onclick="openModal(current)"
                onerror="this.src='https://via.placeholder.com/900x600?text=No+Image'"
              >
              <div id="imageBadge" class="image-badge">📷 1 / ${images.length}</div>
              <div class="fullscreen-badge">🔍 Fullscreen</div>
            </div>

            <div class="thumb-row">
              ${thumbs}
            </div>
          </div>

          <div class="info-box">
            <h2 class="vehicle-title">${title}</h2>

            <div class="spec-grid">
              <div class="spec"><strong>Year:</strong> ${v.year || "-"}</div>
              <div class="spec"><strong>Make:</strong> ${v.make || "-"}</div>
              <div class="spec"><strong>Model:</strong> ${v.model || "-"}</div>
              <div class="spec"><strong>Mileage:</strong> ${v.mileage || "-"}</div>
              <div class="spec"><strong>Location:</strong> ${v.location || "-"}</div>
              <div class="spec"><strong>Dealer:</strong> ${dealerName}</div>
              <div class="spec"><strong>Phone:</strong> ${v.phone || "-"}</div>
            </div>

            <div class="description">${v.description || "No description available."}</div>
          </div>
        </div>

        <div class="side-box">
          <div class="dealer-name">${dealerName}</div>
          <div class="price">${formatPrice(v.price)}</div>

          <a href="${callLink(v.phone)}" class="btn btn-call">Call Dealer</a>
          <a href="${whatsappLink(v.phone, title)}" target="_blank" class="btn btn-whatsapp">WhatsApp</a>
          <button class="btn btn-enquire" onclick="openEnquire()">Enquire</button>
          <a href="${dealerStockLink(v)}" class="btn btn-dealer">View Dealer Stock</a>
        </div>

      </div>
    `;

    setStatus("Vehicle details loaded.");
  } catch (err) {
    console.error(err);
    setStatus("Could not load vehicle details.");
    document.getElementById("content").innerHTML =
      '<div class="empty-box">Could not load vehicle details.</div>';
  }
}

window.setMain = setMain;
window.openModal = openModal;
window.closeModal = closeModal;
window.nextImage = nextImage;
window.prevImage = prevImage;
window.openEnquire = openEnquire;
window.closeEnquire = closeEnquire;
window.sendEnquiry = sendEnquiry;

loadVehicle();
</script>

</body>
</html>
