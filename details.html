<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Vehicle Details</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #dfe3ea;
      color: #111827;
    }

    .hero {
      background: linear-gradient(135deg, #3156c7, #1f3f9e);
      color: white;
      text-align: center;
      padding: 30px 18px 22px;
    }

    .hero h1 {
      margin: 0;
      font-size: 34px;
      font-weight: 800;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 18px;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .top-btn {
      display: inline-block;
      text-decoration: none;
      background: #1f2937;
      color: white;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
    }

    .top-btn.blue {
      background: #3156c7;
    }

    .status {
      background: white;
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 16px;
      font-weight: bold;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .details-card {
      background: white;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.10);
    }

    .gallery-main {
      width: 100%;
      height: 420px;
      object-fit: cover;
      border-radius: 14px;
      background: #e5e7eb;
      display: block;
      margin-bottom: 14px;
    }

    .thumb-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .thumb {
      width: 110px;
      height: 80px;
      object-fit: cover;
      border-radius: 10px;
      cursor: pointer;
      border: 2px solid transparent;
      background: #e5e7eb;
    }

    .thumb.active {
      border-color: #3156c7;
    }

    .vehicle-title {
      font-size: 30px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .price {
      color: #dc2626;
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 14px;
    }

    .meta {
      font-size: 15px;
      color: #334155;
      margin-bottom: 8px;
    }

    .description {
      margin-top: 16px;
      line-height: 1.6;
      color: #334155;
      white-space: pre-wrap;
    }

    .button-stack {
      display: grid;
      gap: 10px;
      margin-top: 18px;
    }

    .btn {
      display: block;
      width: 100%;
      text-align: center;
      text-decoration: none;
      color: white;
      padding: 12px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 14px;
    }

    .btn-green { background: #16a34a; }
    .btn-dark { background: #1f2937; }
    .btn-whatsapp { background: #25d366; }

    .empty-box {
      background: white;
      border-radius: 14px;
      padding: 24px;
      text-align: center;
      color: #475569;
      font-weight: 700;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    @media (max-width: 700px) {
      .gallery-main {
        height: 260px;
      }

      .vehicle-title {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>

  <div class="hero">
    <h1>Vehicle Details</h1>
  </div>

  <div class="container">
    <div class="top-actions">
      <a href="index.html" class="top-btn">Back to Website</a>
      <a href="dealer-admin.html" class="top-btn blue">Dealer Login</a>
    </div>

    <div id="status" class="status">Loading vehicle details...</div>
    <div id="detailsWrap"></div>
  </div>

  <script>
    const supabaseUrl = "https://ddmvzypiccryjndcwlre.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkbXZ6eXBpY2NyeWpuZGN3bHJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NTQ2NzYsImV4cCI6MjA5MTQzMDY3Nn0.mNkODdvX8gllTZeqfr7nllMWfF7ATdj9MY-EKEE3G6w";

    function setStatus(message) {
      document.getElementById("status").textContent = message;
    }

    function getIdFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get("id");
    }

    function cleanPhone(phone) {
      return String(phone || "").replace(/\s+/g, "");
    }

    function whatsappLink(phone, title) {
      const phoneClean = cleanPhone(phone);
      if (!phoneClean) return "#";
      return "https://wa.me/27" + phoneClean.replace(/^0/, "") +
        "?text=" + encodeURIComponent("Hi, I'm interested in the " + (title || "vehicle") + ".");
    }

    function callLink(phone) {
      const phoneClean = cleanPhone(phone);
      if (!phoneClean) return "#";
      return "tel:" + phoneClean;
    }

    function dealerStockLink(vehicle) {
      const dealerName = vehicle.dealer || vehicle.dealer_name || "Dealer";
      return "dealer.html?dealer=" + encodeURIComponent(dealerName);
    }

    function getImages(vehicle) {
      const images = [];

      if (vehicle.image && String(vehicle.image).trim()) {
        images.push(String(vehicle.image).trim());
      }

      if (vehicle.images && String(vehicle.images).trim()) {
        String(vehicle.images)
          .split(",")
          .map(x => x.trim())
          .filter(Boolean)
          .forEach(url => {
            if (!images.includes(url)) {
              images.push(url);
            }
          });
      }

      if (!images.length) {
        images.push("https://via.placeholder.com/800x500?text=No+Image");
      }

      return images;
    }

    async function loadVehicleDetails() {
      const vehicleId = getIdFromUrl();
      const detailsWrap = document.getElementById("detailsWrap");

      if (!vehicleId) {
        setStatus("Missing vehicle ID.");
        detailsWrap.innerHTML = '<div class="empty-box">Vehicle not found.</div>';
        return;
      }

      try {
        const url =
          supabaseUrl +
          "/rest/v1/active_vehicles?select=*&id=eq." +
          encodeURIComponent(vehicleId);

        const res = await fetch(url, {
          headers: {
            apikey: supabaseKey,
            Authorization: "Bearer " + supabaseKey
          }
        });

        const data = await res.json();
        const vehicle = Array.isArray(data) ? data[0] : null;

        if (!vehicle) {
          setStatus("Vehicle not found.");
          detailsWrap.innerHTML = '<div class="empty-box">Vehicle not found.</div>';
          return;
        }

        const images = getImages(vehicle);
        const fallbackTitle = [vehicle.year, vehicle.make, vehicle.model].filter(Boolean).join(" ");
        const title = vehicle.title || fallbackTitle || "No Title";

        detailsWrap.innerHTML = `
          <div class="details-card">
            <img id="mainImage" src="${images[0]}" class="gallery-main" alt="${title}" onerror="this.src='https://via.placeholder.com/800x500?text=No+Image'">

            <div class="thumb-row" id="thumbRow"></div>

            <div class="vehicle-title">${title}</div>
            <div class="price">R${vehicle.price || 0}</div>

            <div class="meta"><strong>Year:</strong> ${vehicle.year || "-"}</div>
            <div class="meta"><strong>Make:</strong> ${vehicle.make || "-"}</div>
            <div class="meta"><strong>Model:</strong> ${vehicle.model || "-"}</div>
            <div class="meta"><strong>Mileage:</strong> ${vehicle.mileage || "-"}</div>
            <div class="meta"><strong>Location:</strong> ${vehicle.location || "-"}</div>
            <div class="meta"><strong>Dealer:</strong> ${vehicle.dealer || "-"}</div>
            <div class="meta"><strong>Phone:</strong> ${vehicle.phone || "-"}</div>

            <div class="description">${vehicle.description || "No description available."}</div>

            <div class="button-stack">
              <a href="${dealerStockLink(vehicle)}" class="btn btn-green">Dealer Stock</a>
              <a href="${callLink(vehicle.phone)}" class="btn btn-dark">Call Dealer</a>
              <a href="${whatsappLink(vehicle.phone, title)}" target="_blank" class="btn btn-whatsapp">WhatsApp</a>
            </div>
          </div>
        `;

        const thumbRow = document.getElementById("thumbRow");
        const mainImage = document.getElementById("mainImage");

        images.forEach((img, index) => {
          const thumb = document.createElement("img");
          thumb.src = img;
          thumb.className = "thumb" + (index === 0 ? " active" : "");
          thumb.alt = "Vehicle image " + (index + 1);
          thumb.onerror = function () {
            this.src = "https://via.placeholder.com/120x90?text=No+Image";
          };
          thumb.onclick = function () {
            mainImage.src = img;
            document.querySelectorAll(".thumb").forEach(t => t.classList.remove("active"));
            thumb.classList.add("active");
          };
          thumbRow.appendChild(thumb);
        });

        setStatus("Vehicle details loaded.");
      } catch (err) {
        console.error(err);
        setStatus("Could not load vehicle details.");
        detailsWrap.innerHTML = '<div class="empty-box">Could not load vehicle details.</div>';
      }
    }

    loadVehicleDetails();
  </script>

</body>
</html>
