<!DOCTYPE html>
<html>
<head>
  <title>Vehicle Details</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #e5e7eb;
    }

    .hero {
      background: #2f55c7;
      color: white;
      padding: 20px;
    }

    .hero h1 {
      margin: 0;
    }

    .container {
      max-width: 1200px;
      margin: 20px auto;
      padding: 15px;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    .card {
      background: white;
      border-radius: 15px;
      padding: 15px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    /* IMAGE FIX */
    .main-image-wrap {
      height: 350px;
      background: #ddd;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .main-image {
      width: 100%;
      height: 100%;
      object-fit: contain; /* IMPORTANT FIX */
    }

    .thumbs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-top: 10px;
    }

    .thumb-wrap {
      height: 80px;
      background: #eee;
      border-radius: 8px;
      overflow: hidden;
    }

    .thumb-wrap img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      cursor: pointer;
    }

    .title {
      font-size: 24px;
      font-weight: bold;
    }

    .price {
      font-size: 26px;
      color: red;
      font-weight: bold;
      margin: 10px 0;
    }

    .btn {
      display: block;
      padding: 12px;
      border-radius: 10px;
      text-align: center;
      margin-top: 8px;
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    .call { background: #3f5cc9; }
    .wa { background: #25d366; }
    .dealer { background: green; }
    .back { background: black; }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    textarea {
      height: 100px;
    }

    .status {
      margin-top: 10px;
      padding: 10px;
      background: #eee;
      border-radius: 8px;
    }

    @media (min-width: 900px) {
      .layout {
        grid-template-columns: 1.2fr 0.8fr;
      }
    }

  </style>
</head>

<body>

<div class="hero">
  <h1>Vehicle Details</h1>
</div>

<div class="container">
  <div class="layout">

    <!-- LEFT -->
    <div class="card">
      <div class="main-image-wrap">
        <img id="mainImage" class="main-image">
      </div>

      <div id="thumbs" class="thumbs"></div>
    </div>

    <!-- RIGHT -->
    <div>

      <div class="card">
        <div id="title" class="title"></div>
        <div id="price" class="price"></div>

        <p id="year"></p>
        <p id="mileage"></p>
        <p id="location"></p>
        <p id="dealer"></p>
        <p id="phone"></p>

        <a id="callBtn" class="btn call">Call Dealer</a>
        <a id="waBtn" class="btn wa">WhatsApp Dealer</a>
        <a id="dealerBtn" class="btn dealer">View Dealer Stock</a>
        <a href="index.html" class="btn back">Back</a>
      </div>

      <div class="card">
        <h3>Send Enquiry</h3>

        <input id="name" placeholder="Your Name">
        <input id="phoneInput" placeholder="Phone Number">
        <textarea id="message"></textarea>

        <button onclick="sendEnquiry()" class="btn call">Send</button>

        <div id="status" class="status"></div>
      </div>

    </div>

  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const vehicles = JSON.parse(localStorage.getItem("vehicles") || "[]");
const v = vehicles.find(x => x.id == id);

if (!v) {
  alert("Vehicle not found");
}

document.getElementById("title").innerText = v.title;
document.getElementById("price").innerText = "R" + v.price;
document.getElementById("year").innerText = "Year: " + v.year;
document.getElementById("mileage").innerText = "Mileage: " + v.mileage;
document.getElementById("location").innerText = "Location: " + v.location;
document.getElementById("dealer").innerText = "Dealer: " + v.dealer;
document.getElementById("phone").innerText = "Phone: " + v.phone;

document.getElementById("callBtn").href = "tel:" + v.phone;
document.getElementById("waBtn").href = "https://wa.me/" + v.phone;

document.getElementById("dealerBtn").href =
  "dealer.html?dealer=" + encodeURIComponent(v.dealer);

const mainImage = document.getElementById("mainImage");
mainImage.src = v.images[0];

const thumbs = document.getElementById("thumbs");

v.images.forEach(img => {
  const wrap = document.createElement("div");
  wrap.className = "thumb-wrap";

  const image = document.createElement("img");
  image.src = img;

  image.onclick = () => {
    mainImage.src = img;
  };

  wrap.appendChild(image);
  thumbs.appendChild(wrap);
});

function sendEnquiry() {
  const name = document.getElementById("name").value;
  const phone = document.getElementById("phoneInput").value;
  const message = document.getElementById("message").value;

  const enquiries = JSON.parse(localStorage.getItem("enquiries") || "[]");

  enquiries.push({
    vehicle: v.title,
    dealer: v.dealer,
    name,
    phone,
    message
  });

  localStorage.setItem("enquiries", JSON.stringify(enquiries));

  document.getElementById("status").innerText = "Enquiry sent!";
}
</script>

</body>
</html>
