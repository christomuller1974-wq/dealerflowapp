<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vehicle Details</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #e5e7eb;
      color: #111827;
    }

    .hero {
      background: #2f55c7;
      color: white;
      padding: 28px 20px;
    }

    .hero h1 {
      margin: 0 0 10px 0;
      font-size: 42px;
    }

    .hero p {
      margin: 0;
      font-size: 18px;
    }

    .container {
      max-width: 1100px;
      margin: 20px auto;
      padding: 0 20px 30px 20px;
    }

    .card {
      background: #f8fafc;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      margin-bottom: 20px;
    }

    .main-image {
      width: 100%;
      height: 220px;
      object-fit: cover;
      border-radius: 16px;
      background: #cbd5e1;
      margin-bottom: 14px;
      display: block;
    }

    .thumbs {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
      gap: 10px;
      margin-bottom: 18px;
    }

    .thumbs img {
      width: 100%;
      height: 80px;
      object-fit: cover;
      border-radius: 10px;
      cursor: pointer;
      background: #cbd5e1;
      border: 2px solid transparent;
    }

    .title {
      font-size: 30px;
      font-weight: bold;
      line-height: 1.2;
      margin-bottom: 12px;
    }

    .year-badge {
      display: inline-block;
      background: #dbeafe;
      color: #1d4ed8;
      font-weight: bold;
      padding: 8px 12px;
      border-radius: 999px;
      margin-bottom: 14px;
      font-size: 14px;
    }

    .price {
      font-size: 32px;
      font-weight: bold;
      color: #c53030;
      margin-bottom: 18px;
    }

    .meta {
      font-size: 17px;
      line-height: 1.6;
      margin-bottom: 10px;
    }

    .meta strong {
      color: #000;
    }

    .meta a {
      color: #1d4ed8;
      text-decoration: none;
      font-weight: bold;
    }

    .action-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 18px;
    }

    .action-btn {
      display: block;
      width: 100%;
      box-sizing: border-box;
      text-align: center;
      text-decoration: none;
      color: white;
      font-weight: bold;
      padding: 15px;
      border-radius: 14px;
      font-size: 17px;
      border: none;
      cursor: pointer;
    }

    .call-btn {
      background: #3f5cc9;
    }

    .wa-btn {
      background: #66cc6a;
    }

    .dealer-btn {
      background: #16a34a;
    }

    .back-btn {
      background: #0f172a;
    }

    .lead-title {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 14px;
    }

    .lead-text {
      color: #475569;
      margin-bottom: 16px;
      line-height: 1.5;
      font-size: 16px;
    }

    input,
    textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #cbd5e1;
      font-size: 16px;
      margin-bottom: 12px;
      background: white;
      font-family: Arial, sans-serif;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    .status {
      background: #e2e8f0;
      color: #0f172a;
      padding: 12px;
      border-radius: 10px;
      font-weight: bold;
      margin-top: 12px;
      min-height: 20px;
      line-height: 1.4;
    }

    @media (min-width: 768px) {
      .main-image {
        height: 260px;
      }

      .thumbs {
        grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      }

      .thumbs img {
        height: 90px;
      }

      .title {
        font-size: 34px;
      }

      .price {
        font-size: 36px;
      }

      .meta {
        font-size: 18px;
      }

      .action-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 1100px) {
      .main-image {
        height: 300px;
      }
    }
  </style>
</head>
<body>

  <div class="hero">
    <h1>Vehicle Details</h1>
    <p>View this vehicle and contact the dealer</p>
  </div>

  <div class="container">
    <div class="card">
      <img id="image" class="main-image" src="" alt="Vehicle image">
      <div id="thumbs" class="thumbs"></div>

      <div id="title" class="title"></div>
      <div id="year" class="year-badge"></div>
      <div id="price" class="price"></div>

      <div class="meta"><strong>Mileage:</strong> <span id="mileage"></span></div>
      <div class="meta"><strong>Location:</strong> <span id="location"></span></div>
      <div class="meta">
        <strong>Dealer:</strong>
        <a id="dealerLink" href="#"><span id="dealer"></span></a>
      </div>
      <div class="meta"><strong>Phone:</strong> <span id="phone"></span></div>

      <div class="action-grid">
        <a id="callBtn" class="action-btn call-btn" href="#">📞 Call Dealer</a>
        <a id="whatsappBtn" class="action-btn wa-btn" href="#" target="_blank">💬 WhatsApp Dealer</a>
        <a id="dealerStockBtn" class="action-btn dealer-btn" href="#">View Dealer Stock</a>
        <a href="index.html" class="action-btn back-btn">← Back to Listings</a>
      </div>
    </div>

    <div class="card">
      <div class="lead-title">Send an Enquiry</div>
      <div class="lead-text">Interested in this vehicle? Send your details and message directly to the dealer.</div>

      <input type="text" id="buyerName" placeholder="Your Name">
      <input type="text" id="buyerPhone" placeholder="Your Phone Number">
      <textarea id="buyerMessage" placeholder="Your message"></textarea>

      <button id="sendLeadBtn" class="action-btn call-btn" type="button" onclick="sendLead()">Send Enquiry</button>

      <div id="leadStatus" class="status">Ready to send.</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseUrl = "https://ddmvzypiccryjndcwlre.supabase.co";
    const supabaseKey = "sb_publishable_D7saHOTE_JhSlMnSgBnIhQ_mOAOUD9s";
    const client = window.supabase.createClient(supabaseUrl, supabaseKey);

    let currentVehicle = null;

    function getVehicleId() {
      const params = new URLSearchParams(window.location.search);
      return params.get("id");
    }

    function cleanPhone(phone) {
      return String(phone || "").replace(/\s+/g, "");
    }

    function setMainImage(url) {
      document.getElementById("image").src = url || "";
    }

    function setLeadStatus(message) {
      document.getElementById("leadStatus").textContent = message;
    }

    function setLeadSending(isSending) {
      const btn = document.getElementById("sendLeadBtn");
      btn.disabled = isSending;
      btn.textContent = isSending ? "Sending..." : "Send Enquiry";
      btn.style.opacity = isSending ? "0.7" : "1";
      btn.style.cursor = isSending ? "not-allowed" : "pointer";
    }

    function renderThumbs(imagesString, mainImage) {
      const thumbs = document.getElementById("thumbs");
      thumbs.innerHTML = "";

      let images = [];

      if (imagesString && imagesString.trim() !== "") {
        images = imagesString
          .split(",")
          .map(x => x.trim())
          .filter(Boolean);
      }

      if (images.length === 0 && mainImage) {
        images = [mainImage];
      }

      images.forEach(url => {
        const img = document.createElement("img");
        img.src = url;
        img.alt = "Vehicle photo";
        img.onclick = function () {
          setMainImage(url);
        };
        thumbs.appendChild(img);
      });
    }

    async function loadVehicle() {
      const id = getVehicleId();

      if (!id) {
        document.body.innerHTML = "<h2 style='padding:20px;'>Vehicle not found</h2>";
        return;
      }

      const { data, error } = await client
        .from("vehicles")
        .select("*")
        .eq("id", id)
        .single();

      if (error || !data) {
        console.log("Vehicle load error:", error);
        document.body.innerHTML = "<h2 style='padding:20px;'>Vehicle not found</h2>";
        return;
      }

      currentVehicle = data;

      document.getElementById("title").textContent = data.title || "";
      document.getElementById("year").textContent = "Year: " + (data.year || "Not set");
      document.getElementById("price").textContent = "R" + (data.price || "");
      document.getElementById("mileage").textContent = (data.mileage || "") + " km";
      document.getElementById("location").textContent = data.location || "";
      document.getElementById("dealer").textContent = data.dealer || "";
      document.getElementById("phone").textContent = data.phone || "";

      const phoneClean = cleanPhone(data.phone);
      const dealerHref = "dealer.html?dealer=" + encodeURIComponent(data.dealer || "");

      document.getElementById("callBtn").href = "tel:" + phoneClean;
      document.getElementById("whatsappBtn").href =
        "https://wa.me/27" + phoneClean.replace(/^0/, "") +
        "?text=" + encodeURIComponent("Hi, I'm interested in the " + (data.title || "vehicle"));

      document.getElementById("dealerStockBtn").href = dealerHref;
      document.getElementById("dealerLink").href = dealerHref;

      document.getElementById("buyerMessage").value =
        "Hi, I'm interested in the " + (data.title || "vehicle") + ". Please contact me.";

      setMainImage(data.image || "");
      renderThumbs(data.images || "", data.image || "");
    }

    async function sendLead() {
      if (!currentVehicle) {
        setLeadStatus("Vehicle details not loaded yet.");
        return;
      }

      const buyerName = document.getElementById("buyerName").value.trim();
      const buyerPhone = document.getElementById("buyerPhone").value.trim();
      const message = document.getElementById("buyerMessage").value.trim();

      if (!buyerName || !buyerPhone || !message) {
        setLeadStatus("Please fill in your name, phone number, and message.");
        return;
      }

      try {
        setLeadSending(true);
        setLeadStatus("Sending enquiry...");

        const { error } = await client
          .from("leads")
          .insert([{
            vehicle_id: currentVehicle.id,
            vehicle_title: currentVehicle.title || "",
            dealer_name: currentVehicle.dealer || "",
            dealer_phone: currentVehicle.phone || "",
            buyer_name: buyerName,
            buyer_phone: buyerPhone,
            message: message
          }]);

        if (error) {
          console.log("Lead insert error:", error);
          setLeadStatus("Could not send enquiry: " + error.message);
          setLeadSending(false);
          return;
        }

        document.getElementById("buyerName").value = "";
        document.getElementById("buyerPhone").value = "";
        document.getElementById("buyerMessage").value = "";

        setLeadStatus("Enquiry sent successfully.");
        setLeadSending(false);

      } catch (err) {
        console.log("Lead send error:", err);
        setLeadStatus("Something went wrong: " + err.message);
        setLeadSending(false);
      }
    }

    loadVehicle();
  </script>

</body>
</html>
