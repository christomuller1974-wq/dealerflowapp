<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Edit Vehicle</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #dfe3ea;
}

/* HEADER */
.hero {
  background: linear-gradient(135deg,#3156c7,#2042a5);
  color: white;
  text-align: center;
  padding: 25px;
}

.container {
  max-width: 1000px;
  margin: 20px auto;
}

/* BUTTONS */
.top-btn {
  background: #1f2937;
  color: white;
  padding: 10px 14px;
  border-radius: 8px;
  text-decoration: none;
  margin-right: 6px;
  font-weight: bold;
  font-size: 13px;
}

/* STATUS */
.status {
  background: white;
  padding: 12px;
  border-radius: 12px;
  margin-bottom: 15px;
}

/* CARD */
.card {
  background: #f7f7f8;
  padding: 16px;
  border-radius: 18px;
}

/* INPUTS */
input, select, textarea {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ccc;
  margin-bottom: 12px;
}

/* GRID */
.two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

/* PREVIEW GRID */
.preview-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill,minmax(140px,1fr));
  gap: 10px;
}

/* PREVIEW ITEM */
.preview-item {
  background: #eef2f7;
  border-radius: 12px;
  padding: 8px;
  text-align: center;
  min-height: 170px;
}

/* IMAGE FIX */
.preview-item img {
  width: 100%;
  max-height: 120px;
  height: auto;
  object-fit: contain;
  border-radius: 8px;
  background: #e5e7eb;
}

/* SAVE BUTTON */
.save-btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 10px;
  background: #3156c7;
  color: white;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="hero">
  <h1>Edit Vehicle</h1>
</div>

<div class="container">

  <a class="top-btn" href="dealer-admin.html">Back</a>
  <a class="top-btn" href="index.html">Website</a>

  <div id="status" class="status">Loading...</div>

  <div class="card">

    <input type="file" id="vehiclePhotos" multiple>

    <div class="preview-grid" id="preview"></div>

    <input id="title">
    <select id="year"></select>

    <div class="two-col">
      <input id="price">
      <input id="mileage">
    </div>

    <div class="two-col">
      <input id="location">
      <input id="phone">
    </div>

    <textarea id="description"></textarea>

    <button class="save-btn" onclick="save()">Save</button>

  </div>
</div>

<script>
const supabaseUrl = "https://ddmvzypiccryjndcwlre.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkbXZ6eXBpY2NyeWpuZGN3bHJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NTQ2NzYsImV4cCI6MjA5MTQzMDY3Nn0.mNkODdvX8gllTZeqfr7nllMWfF7ATdj9MY-EKEE3G6w";
const client = supabase.createClient(supabaseUrl, supabaseKey);

let vehicle;
let selectedFiles = [];

function setStatus(t){document.getElementById("status").innerText=t;}

function getId(){
  return new URLSearchParams(location.search).get("id");
}

function years(){
  let y=document.getElementById("year");
  for(let i=2026;i>1980;i--){
    let o=document.createElement("option");
    o.value=i;o.text=i;
    y.appendChild(o);
  }
}

function preview(urls){
  let p=document.getElementById("preview");
  p.innerHTML="";

  urls.forEach((u,i)=>{
    p.innerHTML+=`
      <div class="preview-item">
        <img src="${u}">
        ${i==0?"Main":"Extra"}
      </div>`;
  });
}

function getImages(v){
  let arr=[];
  if(v.image) arr.push(v.image);
  if(v.images){
    v.images.split(",").forEach(x=>arr.push(x));
  }
  return arr;
}

document.getElementById("vehiclePhotos").onchange=e=>{
  selectedFiles=[...e.target.files];
  preview(selectedFiles.map(f=>URL.createObjectURL(f)));
};

async function load(){
  let {data}=await client.from("vehicles").select("*").eq("id",getId()).single();

  vehicle=data;

  document.getElementById("title").value=data.title||"";
  document.getElementById("year").value=data.year||"";
  document.getElementById("price").value=data.price||"";
  document.getElementById("mileage").value=data.mileage||"";
  document.getElementById("location").value=data.location||"";
  document.getElementById("phone").value=data.phone||"";
  document.getElementById("description").value=data.description||"";

  preview(getImages(data));

  setStatus("Ready");
}

async function upload(f){
  let name=Date.now()+"-"+f.name;
  await client.storage.from("vehicle-images").upload("vehicles/"+name,f);
  return client.storage.from("vehicle-images").getPublicUrl("vehicles/"+name).data.publicUrl;
}

async function save(){
  setStatus("Saving...");

  let main=vehicle.image;
  let extras=getImages(vehicle).slice(1);

  if(selectedFiles.length>0){
    let urls=[];
    for(let f of selectedFiles){
      urls.push(await upload(f));
    }

    main=urls[0];
    extras=[...extras,...urls.slice(1)];
  }

  await client.from("vehicles").update({
    title:title.value,
    year:year.value,
    price:price.value,
    mileage:mileage.value,
    location:location.value,
    phone:phone.value,
    description:description.value,
    image:main,
    images:extras.join(",")
  }).eq("id",vehicle.id);

  setStatus("Saved!");
}

years();
load();
</script>

</body>
</html>
