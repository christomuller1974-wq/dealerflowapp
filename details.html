<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vehicle Details</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f4f6fb;
}

.hero {
    background: linear-gradient(135deg,#2f55c7,#1e3a8a);
    color: white;
    padding: 20px;
}

.container {
    padding: 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
}

.left {
    flex: 2;
}

.right {
    flex: 1;
}

.card {
    background: white;
    border-radius: 12px;
    padding: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

img {
    width: 100%;
    border-radius: 10px;
}

.price {
    color: red;
    font-size: 24px;
    font-weight: bold;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
}

.call { background: #2563eb; color: white; }
.whatsapp { background: #16a34a; color: white; }
.back { background: #111827; color: white; }

.status {
    background: #fff3cd;
    padding: 10px;
    border-radius: 8px;
    margin: 10px;
}
</style>
</head>

<body>

<div class="hero">
    <h2>Vehicle Details</h2>
</div>

<div id="status" class="status">Loading vehicle...</div>

<div class="container">

    <!-- LEFT -->
    <div class="left card">
        <img id="mainImage" src="">
    </div>

    <!-- RIGHT -->
    <div class="right card">
        <h2 id="title">Loading...</h2>
        <div id="year"></div>
        <div class="price" id="price">R0</div>

        <p><b>Dealer:</b> <span id="dealerName"></span></p>
        <p><b>Phone:</b> <span id="phone"></span></p>

        <p><b>Mileage:</b> <span id="mileage"></span></p>
        <p><b>Location:</b> <span id="location"></span></p>

        <button class="call" id="callBtn">Call Dealer</button>
        <button class="whatsapp" id="whatsappBtn">WhatsApp Dealer</button>
        <button class="back" onclick="window.history.back()">Back</button>
    </div>

</div>

<script>
const supabaseUrl = "https://ddmvzypiccryjndcwlre.supabase.co";
const supabaseKey = "sb_publishable_D7saHOTE_JhSlMnSgBnIhQ_mOAOUD9s";
const client = window.supabase.createClient(supabaseUrl, supabaseKey);

// GET ID FROM URL
function getVehicleId() {
    const params = new URLSearchParams(window.location.search);
    return params.get("id");
}

// LOAD VEHICLE
async function loadVehicle() {
    const id = getVehicleId();

    if (!id) {
        document.getElementById("status").textContent = "No vehicle ID found.";
        return;
    }

    const { data, error } = await client
        .from("vehicles")
        .select("*")
        .eq("id", id)
        .single();

    if (error || !data) {
        document.getElementById("status").textContent = "Vehicle not found.";
        console.error(error);
        return;
    }

    // FILL DATA
    document.getElementById("title").textContent = data.title || "No title";
    document.getElementById("price").textContent = "R" + (data.price || 0);
    document.getElementById("year").textContent = "Year: " + (data.year || "-");
    document.getElementById("mileage").textContent = data.mileage || "-";
    document.getElementById("location").textContent = data.location || "-";
    document.getElementById("dealerName").textContent = data.dealer_name || "Dealer";
    document.getElementById("phone").textContent = data.phone || "-";

    // IMAGE FIX
    if (data.images) {
        document.getElementById("mainImage").src = data.images;
    }

    // CALL BUTTON
    document.getElementById("callBtn").onclick = () => {
        window.location.href = "tel:" + data.phone;
    };

    // WHATSAPP BUTTON
    document.getElementById("whatsappBtn").onclick = () => {
        const msg = encodeURIComponent("Hi, I'm interested in your vehicle: " + data.title);
        window.open(`https://wa.me/${data.phone}?text=${msg}`, "_blank");
    };

    document.getElementById("status").textContent = "";
}

loadVehicle();
</script>

</body>
</html>
