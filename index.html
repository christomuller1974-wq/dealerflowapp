<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DealerFlow</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { box-sizing: border-box; }

body {
  margin:0;
  font-family:Arial, sans-serif;
  background:#f4f6f9;
}

.header {
  background:linear-gradient(135deg,#1e3a8a,#2563eb);
  color:white;
  padding:42px 20px 58px;
  text-align:center;
}

.header h1 {
  margin:0;
  font-size:40px;
  font-weight:900;
}

.header p {
  margin-top:8px;
}

.dealer-login-btn {
  display:inline-block;
  margin-top:20px;
  background:#111827;
  padding:12px 24px;
  border-radius:30px;
  color:white;
  text-decoration:none;
  font-weight:900;
}

.search-bar {
  background:white;
  margin:-34px auto 22px;
  max-width:1050px;
  padding:16px;
  border-radius:16px;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  box-shadow:0 12px 30px rgba(0,0,0,0.10);
}

.search-bar input {
  flex:1;
  min-width:150px;
  padding:12px;
  border-radius:10px;
  border:1px solid #dbe1ea;
  font-size:14px;
}

.search-btn,
.clear-btn {
  color:white;
  border:none;
  padding:12px 22px;
  border-radius:10px;
  cursor:pointer;
  font-weight:900;
}

.search-btn { background:#2563eb; }
.clear-btn { background:#111827; }

.grid {
  max-width:1250px;
  margin:auto;
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(270px,1fr));
  gap:22px;
}

.card {
  background:white;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 8px 25px rgba(0,0,0,0.08);
  transition:0.25s;
}

.card:hover {
  transform:translateY(-5px);
  box-shadow:0 14px 32px rgba(0,0,0,0.16);
}

.card-img {
  position:relative;
  background:#e5e7eb;
}

.card-img > img {
  width:100%;
  height:190px;
  object-fit:cover;
  display:block;
}

.photo-badge {
  position:absolute;
  right:10px;
  bottom:58px;
  background:rgba(17,24,39,0.88);
  color:white;
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
}

.thumb-row {
  display:flex;
  gap:5px;
  padding:8px;
  overflow-x:auto;
}

.thumb-row img {
  width:54px;
  height:42px;
  object-fit:cover;
  border-radius:7px;
  border:1px solid #e5e7eb;
}

.card-body {
  padding:15px;
}

.title {
  font-weight:900;
  font-size:18px;
  color:#111827;
  min-height:44px;
}

.price {
  color:#dc2626;
  font-size:22px;
  font-weight:900;
  margin-top:10px;
}

.meta {
  font-size:14px;
  color:#475569;
  margin-top:7px;
}

.btn {
  display:block;
  width:92%;
  margin:16px auto 18px;
  padding:13px;
  background:linear-gradient(135deg,#3b82f6,#2563eb);
  color:white;
  border:none;
  border-radius:13px;
  cursor:pointer;
  font-weight:900;
  text-align:center;
  box-shadow:0 6px 14px rgba(37,99,235,0.32);
}

.empty {
  grid-column:1 / -1;
  background:white;
  padding:30px;
  border-radius:14px;
  text-align:center;
  font-weight:bold;
}

@media(max-width:600px){
  .header h1 { font-size:34px; }
  .header { padding-bottom:48px; }

  .card-img > img {
    height:170px;
  }

  .search-bar {
    margin:-24px 10px 15px;
  }

  .search-btn,
  .clear-btn {
    flex:1;
  }
}
</style>
</head>

<body>

<div class="header">
  <h1>DealerFlow</h1>
  <p>Find your next vehicle</p>
  <a href="dealer-admin.html" class="dealer-login-btn">Dealer Login</a>
</div>

<div class="search-bar">
  <input id="search" placeholder="Search make or model">
  <input id="min" placeholder="Min Price" type="number">
  <input id="max" placeholder="Max Price" type="number">
  <button class="search-btn" onclick="loadCars()">Search</button>
  <button class="clear-btn" onclick="clearSearch()">Clear</button>
</div>

<div id="grid" class="grid"></div>

<script>
const supabaseUrl = "https://ddmvzypiccryjndcwlre.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkbXZ6eXBpY2NyeWpuZGN3bHJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NTQ2NzYsImV4cCI6MjA5MTQzMDY3Nn0.mNkODdvX8gllTZeqfr7nllMWfF7ATdj9MY-EKEE3G6w";

function getImages(v) {
  let arr = [];

  if (v.image && String(v.image).trim()) {
    arr.push(String(v.image).trim());
  }

  if (v.images && String(v.images).trim()) {
    String(v.images).split(",").forEach(function(i) {
      const img = i.trim();
      if (img && !arr.includes(img)) {
        arr.push(img);
      }
    });
  }

  if (!arr.length) {
    arr.push("https://via.placeholder.com/400x300?text=No+Image");
  }

  return arr;
}

function formatPrice(price) {
  const num = Number(String(price || "").replace(/\D/g, ""));
  if (!num) return "R0";
  return "R" + num.toLocaleString("en-ZA");
}

async function loadCars() {
  const grid = document.getElementById("grid");
  grid.innerHTML = '<div class="empty">Loading vehicles...</div>';

  try {
    const res = await fetch(
      supabaseUrl + "/rest/v1/active_vehicles?select=*&order=id.desc",
      {
        headers: {
          apikey: supabaseKey,
          Authorization: "Bearer " + supabaseKey
        }
      }
    );

    let data = await res.json();

    if (!Array.isArray(data)) {
      grid.innerHTML = '<div class="empty">Could not load vehicles.</div>';
      return;
    }

    const search = document.getElementById("search").value.toLowerCase().trim();
    const min = Number(document.getElementById("min").value) || 0;
    const max = Number(document.getElementById("max").value) || 999999999;

    data = data.filter(function(v) {
      const text = ((v.make || "") + " " + (v.model || "") + " " + (v.title || "")).toLowerCase();
      const price = Number(String(v.price || "").replace(/\D/g, "")) || 0;

      if (search && !text.includes(search)) return false;
      if (price < min) return false;
      if (price > max) return false;

      return true;
    });

    if (!data.length) {
      grid.innerHTML = '<div class="empty">No vehicles found</div>';
      return;
    }

    let html = "";

    data.forEach(function(v) {
      const images = getImages(v);
      let thumbs = "";

      images.slice(0,4).forEach(function(i) {
        thumbs += `<img src="${i}">`;
      });

      html += `
        <div class="card">
          <div class="card-img">
            <img src="${images[0]}" onerror="this.src='https://via.placeholder.com/400x300?text=No+Image'">
            <div class="photo-badge">📷 ${images.length}</div>
            <div class="thumb-row">${thumbs}</div>
          </div>

          <div class="card-body">
            <div class="title">${v.year || ""} ${v.make || ""} ${v.model || ""}</div>
            <div class="price">${formatPrice(v.price)}</div>
            <div class="meta">📍 ${v.location || "-"}</div>
            <div class="meta">🚗 ${v.mileage || "-"}</div>
            <div class="meta">🏢 ${v.dealer || v.dealer_name || "Dealer"}</div>
          </div>

          <button class="btn" onclick="viewVehicle(${v.id})">View Details</button>
        </div>
      `;
    });

    grid.innerHTML = html;

  } catch (err) {
    console.error(err);
    grid.innerHTML = '<div class="empty">Error loading vehicles.</div>';
  }
}

function clearSearch() {
  document.getElementById("search").value = "";
  document.getElementById("min").value = "";
  document.getElementById("max").value = "";
  loadCars();
}

function viewVehicle(id) {
  window.location.href = "details.html?id=" + id;
}

loadCars();
</script>

</body>
</html>
