<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CarScoutZA | Used Cars for Sale South Africa</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="google-site-verification" content="oOba0W7_EqwqEoXSWQad1Hymmbeiy8oUrvwCztLuX-M" />

<meta name="description" content="Find used cars for sale in South Africa. CarScoutZA connects buyers and dealers with trusted listings and fast contact.">

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f4f6f9;
  color:#111827;
}

.hero{
    width:100%;
    height:340px;
    background-image:url('Hero-banner3.jpeg');
    background-size:cover;
    background-position:center 58%;
    background-repeat:no-repeat;
    position:relative;
    overflow:hidden;
}

.hero-buttons{
  position:absolute;
  top:28px;
  right:55px;
  display:flex;
  gap:14px;
  z-index:10;
}

.hero-buttons a{
  color:white;
  text-decoration:none;
  padding:12px 18px;
  border-radius:12px;
  font-weight:900;
  box-shadow:0 6px 16px rgba(0,0,0,0.28);
}

.contact-btn{
  background:#2563eb;
}

.login-btn{
  background:#111827;
}

.search-bar{
  background:rgba(5,15,35,0.92);
  border:1px solid rgba(255,255,255,0.08);
  backdrop-filter:blur(10px);
  max-width:1180px;
  margin:-55px auto 35px;
  padding:14px;
  border-radius:20px;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  box-shadow:0 12px 35px rgba(0,0,0,0.15);
 position:relative;
z-index:10;
}

.search-bar input,
.search-bar select{
  flex:1;
  min-width:140px;
  padding:12px;
  border:1px solid #dbe1e8;
  border-radius:12px;
  font-size:14px;
  outline:none;
  background:white;
}

.search-btn,
.clear-btn{
  border:none;
  color:white;
  padding:12px 18px;
  border-radius:12px;
  cursor:pointer;
  font-weight:900;
}

.search-btn{
  background:#2563eb;
}

.clear-btn{
  background:#111827;
}

.count-box{
  width:100%;
  font-size:14px;
  font-weight:bold;
  color:#475569;
}

.section-wrap{
  max-width:1320px;
  margin:auto;
  padding:0 22px;
}

.section-title{
  font-size:34px;
  font-weight:900;
  margin:10px 0 18px;
  color:#111827;
}
.grid{
  max-width:1320px;
  margin:auto;
  margin-top:10px;
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:24px;
}

.grid:has(.card:only-child){
  max-width:340px;
}

.card{
  background:white;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 8px 24px rgba(0,0,0,0.10);
  transition:0.25s;
  border:1px solid #eef2f7;
}

.card:hover{
  transform:translateY(-4px);
  box-shadow:0 16px 34px rgba(0,0,0,0.16);
}

.img-wrap{
  position:relative;
  background:#e5e7eb;
  overflow:hidden;
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
  display:block;
  cursor:pointer;
  transition:0.3s;
}

.card:hover img{
  transform:scale(1.04);
}

.featured-badge{
  position:absolute;
  top:10px;
  left:10px;
  background:#facc15;
  color:#111827;
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
  z-index:2;
}

.photo-badge{
  position:absolute;
  right:10px;
  bottom:10px;
  background:rgba(0,0,0,0.72);
  color:white;
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
}

.card-body{
  padding:15px;
}

.card h3{
  margin:0 0 10px;
  font-size:18px;
  min-height:44px;
  line-height:1.25;
  font-weight:900;
}

.price{
  color:#dc2626;
  font-size:22px;
  font-weight:900;
}

.meta{
  margin-top:6px;
  color:#475569;
  font-size:14px;
}

.empty{
  grid-column:1/-1;
  text-align:center;
  padding:40px;
  background:white;
  border-radius:16px;
  font-weight:900;
  box-shadow:0 8px 24px rgba(0,0,0,0.08);
}

footer{
  text-align:center;
  padding:28px 15px;
  color:#64748b;
  font-size:14px;
}

@media(max-width:700px){

 .hero{
  height:300px;
  background-size:cover;
  background-position:center center;
}

  .hero-buttons{
    top:18px;
    left:auto;
    right:20px;
    justify-content:center;
  }

  .hero-buttons a{
    padding:11px 16px;
    font-size:14px;
  }

  .search-bar{
  margin:25px 12px 28px;
  position:static;
}

  .search-bar input,
  .search-bar select,
  .search-btn,
  .clear-btn{
    width:100%;
    flex:1 1 100%;
  }

  .section-title{
    font-size:28px;
  }

  .grid{
    grid-template-columns:1fr;
    padding:14px;
  }

  .grid:has(.card:only-child){
    max-width:100%;
  }

  .card img{
    height:220px;
  }
}

</style>
</head>

<body>

<div class="hero">

  <div class="hero-buttons">

    <a href="contact.html" class="contact-btn">
      Contact
    </a>

    <a href="dealer-admin.html" class="login-btn">
      Dealer Login
    </a>

  </div>

</div>

<div class="search-bar">

  <input id="search" placeholder="Search make or model">

  <input id="min" placeholder="Min Price" type="number">

  <input id="max" placeholder="Max Price" type="number">

  <select id="province">
    <option value="">All Provinces</option>
    <option>Gauteng</option>
    <option>Western Cape</option>
    <option>Eastern Cape</option>
    <option>KwaZulu-Natal</option>
    <option>Free State</option>
    <option>Limpopo</option>
    <option>Mpumalanga</option>
    <option>North West</option>
    <option>Northern Cape</option>
  </select>

  <select id="sort">
    <option value="">Sort</option>
    <option value="low">Price Low → High</option>
    <option value="high">Price High → Low</option>
  </select>

  <button class="search-btn" onclick="loadCars()">
    Search
  </button>

  <button class="clear-btn" onclick="clearSearch()">
    Clear
  </button>

  <div id="count" class="count-box"></div>

</div>

<div id="featuredWrap" style="display:none;">

  <div class="section-wrap">
    <h2 class="section-title">
      ⭐ Featured Vehicles
    </h2>
  </div>

  <div id="featuredGrid" class="grid"></div>

</div>

<div class="section-wrap">
  <h2 class="section-title">
    Latest Vehicles
  </h2>
</div>

<div id="grid" class="grid"></div>

<footer>
  © 2026 CarScoutZA • Dealer Vehicle Marketplace South Africa
</footer>

<script>const supabaseUrl =
"https://ddmvzypiccryjndcwlre.supabase.co";

const supabaseKey =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkbXZ6eXBpY2NyeWpuZGN3bHJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NTQ2NzYsImV4cCI6MjA5MTQzMDY3Nn0.mNkODdvX8gllTZeqfr7nllMWfF7ATdj9MY-EKEE3G6w";

function getImages(v){

  let arr = [];

  if(v.image && String(v.image).trim()){

    arr.push(
      String(v.image).trim()
    );

  }

  if(v.images){

    String(v.images)
    .split(",")

    .forEach(function(i){

      const img = i.trim();

      if(img && !arr.includes(img)){

        arr.push(img);

      }

    });

  }

  if(!arr.length){

    arr.push(
      "https://via.placeholder.com/400x300?text=No+Image"
    );

  }

  return arr;
}

function formatPrice(p){

  const num =
  Number(
    String(p || "")
    .replace(/\D/g,"")
  );

  if(!num) return "R0";

  return "R" +
  num.toLocaleString("en-ZA");
}

async function loadCars(){

  const grid =
  document.getElementById("grid");

  const featuredGrid =
  document.getElementById("featuredGrid");

  const featuredWrap =
  document.getElementById("featuredWrap");

  const count =
  document.getElementById("count");

  grid.innerHTML =
  '<div class="empty">Loading vehicles...</div>';

  try{

    const res = await fetch(

      supabaseUrl +
      "/rest/v1/active_vehicles?select=*&order=id.desc",

      {
        headers:{
          apikey:supabaseKey,
          Authorization:"Bearer " + supabaseKey
        }
      }

    );

    let data = await res.json();

    if(!Array.isArray(data)){

      grid.innerHTML =
      '<div class="empty">Could not load vehicles.</div>';

      return;
    }

    const search =
    document.getElementById("search")
    .value
    .toLowerCase()
    .trim();

    const min =
    Number(
      document.getElementById("min").value
    ) || 0;

    const max =
    Number(
      document.getElementById("max").value
    ) || 999999999;

    const province =
    document.getElementById("province")
    .value
    .toLowerCase()
    .trim();

    const sort =
    document.getElementById("sort").value;

    data = data.filter(function(v){

      const text =
      (
        (v.year || "") + " " +
        (v.make || "") + " " +
        (v.model || "") + " " +
        (v.title || "") + " " +
        (v.dealer || "") + " " +
        (v.dealer_name || "")
      ).toLowerCase();

      const price =
      Number(
        String(v.price || "")
        .replace(/\D/g,"")
      ) || 0;

      const location =
      String(v.location || "")
      .toLowerCase();

      const vehicleProvince =
      String(v.province || "")
      .toLowerCase();

      if(search && !text.includes(search)){
        return false;
      }

      if(price < min){
        return false;
      }

      if(price > max){
        return false;
      }

      if(province){

        if(
          !location.includes(province) &&
          !vehicleProvince.includes(province)
        ){
          return false;
        }

      }

      return true;

    });

    if(sort === "low"){

      data.sort(function(a,b){

        const aPrice =
        Number(
          String(a.price || "")
          .replace(/\D/g,"")
        ) || 0;

        const bPrice =
        Number(
          String(b.price || "")
          .replace(/\D/g,"")
        ) || 0;

        return aPrice - bPrice;

      });

    }

    if(sort === "high"){

      data.sort(function(a,b){

        const aPrice =
        Number(
          String(a.price || "")
          .replace(/\D/g,"")
        ) || 0;

        const bPrice =
        Number(
          String(b.price || "")
          .replace(/\D/g,"")
        ) || 0;

        return bPrice - aPrice;

      });

    }

    count.innerText =
    data.length + " vehicles found";

    let html = "";
    let featuredHtml = "";data.forEach(function(v){

      const isFeatured =
      v.featured === true ||
      v.featured === "true" ||
      v.featured === 1 ||
      v.featured === "1";

      const featured =
      isFeatured
      ? '<div class="featured-badge">Featured</div>'
      : "";

      const title =
      [v.year, v.make, v.model]
      .filter(Boolean)
      .join(" ") ||
      v.title ||
      "Vehicle";

      const vehicleImages =
      getImages(v);

      const img =
      vehicleImages[0];

      const cardHtml = `

      <div class="card">

        <div class="img-wrap">

          ${featured}

          <img
            src="${img}"
            loading="lazy"
            onclick="window.location.href='details.html?id=${v.id}'"
            onerror="this.src='https://via.placeholder.com/400x300?text=No+Image'"
          >

          <div class="photo-badge">
            📷 ${vehicleImages.length}
          </div>

        </div>

        <div class="card-body">

          <h3>${title}</h3>

          <div class="price">
            ${formatPrice(v.price)}
          </div>

          <div class="meta">
            📍 ${v.location || "-"}
          </div>

          <div class="meta">
            🚗 ${v.mileage || "-"}
          </div>

          <div class="meta">
            🏢 ${v.dealer || v.dealer_name || "Dealer"}
          </div>

        </div>

      </div>

      `;

      if(isFeatured && !sort){
        featuredHtml += cardHtml;
      } else {
        html += cardHtml;
      }

    });

    grid.innerHTML =
    html ||
    '<div class="empty">No vehicles found</div>';

    if(featuredHtml){

      featuredWrap.style.display =
      "block";

      featuredGrid.innerHTML =
      featuredHtml;

    } else {

      featuredWrap.style.display =
      "none";

      featuredGrid.innerHTML =
      "";}

  } catch(err){

    console.log(err);

    grid.innerHTML =
    '<div class="empty">Error loading vehicles.</div>';

  }

}

function clearSearch(){

  document.getElementById("search").value = "";
  document.getElementById("min").value = "";
  document.getElementById("max").value = "";
  document.getElementById("province").value = "";
  document.getElementById("sort").value = "";

  loadCars();

}

loadCars();

</script>

</body>
</html>
