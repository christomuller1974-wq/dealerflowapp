<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DealerFlow</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f5f6fa;
}

header {
  background: #1e3a8a;
  color: white;
  padding: 25px;
  text-align: center;
}

header h1 {
  margin: 0;
  font-size: 32px;
}

header p {
  margin-top: 8px;
  font-size: 18px;
}

.vehicle-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 20px;
  padding: 20px;
}

.vehicle-card {
  background: white;
  border-radius: 12px;
  padding: 12px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.1);
  transition: 0.2s;
}

.vehicle-card:hover {
  transform: translateY(-3px);
}

.vehicle-thumb {
  width: 100%;
  height: 180px;
  object-fit: cover;
  border-radius: 8px;
  background: #ddd;
}

.vehicle-card h3 {
  margin: 10px 0 5px;
  font-size: 16px;
  min-height: 44px;
}

.price {
  color: red;
  font-size: 18px;
  font-weight: bold;
}

.btn {
  display: block;
  margin-top: 10px;
  padding: 10px;
  text-align: center;
  border-radius: 6px;
  text-decoration: none;
  color: white;
  background: #2563eb;
}
</style>
</head>

<body>

<header>
  <h1>DealerFlow</h1>
  <p>Browse our vehicles</p>
</header>

<div id="vehicle-list" class="vehicle-grid"></div>

<script>
const supabaseUrl = "https://ddmvzypiccryjndcwlre.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkbXZ6eXBpY2NyeWpuZGN3bHJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NTQ2NzYsImV4cCI6MjA5MTQzMDY3Nn0.mNkODdvX8gllTZeqfr7nllMWfF7ATdj9MY-EKEE3G6w";

function getMainImage(vehicle) {
  if (vehicle.image && typeof vehicle.image === "string" && vehicle.image.trim() !== "") {
    return vehicle.image.trim();
  }

  if (vehicle.images && typeof vehicle.images === "string" && vehicle.images.trim() !== "") {
    return vehicle.images.split(",")[0].trim();
  }

  return "https://via.placeholder.com/300x180?text=No+Image";
}

async function loadVehicles() {
  try {
    const res = await fetch(
      supabaseUrl + "/rest/v1/vehicles?select=*",
      {
        headers: {
          apikey: supabaseKey,
          Authorization: "Bearer " + supabaseKey
        }
      }
    );

    const vehicles = await res.json();
    const container = document.getElementById("vehicle-list");
    container.innerHTML = "";

    vehicles.forEach(v => {
      const mainImage = getMainImage(v);

      const card = document.createElement("div");
      card.className = "vehicle-card";

      card.innerHTML = `
        <img src="${mainImage}" class="vehicle-thumb"
             onerror="this.src='https://via.placeholder.com/300x180?text=No+Image'">

        <h3>${v.title || "No Title"}</h3>
        <div class="price">R${v.price || 0}</div>

        <a href="details.html?id=${v.id}" class="btn">View Details</a>
      `;

      container.appendChild(card);
    });

  } catch (err) {
    console.error("Error loading vehicles:", err);
  }
}

loadVehicles();
</script>

</body>
</html>
