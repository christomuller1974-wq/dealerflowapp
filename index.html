<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DealerFlow | Used Cars for Sale South Africa</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- GOOGLE VERIFICATION -->
<meta name="google-site-verification" content="oOba0W7_EqwqEoXSWQad1Hymmbeiy8oUrvwCztLuX-M" />

<!-- SEO -->
<meta name="description" content="Buy and sell used cars in South Africa. DealerFlow connects dealers and buyers with trusted listings and fast contact.">

<style>
body { margin:0; font-family:Arial; background:#f4f6f9; }

.header {
  background:linear-gradient(135deg,#1e3a8a,#2563eb);
  color:white;
  text-align:center;
  padding:50px 20px 70px;
}

.header h1 { font-size:40px; margin:0; }

.search-bar {
  background:white;
  margin:-40px auto 25px;
  max-width:1100px;
  padding:16px;
  border-radius:16px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.search-bar input, .search-bar select {
  flex:1;
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
}

.grid {
  max-width:1200px;
  margin:auto;
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
  gap:20px;
}

.card {
  background:white;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.card img {
  width:100%;
  height:180px;
  object-fit:cover;
}

.card-body { padding:12px; }

.price { color:red; font-weight:bold; }

.btn {
  display:block;
  text-align:center;
  padding:10px;
  margin:10px;
  border-radius:8px;
  text-decoration:none;
  font-weight:bold;
}

.view-btn { background:#2563eb; color:white; }
.whatsapp-btn { background:#25D366; color:white; }

.empty {
  text-align:center;
  padding:30px;
  background:white;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="header">
  <h1>DealerFlow</h1>
  <p>Used Cars for Sale in South Africa</p>
</div>

<div class="search-bar">
  <input id="search" placeholder="Search make or model">
  <input id="min" placeholder="Min Price" type="number">
  <input id="max" placeholder="Max Price" type="number">
  
  <select id="province">
    <option value="">All Provinces</option>
    <option>Gauteng</option>
    <option>Western Cape</option>
    <option>Eastern Cape</option>
    <option>KwaZulu-Natal</option>
    <option>Free State</option>
    <option>Limpopo</option>
    <option>Mpumalanga</option>
    <option>North West</option>
    <option>Northern Cape</option>
  </select>

  <button onclick="loadCars()">Search</button>
</div>

<div id="grid" class="grid"></div>

<script>
const supabaseUrl = "https://ddmvzypiccryjndcwlre.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkbXZ6eXBpY2NyeWpuZGN3bHJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NTQ2NzYsImV4cCI6MjA5MTQzMDY3Nn0.mNkODdvX8gllTZeqfr7nllMWfF7ATdj9MY-EKEE3G6w";

function formatPrice(p){
  return "R" + Number(p||0).toLocaleString("en-ZA");
}

function whatsappLink(v,title){
  let phone = (v.phone||"").replace(/\D/g,'');
  if(phone.startsWith("0")) phone = "27" + phone.substring(1);
  return "https://wa.me/" + phone + "?text=" + encodeURIComponent("Hi, I'm interested in " + title);
}

async function trackClick(vehicleId, dealerId){
  try{
    await fetch(supabaseUrl + "/rest/v1/vehicle_clicks", {
      method:"POST",
      headers:{
        "apikey":supabaseKey,
        "Authorization":"Bearer "+supabaseKey,
        "Content-Type":"application/json"
      },
      body: JSON.stringify({
        vehicle_id: vehicleId,
        dealer_user_id: dealerId,
        click_type: "view"
      })
    });
  }catch(e){ console.log(e); }
}

async function loadCars(){
  const grid = document.getElementById("grid");
  grid.innerHTML = '<div class="empty">Loading...</div>';

  const res = await fetch(supabaseUrl + "/rest/v1/active_vehicles?select=*&order=id.desc", {
    headers:{
      apikey:supabaseKey,
      Authorization:"Bearer "+supabaseKey
    }
  });

  let data = await res.json();

  if(!data.length){
    grid.innerHTML = '<div class="empty">No vehicles found</div>';
    return;
  }

  let html = "";

  data.forEach(v=>{
    const title = `${v.year||""} ${v.make||""} ${v.model||""}`;
    const img = v.image || "https://via.placeholder.com/400x300";

    html += `
    <div class="card">
      <img src="${img}">
      <div class="card-body">
        <h3>${title}</h3>
        <div class="price">${formatPrice(v.price)}</div>
        <div>${v.location||""}</div>
      </div>

      <button class="btn view-btn" onclick="openVehicle(${v.id}, '${v.user_id}')">View</button>
      <a href="${whatsappLink(v,title)}" target="_blank" class="btn whatsapp-btn">WhatsApp</a>
    </div>
    `;
  });

  grid.innerHTML = html;
}

function openVehicle(id, dealerId){
  trackClick(id, dealerId);
  window.location.href = "details.html?id=" + id;
}

loadCars();
</script>

</body>
</html>
