.card-body{

.card h3{

.price{

.meta{

<script>const supabaseUrl =
"https://ddmvzypiccryjndcwlre.supabase.co";

const supabaseKey =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkbXZ6eXBpY2NyeWpuZGN3bHJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NTQ2NzYsImV4cCI6MjA5MTQzMDY3Nn0.mNkODdvX8gllTZeqfr7nllMWfF7ATdj9MY-EKEE3G6w";

function getImages(v){

  let arr = [];

  if(v.image && String(v.image).trim()){

    arr.push(
      String(v.image).trim()
    );

  }

  if(v.images){

    String(v.images)
    .split(",")

    .forEach(function(i){

      const img = i.trim();

      if(img && !arr.includes(img)){

        arr.push(img);

      }

    });

  }

  if(!arr.length){

    arr.push(
      "https://via.placeholder.com/400x300?text=No+Image"
    );

  }

  return arr;
}

function formatPrice(p){

  const num =
  Number(
    String(p || "")
    .replace(/\D/g,"")
  );

  if(!num) return "R0";

  return "R" +
  num.toLocaleString("en-ZA");
}
function searchCars(){

const params = new URLSearchParams();

const search = document.getElementById("search").value.trim();
const min = document.getElementById("min").value.trim();
const max = document.getElementById("max").value.trim();
const province = document.getElementById("province").value.trim();
const sort = document.getElementById("sort").value.trim();

if(search) params.set("search", search);
if(min) params.set("min", min);
if(max) params.set("max", max);
if(province) params.set("province", province);
if(sort) params.set("sort", sort);

params.set("page", "1");

window.location.href = "index.html?" + params.toString();

}
async function loadCars(){

  const grid =
  document.getElementById("grid");

  const featuredGrid =
  document.getElementById("featuredGrid");

  const featuredWrap =
  document.getElementById("featuredWrap");

  const count =
  document.getElementById("count");

  grid.innerHTML =
  '<div class="empty">Loading vehicles...</div>';

  try{

    const res = await fetch(

      supabaseUrl +
      "/rest/v1/vehicles?select=*&order=updated_at.desc.nullslast,id.desc",

      {
        headers:{
          apikey:supabaseKey,
          Authorization:"Bearer " + supabaseKey
        }
      }

    );

    let data = await res.json();
const profiles = await fetch(
 supabaseUrl + "/rest/v1/profiles?select=id,active,admin_blocked,paid_until,admin_free_until,payment_status,town,province",
  {
    headers:{
      apikey:supabaseKey,
      Authorization:"Bearer " + supabaseKey
    }
  }
).then(r => r.json());

const activeDealerIds = new Set();

const now = new Date();

(profiles || []).forEach(function(p){

  const paidUntil =
    p.paid_until
      ? new Date(p.paid_until)
      : null;

  const freeUntil =
    p.admin_free_until
      ? new Date(p.admin_free_until)
      : null;

  const paidActive =
    paidUntil && paidUntil > now;

  const freeActive =
    freeUntil && freeUntil > now;

  if(
  p.admin_blocked !== true &&
  (
    p.active === true ||
    
    p.payment_status === "PAID" ||
    p.payment_status === "FREE_30_DAY" ||
    paidActive ||
    freeActive
  )
){
  activeDealerIds.add(p.id);
}

});

data = data.filter(function(v){

  const dealerProfile = (profiles || []).find(function(p){
    return String(p.id) === String(v.user_id);
  });

  if (!dealerProfile) {
    return true;
  }

  if (dealerProfile.admin_blocked === true) {
    return false;
  }

  if (dealerProfile.active === false) {
    return false;
  }

  return true;

});
    if(!Array.isArray(data)){

      grid.innerHTML =
      '<div class="empty">Could not load vehicles.</div>';

      return;
    }

    const params =
new URLSearchParams(window.location.search);

document.getElementById("search").value =
params.get("search") || document.getElementById("search").value;

document.getElementById("min").value =
params.get("min") || document.getElementById("min").value;

document.getElementById("max").value =
params.get("max") || document.getElementById("max").value;

document.getElementById("province").value =
params.get("province") || document.getElementById("province").value;

document.getElementById("sort").value =
params.get("sort") || document.getElementById("sort").value;

const search =
document.getElementById("search")
.value
.toLowerCase()
.trim();

    const min =
    Number(
      document.getElementById("min").value
    ) || 0;

    const max =
    Number(
      document.getElementById("max").value
    ) || 999999999;

    const province =
    document.getElementById("province")
    .value
    .toLowerCase()
    .trim();

    const sort =
    document.getElementById("sort").value;

    data = data.filter(function(v){

      const text =
      (
        (v.year || "") + " " +
        (v.make || "") + " " +
        (v.model || "") + " " +
        (v.title || "") + " " +
        (v.dealer || "") + " " +
        (v.dealer_name || "")
      ).toLowerCase();

      const price =
      Number(
        String(v.price || "")
        .replace(/\D/g,"")
      ) || 0;

      const location =
      String(v.location || "")
      .toLowerCase();

      const vehicleProvince =
String(v.location || "")
.toLowerCase();

      if(search && !text.includes(search)){
        return false;
      }

      if(price < min){
        return false;
      }

      if(price > max){
        return false;
      }

      if(province){

        if(
          !location.includes(province) &&
          !vehicleProvince.includes(province)
        ){
          return false;
        }

      }

      return true;

    });

    if(sort === "low"){

      data.sort(function(a,b){

        const aPrice =
        Number(
          String(a.price || "")
          .replace(/\D/g,"")
        ) || 0;

        const bPrice =
        Number(
          String(b.price || "")
          .replace(/\D/g,"")
        ) || 0;

        return aPrice - bPrice;

      });

    }

    if(sort === "high"){

      data.sort(function(a,b){

        const aPrice =
        Number(
          String(a.price || "")
          .replace(/\D/g,"")
        ) || 0;

        const bPrice =
        Number(
          String(b.price || "")
          .replace(/\D/g,"")
        ) || 0;

        return bPrice - aPrice;

      });

    }

    count.innerText =
    data.length + " vehicles found";

    let html = "";
    const carsPerPage = 20;

let currentPage =
parseInt(
new URLSearchParams(window.location.search).get("page")
) || 1;





const featuredVehicles = data.filter(function(v){

  const isFeatured =
    v.featured === true ||
    v.featured === "true" ||
    v.featured === 1 ||
    v.featured === "1";

  if (!isFeatured) return false;

  if (!v.featured_until) return false;

  return new Date(v.featured_until) > now;

});

const normalVehicles = data.filter(function(v){

  const isFeatured =
    v.featured === true ||
    v.featured === "true" ||
    v.featured === 1 ||
    v.featured === "1";

  const notExpired =
    v.featured_until &&
    new Date(v.featured_until) > now;

  return !(isFeatured && notExpired);

});

const totalPages =
Math.ceil(normalVehicles.length / carsPerPage) || 1;
if(currentPage > totalPages){
currentPage = 1;
}
const start =
(currentPage - 1) * carsPerPage;

const end =
start + carsPerPage;

const paginatedData =
normalVehicles.slice(start, end);

let featuredHtml = "";

const displayVehicles =
featuredVehicles.concat(paginatedData);

displayVehicles.forEach(function(v){
const dealerProfile = (profiles || []).find(function(p){
  return String(p.id) === String(v.user_id);
});
      const isFeatured =
      v.featured === true ||
      v.featured === "true" ||
      v.featured === 1 ||
      v.featured === "1";

      const featured =
      isFeatured
      ? '<div class="featured-badge">Featured</div>'
      : "";

      const title =
      [v.year, v.make, v.model]
      .filter(Boolean)
      .join(" ") ||
      v.title ||
      "Vehicle";

      const vehicleImages =
      getImages(v);

      const img =
      vehicleImages[0];

      const cardHtml = `

      <div class="card">

        <div class="img-wrap">
<div class="save-heart"
onclick="toggleSave('${v.id}', this)">
♡
</div>
          ${featured}

          <img
            src="${img}"
            loading="lazy"
            onclick="window.location.href='details.html?id=${v.id}'"
            onerror="this.src='https://via.placeholder.com/400x300?text=No+Image'"
          >

          <div class="photo-badge">
            📷 ${vehicleImages.length}
          </div>

        </div>

        <div class="card-body">

          <h3>${title}</h3>

          <div class="price">
            ${formatPrice(v.price)}
          </div>

          <div class="meta">
 📍 ${
[
v.town || dealerProfile?.town,
v.province || dealerProfile?.province
]
.filter(Boolean)
.join(", ") || v.location || "-"
}
</div>

          <div class="meta">
            🚗 ${v.mileage || "-"}
          </div>

          <div class="meta">
            🏢 ${v.dealer || v.dealer_name || "Dealer"}
          </div>

        </div>

      </div>

      `;

      if(isFeatured && !sort){
        featuredHtml += cardHtml;
      } else {
        html += cardHtml;
      }

    });

    grid.innerHTML =
    html ||
    '<div class="empty">No vehicles found</div>';


if(totalPages > 1){

let paginationHtml =
'<div style="grid-column:1/-1;text-align:center;padding:20px;">';

for(let i = 1; i <= totalPages; i++){

paginationHtml += `
<a href="${buildPageLink(i)}"
style="
display:inline-block;
margin:5px;
padding:10px 16px;
border-radius:10px;
background:${i === currentPage ? '#2563eb' : '#111827'};
color:white;
text-decoration:none;
font-weight:bold;
">
${i}
</a>
`;

}

paginationHtml += '</div>';

grid.innerHTML += paginationHtml;

}
    if(featuredHtml){

      featuredWrap.style.display =
      "block";

      featuredGrid.innerHTML =
      featuredHtml;

    } else {

      featuredWrap.style.display =
      "none";

      featuredGrid.innerHTML =
      "";}

  } catch(err){

    console.log(err);

    grid.innerHTML =
    '<div class="empty">Error loading vehicles.</div>';

  }

}
function buildPageLink(pageNumber){

const params =
new URLSearchParams(window.location.search);

params.set("page", pageNumber);

return "index.html?" + params.toString();

}
function clearSearch(){

  document.getElementById("search").value = "";
  document.getElementById("min").value = "";
  document.getElementById("max").value = "";
  document.getElementById("province").value = "";
  document.getElementById("sort").value = "";

  window.location.href = "index.html";

}
function toggleSave(id, el){

const saved =
JSON.parse(localStorage.getItem("savedCars") || "[]");

if(saved.includes(id)){

const updated =
saved.filter(x => x !== id);

localStorage.setItem(
"savedCars",
JSON.stringify(updated)
);

el.innerHTML = "♡";
el.classList.remove("saved");

} else {

saved.push(id);

localStorage.setItem(
"savedCars",
JSON.stringify(saved)
);

el.innerHTML = "♥";
el.classList.add("saved");
}
}
loadCars();
async function trackVisit(pageType) {

  try {

    await fetch(
      supabaseUrl + "/rest/v1/site_visits",
      {
        method: "POST",
        headers: {
          apikey: supabaseKey,
          Authorization: "Bearer " + supabaseKey,
          "Content-Type": "application/json",
          Prefer: "return=minimal"
        },
        body: JSON.stringify({
          page: pageType,
          created_at: new Date().toISOString()
        })
      }
    );

  } catch(err) {
    console.log(err);
  }
}
