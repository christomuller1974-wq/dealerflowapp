<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DealerFlow</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* { box-sizing: border-box; }

body {
  margin:0;
  font-family:Arial, sans-serif;
  background:#f4f6f9;
}

/* HEADER */
.header {
  background:linear-gradient(135deg,#1e3a8a,#2563eb);
  color:white;
  padding:50px 20px 70px;
  text-align:center;
}

.header h1 {
  margin:0;
  font-size:40px;
  font-weight:900;
}

.slogan {
  margin-top:12px;
  font-size:20px;
  font-weight:600;
}

.sub {
  margin-top:6px;
  opacity:0.9;
}

.dealer-login-btn {
  display:inline-block;
  margin-top:22px;
  background:#111827;
  padding:12px 24px;
  border-radius:30px;
  color:white;
  text-decoration:none;
  font-weight:900;
}

/* SEARCH */
.search-bar {
  background:white;
  margin:-40px auto 25px;
  max-width:1100px;
  padding:16px;
  border-radius:16px;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  box-shadow:0 12px 30px rgba(0,0,0,0.10);
}

.search-bar input,
.search-bar select {
  flex:1;
  min-width:140px;
  padding:12px;
  border-radius:10px;
  border:1px solid #dbe1ea;
}

.search-btn,
.clear-btn {
  color:white;
  border:none;
  padding:12px 20px;
  border-radius:10px;
  cursor:pointer;
  font-weight:900;
}

.search-btn { background:#2563eb; }
.clear-btn { background:#111827; }

/* GRID FIXED (NO STRETCH) */
.grid {
  max-width:1250px;
  margin:auto;
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(260px, 300px));
  gap:22px;
  justify-content:center;
}

/* CARD */
.card {
  background:white;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 8px 25px rgba(0,0,0,0.08);
  transition:0.25s;
  width:100%;
  max-width:300px;
  display:flex;
  flex-direction:column;
}

.card:hover {
  transform:translateY(-5px);
}

/* IMAGE FIX */
.card-img {
  position:relative;
  height:190px;
  overflow:hidden;
}

.card-img img {
  width:100%;
  height:100%;
  object-fit:cover;
}

/* THUMBS */
.thumb-row {
  display:flex;
  gap:5px;
  padding:6px;
  overflow-x:auto;
}

.thumb-row img {
  width:50px;
  height:40px;
  object-fit:cover;
  border-radius:6px;
}

/* BODY */
.card-body {
  padding:14px;
}

.title {
  font-weight:900;
  font-size:17px;
}

.price {
  color:#dc2626;
  font-size:20px;
  font-weight:900;
  margin-top:8px;
}

.meta {
  font-size:13px;
  color:#475569;
  margin-top:6px;
}

/* BUTTONS */
.btn {
  margin:12px;
  padding:12px;
  border:none;
  border-radius:10px;
  font-weight:900;
  cursor:pointer;
}

.view-btn {
  background:#2563eb;
  color:white;
}

.whatsapp-btn {
  background:#25D366;
  color:white;
}

/* EMPTY */
.empty {
  grid-column:1/-1;
  background:white;
  padding:30px;
  border-radius:14px;
  text-align:center;
}

/* MOBILE */
@media(max-width:600px){

  .header h1 { font-size:32px; }

  .grid {
    grid-template-columns:1fr;
  }

  .card {
    max-width:100%;
  }

  .search-bar {
    margin:-25px 10px 15px;
  }

  .search-btn,
  .clear-btn {
    flex:1;
  }
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <h1>DealerFlow</h1>
  <div class="slogan">Drive your dream. Find the right vehicle fast.</div>
  <div class="sub">Trusted listings. Quick contact. Serious deals.</div>

  <a href="dealer-admin.html" class="dealer-login-btn">Dealer Login</a>
</div>

<!-- SEARCH -->
<div class="search-bar">
  <input id="search" placeholder="Search make or model">
  <input id="min" placeholder="Min Price" type="number">
  <input id="max" placeholder="Max Price" type="number">

  <select id="province">
    <option value="">All Provinces</option>
    <option>Gauteng</option>
    <option>Western Cape</option>
    <option>Eastern Cape</option>
    <option>KwaZulu-Natal</option>
    <option>Free State</option>
    <option>Limpopo</option>
    <option>Mpumalanga</option>
    <option>North West</option>
    <option>Northern Cape</option>
  </select>

  <button class="search-btn" onclick="loadCars()">Search</button>
  <button class="clear-btn" onclick="clearSearch()">Clear</button>
</div>

<div id="grid" class="grid"></div>

<script>
const supabaseUrl = "https://ddmvzypiccryjndcwlre.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkbXZ6eXBpY2NyeWpuZGN3bHJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NTQ2NzYsImV4cCI6MjA5MTQzMDY3Nn0.mNkODdvX8gllTZeqfr7nllMWfF7ATdj9MY-EKEE3G6w";

/* IMAGE HANDLER */
function getImages(v) {
  let arr = [];

  if (v.image) arr.push(v.image);

  if (v.images) {
    v.images.split(",").forEach(i => {
      if (i && !arr.includes(i)) arr.push(i.trim());
    });
  }

  if (!arr.length) {
    arr.push("https://via.placeholder.com/400x300?text=No+Image");
  }

  return arr;
}

/* PRICE */
function formatPrice(price) {
  const num = Number(String(price || "").replace(/\D/g, ""));
  return "R" + num.toLocaleString("en-ZA");
}

/* LOAD */
async function loadCars() {
  const grid = document.getElementById("grid");
  grid.innerHTML = '<div class="empty">Loading...</div>';

  const res = await fetch(
    supabaseUrl + "/rest/v1/active_vehicles?select=*&order=id.desc",
    {
      headers: {
        apikey: supabaseKey,
        Authorization: "Bearer " + supabaseKey
      }
    }
  );

  let data = await res.json();

  const search = document.getElementById("search").value.toLowerCase();
  const min = Number(document.getElementById("min").value) || 0;
  const max = Number(document.getElementById("max").value) || 999999999;
  const province = document.getElementById("province").value;

  data = data.filter(v => {
    const text = (v.make + " " + v.model).toLowerCase();
    const price = Number(String(v.price).replace(/\D/g,"")) || 0;

    if (search && !text.includes(search)) return false;
    if (price < min || price > max) return false;
    if (province && v.province !== province) return false;

    return true;
  });

  if (!data.length) {
    grid.innerHTML = '<div class="empty">No vehicles found</div>';
    return;
  }

  let html = "";

  data.forEach(v => {
    const images = getImages(v);

    let thumbs = "";
    images.slice(0,4).forEach(i=>{
      thumbs += <img src="${i}">;
    });

    const whatsapp = https://wa.me/27XXXXXXXXX?text=I'm interested in ${v.make} ${v.model};

    html += `
      <div class="card">
        <div class="card-img">
          <img src="${images[0]}">
          <div class="thumb-row">${thumbs}</div>
        </div>

        <div class="card-body">
          <div class="title">${v.year} ${v.make} ${v.model}</div>
          <div class="price">${formatPrice(v.price)}</div>
          <div class="meta">📍 ${v.location || "-"}</div>
          <div class="meta">🚗 ${v.mileage || "-"}</div>
        </div>

        <button class="btn view-btn" onclick="viewVehicle(${v.id})">View</button>
        <a href="${whatsapp}" target="_blank" class="btn whatsapp-btn">WhatsApp</a>
      </div>
    `;
  });

  grid.innerHTML = html;
}

/* CLEAR */
function clearSearch() {
  document.getElementById("search").value="";
  document.getElementById("min").value="";
  document.getElementById("max").value="";
  document.getElementById("province").value="";
  loadCars();
}

/* VIEW */
function viewVehicle(id) {
  window.location.href = "details.html?id=" + id;
}

loadCars();
</script>

</body>
</html>
