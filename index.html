<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DealerFlow - Turn your stock into sales</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background:#f5f7fb;
      color:#0f172a;
    }

    header {
      background:#1d4ed8;
      color:white;
      padding:20px;
    }

    h1 { margin:0; }

    .container {
      padding:20px;
      max-width:1100px;
      margin:auto;
    }

    .card {
      background:white;
      padding:20px;
      border-radius:12px;
      margin-bottom:20px;
      box-shadow:0 2px 8px rgba(0,0,0,0.05);
    }

    .btn {
      display:inline-block;
      padding:14px 24px;
      border-radius:8px;
      text-decoration:none;
      font-weight:bold;
      margin-top:10px;
    }

    .btn-primary {
      background:#1d4ed8;
      color:white;
    }

    .btn-primary:hover {
      background:#163bb5;
    }

    .vehicle-card {
      display:flex;
      gap:20px;
      flex-wrap:wrap;
    }

    .vehicle-card img {
      width:300px;
      border-radius:10px;
    }

    .price {
      color:red;
      font-size:22px;
      font-weight:bold;
    }

    footer {
      text-align:center;
      padding:20px;
      font-size:14px;
      color:#64748b;
    }

    @media(max-width:768px){
      .vehicle-card {
        flex-direction:column;
      }

      .vehicle-card img {
        width:100%;
      }
    }
  </style>
</head>

<body>

<header>
  <h1>DealerFlow</h1>
  <p>Turn your stock into sales</p>
</header>

<div class="container">

  <!-- DEALER SECTION -->
  <div class="card">
    <h2>For Dealers</h2>
    <p>Load your vehicle stock and receive real buyer leads directly via call, WhatsApp, or enquiry.</p>

    <a href="upload.html" class="btn btn-primary">Upload Your Stock</a>
  </div>

  <h2 style="padding: 20px;">Latest Vehicles</h2>

<div id="cars" style="padding: 20px;"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseUrl = "https://ddmvzypiccryjndcwlre.supabase.co";
const supabaseKey = "sb_publishable_D7saHOTE_JhSlMnSgBnIhQ_mOAOUD9s"; // ← replace this
const supabase = supabase.createClient(supabaseUrl, supabaseKey);

async function loadCars() {
  const { data, error } = await supabase
    .from('vehicles')
    .select('*')
    .order('id', { ascending: false });

  if (error) {
    console.log(error);
    return;
  }

  const container = document.getElementById("cars");

  data.forEach(car => {
    const div = document.createElement("div");
    div.style.marginBottom = "20px";
    div.style.background = "#fff";
    div.style.padding = "10px";
    div.style.borderRadius = "10px";

    div.innerHTML = `
      <img src="${car.image}" style="width:100%; border-radius:10px;" />
      <h3>${car.title}</h3>
      <p><b>Price:</b> R${car.price}</p>
      <p><b>Mileage:</b> ${car.milage} km</p>
      <p><b>Location:</b> ${car.location}</p>
      <p><b>Dealer:</b> ${car.dealer}</p>
      <p><b>Phone:</b> ${car.phone}</p>
    `;

    container.appendChild(div);
  });
}

loadCars();
</script>
