<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DealerFlow</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#f4f6f9;
}

/* HEADER */
.header {
  background:linear-gradient(135deg,#1e3a8a,#2563eb);
  color:white;
  padding:40px 20px;
  text-align:center;
}

.header h1 {
  margin:0;
  font-size:36px;
}

.header p {
  margin-top:8px;
}

.dealer-login-btn {
  display:inline-block;
  margin-top:20px;
  background:#111827;
  padding:12px 22px;
  border-radius:30px;
  color:white;
  text-decoration:none;
  font-weight:bold;
}

/* SEARCH */
.search-bar {
  background:white;
  margin:-30px auto 20px;
  max-width:1000px;
  padding:15px;
  border-radius:12px;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.search-bar input {
  flex:1;
  padding:10px;
  border-radius:8px;
  border:1px solid #ddd;
}

.search-btn {
  background:#2563eb;
  color:white;
  border:none;
  padding:10px 20px;
  border-radius:8px;
  cursor:pointer;
}

/* GRID */
.grid {
  max-width:1200px;
  margin:auto;
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
}

/* CARD */
.card {
  background:white;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 8px 25px rgba(0,0,0,0.06);
  transition:0.2s;
}

.card:hover {
  transform:translateY(-5px);
}

.card-img img {
  width:100%;
  height:180px;
  object-fit:cover;
}

.thumb-row {
  display:flex;
  gap:4px;
  padding:6px;
}

.thumb-row img {
  width:50px;
  height:40px;
  object-fit:cover;
  border-radius:6px;
}

/* BODY */
.card-body {
  padding:12px;
}

.title {
  font-weight:bold;
}

.price {
  color:#ef4444;
  font-size:18px;
  font-weight:bold;
  margin-top:6px;
}

.meta {
  font-size:12px;
  color:#777;
}

/* BUTTON */
.btn {
  display:block;
  width:90%;
  margin:10px auto 15px;
  padding:10px;
  background:linear-gradient(135deg,#3b82f6,#2563eb);
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

/* MOBILE */
@media(max-width:600px){
  .card-img img {
    height:140px;
  }
}
</style>
</head>

<body>

<div class="header">
  <h1>DealerFlow</h1>
  <p>Find your next vehicle</p>

  <a href="dealer-admin.html" class="dealer-login-btn">
    Dealer Login
  </a>
</div>

<div class="search-bar">
  <input id="search" placeholder="Search make or model">
  <input id="min" placeholder="Min Price">
  <input id="max" placeholder="Max Price">
  <button class="search-btn" onclick="loadCars()">Search</button>
</div>

<div id="grid" class="grid"></div>

<script>
const supabaseUrl = "https://ddmvzypiccryjndcwlre.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkbXZ6eXBpY2NyeWpuZGN3bHJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NTQ2NzYsImV4cCI6MjA5MTQzMDY3Nn0.mNkODdvX8gllTZeqfr7nllMWfF7ATdj9MY-EKEE3G6w";

function getImages(v){
  let arr=[];
  if(v.image) arr.push(v.image);
  if(v.images){
    v.images.split(",").forEach(i=>arr.push(i.trim()));
  }
  return arr;
}

async function loadCars(){
  let res = await fetch(
    supabaseUrl + "/rest/v1/active_vehicles",
    {
      headers:{
        apikey:supabaseKey,
        Authorization:"Bearer "+supabaseKey
      }
    }
  );

  let data = await res.json();
  let grid = document.getElementById("grid");

  if(!data.length){
    grid.innerHTML = "No vehicles found";
    return;
  }

  let html="";

  data.forEach(v=>{
    let images = getImages(v);
    let thumbs = "";

    images.slice(0,4).forEach(i=>{
      thumbs += <img src="${i}">;
    });

    html += `
      <div class="card">
        <div class="card-img">
          <img src="${images[0]}">
          <div class="thumb-row">${thumbs}</div>
        </div>

        <div class="card-body">
          <div class="title">${v.year} ${v.make} ${v.model}</div>
          <div class="price">R${v.price}</div>
          <div class="meta">${v.location || ""}</div>
        </div>

        <button class="btn" onclick="view(${v.id})">
          View Details
        </button>
      </div>
    `;
  });

  grid.innerHTML = html;
}

function view(id){
  location.href = "details.html?id="+id;
}

loadCars();
</script>

</body>
</html>
