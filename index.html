<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>DealerFlow</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #dfe3ea;
      color: #111827;
    }

    .hero {
      background: linear-gradient(135deg, #3156c7, #1f3f9e);
      color: white;
      padding: 42px 18px 34px;
      text-align: center;
    }

    .hero h1 {
      margin: 0;
      font-size: 56px;
      font-weight: 800;
      letter-spacing: -1px;
    }

    .hero-tagline {
      margin: 14px auto 0;
      max-width: 760px;
      font-size: 24px;
      line-height: 1.35;
      font-weight: 500;
    }

    .hero-buttons {
      margin-top: 18px;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .hero-btn {
      text-decoration: none;
      color: white;
      border: none;
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      min-width: 150px;
      text-align: center;
    }

    .hero-btn.dark {
      background: #111827;
    }

    .hero-btn.green {
      background: #16a34a;
    }

    .search-panel {
      max-width: 760px;
      margin: 20px auto 0;
    }

    .hidden {
      display: none;
    }

    .search-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-top: 10px;
    }

    .search-select,
    .search-input,
    .search-clear-btn {
      width: 100%;
      padding: 14px 16px;
      border-radius: 18px;
      border: none;
      font-size: 15px;
      background: white;
      color: #111827;
    }

    .search-clear-btn {
      background: #111827;
      color: white;
      font-weight: 800;
      cursor: pointer;
    }

    .section-bar {
      padding: 16px 18px;
      background: #eef2ff;
      text-align: center;
      font-weight: 800;
      color: #1f2937;
      font-size: 18px;
    }

    .vehicle-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 18px;
      padding: 18px;
      align-items: start;
    }

    .vehicle-card {
      background: #ffffff;
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.10);
    }

    .vehicle-thumb {
      width: 100%;
      height: 210px;
      object-fit: cover;
      border-radius: 14px;
      background: #e5e7eb;
      display: block;
    }

    .vehicle-title {
      margin: 12px 0 8px;
      font-size: 18px;
      font-weight: 800;
      line-height: 1.25;
      min-height: 46px;
    }

    .vehicle-meta {
      font-size: 14px;
      color: #475569;
      margin-bottom: 4px;
    }

    .price {
      color: #dc2626;
      font-size: 18px;
      font-weight: 800;
      margin: 10px 0 10px;
    }

    .button-stack {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .btn {
      display: block;
      width: 100%;
      text-align: center;
      text-decoration: none;
      color: white;
      padding: 12px;
      border-radius: 12px;
      font-weight: 700;
      font-size: 14px;
    }

    .btn-blue { background: #3156c7; }
    .btn-green { background: #16a34a; }
    .btn-dark { background: #1f2937; }
    .btn-whatsapp { background: #25d366; }

    .empty {
      padding: 30px 18px;
      text-align: center;
      color: #475569;
      font-weight: 700;
      font-size: 18px;
    }

    @media (max-width: 640px) {
      .hero {
        padding: 32px 14px 28px;
      }

      .hero h1 {
        font-size: 38px;
      }

      .hero-tagline {
        font-size: 18px;
      }

      .vehicle-grid {
        grid-template-columns: 1fr;
        padding: 14px;
      }

      .vehicle-thumb {
        height: 220px;
      }
    }
  </style>
</head>
<body>

  <div class="hero">
    <h1>DealerFlow</h1>
    <div class="hero-tagline">Drive your dream. Find the right vehicle fast.</div>

    <div class="hero-buttons">
      <a href="dealer-admin.html" class="hero-btn dark">Dealer Login</a>
      <button id="searchToggleBtn" class="hero-btn green" type="button">Search Vehicle</button>
    </div>

    <div id="searchPanel" class="search-panel hidden">
      <div class="search-grid">
        <select id="provinceFilter" class="search-select">
          <option value="">Province</option>
          <option value="Gauteng">Gauteng</option>
          <option value="Western Cape">Western Cape</option>
          <option value="KwaZulu-Natal">KwaZulu-Natal</option>
          <option value="Eastern Cape">Eastern Cape</option>
          <option value="Free State">Free State</option>
          <option value="Limpopo">Limpopo</option>
          <option value="Mpumalanga">Mpumalanga</option>
          <option value="North West">North West</option>
          <option value="Northern Cape">Northern Cape</option>
        </select>

        <input id="makeFilter" class="search-input" placeholder="Make">
        <input id="modelFilter" class="search-input" placeholder="Model">

        <select id="yearFilter" class="search-select"></select>

        <input id="minPrice" class="search-input" placeholder="Min Price">
        <input id="maxPrice" class="search-input" placeholder="Max Price">

        <button type="button" id="clearSearchBtn" class="search-clear-btn">Clear</button>
      </div>
    </div>
  </div>

  <div class="section-bar">Browse our latest stock</div>

  <div id="vehicle-list" class="vehicle-grid"></div>

  <script>
    const supabaseUrl = "https://ddmvzypiccryjndcwlre.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkbXZ6eXBpY2NyeWpuZGN3bHJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NTQ2NzYsImV4cCI6MjA5MTQzMDY3Nn0.mNkODdvX8gllTZeqfr7nllMWfF7ATdj9MY-EKEE3G6w";

    let allVehicles = [];

    function populateYearFilter() {
      const yearSelect = document.getElementById("yearFilter");
      yearSelect.innerHTML = '<option value="">Year</option>';

      const currentYear = new Date().getFullYear();
      for (let y = currentYear; y >= 1980; y--) {
        const option = document.createElement("option");
        option.value = y;
        option.textContent = y;
        yearSelect.appendChild(option);
      }
    }

    function getMainImage(vehicle) {
      if (vehicle.image && typeof vehicle.image === "string" && vehicle.image.trim() !== "") {
        return vehicle.image.trim();
      }

      if (vehicle.images) {
        if (Array.isArray(vehicle.images) && vehicle.images.length > 0) {
          return vehicle.images[0];
        }

        if (typeof vehicle.images === "string" && vehicle.images.trim() !== "") {
          return vehicle.images.split(",")[0].trim();
        }
      }

      return "https://via.placeholder.com/400x250?text=No+Image";
    }

    function cleanPhone(phone) {
      return String(phone || "").replace(/\s+/g, "");
    }

    function whatsappLink(phone, title) {
      const phoneClean = cleanPhone(phone);
      if (!phoneClean) return "#";
      return "https://wa.me/27" + phoneClean.replace(/^0/, "") +
        "?text=" + encodeURIComponent("Hi, I'm interested in the " + (title || "vehicle") + ".");
    }

    function callLink(phone) {
      const phoneClean = cleanPhone(phone);
      if (!phoneClean) return "#";
      return "tel:" + phoneClean;
    }

    function dealerStockLink(vehicle) {
      const dealerName = vehicle.dealer || vehicle.dealer_name || "Dealer";
      return "dealer.html?dealer=" + encodeURIComponent(dealerName);
    }

    function renderVehicles(vehicles) {
      const container = document.getElementById("vehicle-list");
      container.innerHTML = "";

      if (!vehicles || !vehicles.length) {
        container.innerHTML = '<div class="empty">No vehicles found</div>';
        return;
      }

      vehicles.forEach(v => {
        const mainImage = getMainImage(v);
        const dealerName = v.dealer || v.dealer_name || "Dealer";
        const fallbackTitle = [v.year, v.make, v.model].filter(Boolean).join(" ");
        const title = v.title || fallbackTitle || "No Title";

        const card = document.createElement("div");
        card.className = "vehicle-card";

        card.innerHTML = `
          <img
            src="${mainImage}"
            class="vehicle-thumb"
            alt="${title}"
            onerror="this.src='https://via.placeholder.com/400x250?text=No+Image'"
          >

          <div class="vehicle-title">${title}</div>

          <div class="vehicle-meta">Year: ${v.year || "-"}</div>
          <div class="vehicle-meta">Location: ${v.location || "-"}</div>
          <div class="vehicle-meta">Dealer: ${dealerName}</div>

          <div class="price">R${v.price || 0}</div>

          <div class="button-stack">
            <a href="details.html?id=${v.id}" class="btn btn-blue">View</a>
            <a href="${dealerStockLink(v)}" class="btn btn-green">Dealer</a>
            <a href="${callLink(v.phone)}" class="btn btn-dark">Call</a>
            <a href="${whatsappLink(v.phone, title)}" target="_blank" class="btn btn-whatsapp">WhatsApp</a>
          </div>
        `;

        container.appendChild(card);
      });
    }

    function filterVehicles() {
      const province = document.getElementById("provinceFilter").value.trim().toLowerCase();
      const make = document.getElementById("makeFilter").value.trim().toLowerCase();
      const model = document.getElementById("modelFilter").value.trim().toLowerCase();
      const year = document.getElementById("yearFilter").value.trim();
      const minPriceVal = parseInt(document.getElementById("minPrice").value, 10) || 0;
      const maxPriceVal = parseInt(document.getElementById("maxPrice").value, 10) || 999999999;

      const filtered = allVehicles.filter(v => {
        const location = String(v.location || "").toLowerCase();
        const vehicleMake = String(v.make || "").toLowerCase();
        const vehicleModel = String(v.model || "").toLowerCase();
        const vehicleTitle = String(v.title || "").toLowerCase();
        const vehicleYear = String(v.year || "").trim();
        const vehiclePrice = parseInt(v.price, 10) || 0;

        const matchesProvince = !province || location.includes(province);
        const matchesMake = !make || vehicleMake.includes(make) || vehicleTitle.includes(make);
        const matchesModel = !model || vehicleModel.includes(model) || vehicleTitle.includes(model);
        const matchesYear = !year || vehicleYear === year;
        const matchesMinPrice = vehiclePrice >= minPriceVal;
        const matchesMaxPrice = vehiclePrice <= maxPriceVal;

        return (
          matchesProvince &&
          matchesMake &&
          matchesModel &&
          matchesYear &&
          matchesMinPrice &&
          matchesMaxPrice
        );
      });

      renderVehicles(filtered);
    }

    async function loadVehicles() {
      try {
        const res = await fetch(
          supabaseUrl + "/rest/v1/active_vehicles?select=*&order=id.desc",
          {
            headers: {
              apikey: supabaseKey,
              Authorization: "Bearer " + supabaseKey
            }
          }
        );

        const vehicles = await res.json();

        if (!Array.isArray(vehicles)) {
          document.getElementById("vehicle-list").innerHTML =
            '<div class="empty">Could not load vehicles.</div>';
          return;
        }

        allVehicles = vehicles;
        renderVehicles(allVehicles);

      } catch (err) {
        console.error("Error loading vehicles:", err);
        document.getElementById("vehicle-list").innerHTML =
          '<div class="empty">Could not load vehicles.</div>';
      }
    }

    const searchToggleBtn = document.getElementById("searchToggleBtn");
    const searchPanel = document.getElementById("searchPanel");
    const provinceFilter = document.getElementById("provinceFilter");
    const makeFilter = document.getElementById("makeFilter");
    const modelFilter = document.getElementById("modelFilter");
    const yearFilter = document.getElementById("yearFilter");
    const minPrice = document.getElementById("minPrice");
    const maxPrice = document.getElementById("maxPrice");
    const clearSearchBtn = document.getElementById("clearSearchBtn");

    searchToggleBtn.addEventListener("click", function () {
      searchPanel.classList.toggle("hidden");
    });

    provinceFilter.addEventListener("change", filterVehicles);
    yearFilter.addEventListener("change", filterVehicles);
    makeFilter.addEventListener("input", filterVehicles);
    modelFilter.addEventListener("input", filterVehicles);
    minPrice.addEventListener("input", filterVehicles);
    maxPrice.addEventListener("input", filterVehicles);

    clearSearchBtn.addEventListener("click", function () {
      provinceFilter.value = "";
      makeFilter.value = "";
      modelFilter.value = "";
      yearFilter.value = "";
      minPrice.value = "";
      maxPrice.value = "";
      renderVehicles(allVehicles);
    });

    populateYearFilter();
    loadVehicles();
  </script>

</body>
</html>
