<!DOCTYPE html>
<html>
<head>
  <title>DealerFlow</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
    }

    .header {
      background: #2f55c7;
      color: white;
      padding: 20px;
    }

    .header h1 {
      margin: 0 0 8px 0;
    }

    .card {
      background: white;
      margin: 20px;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .btn {
      background: #2f55c7;
      color: white;
      padding: 12px 20px;
      border-radius: 8px;
      text-decoration: none;
      display: inline-block;
      font-weight: bold;
    }

    .filters-wrap {
      background: white;
      margin: 20px;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .filters-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }

    .filter-input,
    .filter-select {
      width: 100%;
      box-sizing: border-box;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      font-size: 16px;
      background: white;
    }

    .cars-wrap {
      padding: 0 20px 20px 20px;
    }

    .car {
      background: white;
      margin-bottom: 20px;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .car img {
      width: 100%;
      max-height: 320px;
      object-fit: cover;
      border-radius: 10px;
      margin-bottom: 12px;
      background: #e5e7eb;
    }

    .car h3 {
      margin: 0 0 10px 0;
      font-size: 24px;
      line-height: 1.2;
    }

    .price {
      color: #d11a2a;
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .status {
      background: white;
      margin: 20px;
      padding: 16px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .action-buttons {
      display: flex;
      gap: 10px;
      margin-top: 15px;
      flex-wrap: wrap;
    }

    .call-btn,
    .whatsapp-btn,
    .view-btn {
      flex: 1;
      text-align: center;
      padding: 12px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      color: white;
      min-width: 120px;
      border: none;
    }

    .call-btn {
      background: #2f55c7;
    }

    .whatsapp-btn {
      background: #25D366;
    }

    .view-btn {
      background: #111827;
    }
  </style>
</head>

<body>

  <div class="header">
    <h1>DealerFlow</h1>
    <p>Turn your stock into sales</p>
  </div>

  <div class="card">
    <h2>For Dealers</h2>
    <p>Load your vehicle stock and receive real buyer leads directly via call, WhatsApp, or enquiry.</p>
    <a href="upload6.html" class="btn">Upload Your Stock</a>
  </div>

  <div class="filters-wrap">
    <div class="filters-grid">
      <input
        id="searchInput"
        class="filter-input"
        type="text"
        placeholder="Search vehicles, dealer or location"
      >

      <input
        id="maxPriceInput"
        class="filter-input"
        type="number"
        placeholder="Max price"
      >

      <input
        id="maxMileageInput"
        class="filter-input"
        type="number"
        placeholder="Max mileage"
      >

      <select id="locationFilter" class="filter-select">
        <option value="">All locations</option>
      </select>

      <select id="sortFilter" class="filter-select">
        <option value="newest">Sort: Newest</option>
        <option value="price-low">Price: Low to High</option>
        <option value="price-high">Price: High to Low</option>
        <option value="mileage-low">Mileage: Low to High</option>
        <option value="mileage-high">Mileage: High to Low</option>
      </select>
    </div>
  </div>

  <h2 style="padding: 0 20px;">Latest Vehicles</h2>

  <div id="status" class="status">Loading vehicles...</div>
  <div id="cars" class="cars-wrap"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const supabaseUrl = "https://ddmvzypiccryjndcwlre.supabase.co";
    const supabaseKey = "sb_publishable_D7saHOTE_JhSlMnSgBnIhQ_mOAOUD9s";

    const client = window.supabase.createClient(supabaseUrl, supabaseKey);

    let allCars = [];

    function fillLocationDropdown(cars) {
      const locationFilter = document.getElementById("locationFilter");
      const currentValue = locationFilter.value;

      const locations = [...new Set(
        cars
          .map(car => (car.location || "").trim())
          .filter(location => location !== "")
      )].sort();

      locationFilter.innerHTML = '<option value="">All locations</option>';

      locations.forEach(location => {
        const option = document.createElement("option");
        option.value = location;
        option.textContent = location;
        locationFilter.appendChild(option);
      });

      locationFilter.value = currentValue;
    }

    function renderCars(cars) {
      const carsContainer = document.getElementById("cars");
      const statusBox = document.getElementById("status");

      const searchValue = document.getElementById("searchInput").value.toLowerCase().trim();
      const maxPriceValue = document.getElementById("maxPriceInput").value.trim();
      const maxMileageValue = document.getElementById("maxMileageInput").value.trim();
      const locationValue = document.getElementById("locationFilter").value;
      const sortValue = document.getElementById("sortFilter").value;

      let filteredCars = cars.filter(car => {
        const title = (car.title || "").toLowerCase();
        const dealer = (car.dealer || "").toLowerCase();
        const location = (car.location || "").toLowerCase();
        const price = Number(car.price || 0);
        const mileage = Number(car.mileage || 0);

        const matchesSearch =
          !searchValue ||
          title.includes(searchValue) ||
          dealer.includes(searchValue) ||
          location.includes(searchValue);

        const matchesPrice =
          !maxPriceValue || price <= Number(maxPriceValue);

        const matchesMileage =
          !maxMileageValue || mileage <= Number(maxMileageValue);

        const matchesLocation =
          !locationValue || (car.location || "") === locationValue;

        return matchesSearch && matchesPrice && matchesMileage && matchesLocation;
      });

      filteredCars.sort((a, b) => {
        const priceA = Number(a.price || 0);
        const priceB = Number(b.price || 0);
        const mileageA = Number(a.mileage || 0);
        const mileageB = Number(b.mileage || 0);
        const idA = Number(a.id || 0);
        const idB = Number(b.id || 0);

        if (sortValue === "price-low") return priceA - priceB;
        if (sortValue === "price-high") return priceB - priceA;
        if (sortValue === "mileage-low") return mileageA - mileageB;
        if (sortValue === "mileage-high") return mileageB - mileageA;

        return idB - idA;
      });

      carsContainer.innerHTML = "";

      if (filteredCars.length === 0) {
        statusBox.style.display = "block";
        statusBox.innerHTML = "No matching vehicles found.";
        return;
      }

      statusBox.style.display = "none";

      filteredCars.forEach(car => {
        const imageUrl = car.image || "";
        const phone = car.phone || "";
        const mileageValue = car.mileage || "";
        const whatsappNumber = phone.startsWith("0")
          ? "27" + phone.substring(1)
          : phone;

        const div = document.createElement("div");
        div.className = "car";

        div.innerHTML = `
          <img src="${imageUrl}" alt="${car.title || ''}">
          <h3>${car.title || ""}</h3>
          <div class="price">R${car.price || ""}</div>
          <p><strong>Mileage:</strong> ${mileageValue} km</p>
          <p><strong>Location:</strong> ${car.location || ""}</p>
          <p><strong>Dealer:</strong> ${car.dealer || ""}</p>
          <p><strong>Phone:</strong> ${phone}</p>

          <div class="action-buttons">
            <a href="details.html?id=${car.id}" class="view-btn">View Details</a>
            <a href="tel:${phone}" class="call-btn">📞 Call</a>
            <a href="https://wa.me/${whatsappNumber}" target="_blank" class="whatsapp-btn">💬 WhatsApp</a>
          </div>
        `;

        carsContainer.appendChild(div);
      });
    }

    async function loadCars() {
      const statusBox = document.getElementById("status");

      try {
        const { data, error } = await client
          .from("vehicles")
          .select("*");

        if (error) {
          console.log(error);
          statusBox.innerHTML = "Error loading vehicles.";
          return;
        }

        if (!data || data.length === 0) {
          statusBox.innerHTML = "No vehicles found.";
          return;
        }

        allCars = data;
        fillLocationDropdown(allCars);
        renderCars(allCars);

      } catch (e) {
        console.log("Unexpected error:", e);
        statusBox.innerHTML = "Something went wrong loading vehicles.";
      }
    }

    loadCars();

    document.getElementById("searchInput").addEventListener("input", function () {
      renderCars(allCars);
    });

    document.getElementById("maxPriceInput").addEventListener("input", function () {
      renderCars(allCars);
    });

    document.getElementById("maxMileageInput").addEventListener("input", function () {
      renderCars(allCars);
    });

    document.getElementById("locationFilter").addEventListener("change", function () {
      renderCars(allCars);
    });

    document.getElementById("sortFilter").addEventListener("change", function () {
      renderCars(allCars);
    });
  </script>

</body>
</html>
