<!DOCTYPE html>
<html>
<head>
  <title>DealerFlow</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
    }

    .header {
      background: #2f55c7;
      color: white;
      padding: 20px;
    }

    .header h1 {
      margin: 0 0 8px 0;
    }

    .card {
      background: white;
      margin: 20px;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .btn {
      background: #2f55c7;
      color: white;
      padding: 12px 20px;
      border-radius: 8px;
      text-decoration: none;
      display: inline-block;
      font-weight: bold;
    }

    .search-wrap {
      padding: 0 20px;
    }

    .search-box {
      width: 100%;
      box-sizing: border-box;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      font-size: 16px;
      background: white;
    }

    .cars-wrap {
      padding: 0 20px 20px 20px;
    }

    .car {
      background: white;
      margin-bottom: 20px;
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .car img {
      width: 100%;
      max-height: 320px;
      object-fit: cover;
      border-radius: 10px;
      margin-bottom: 12px;
      background: #e5e7eb;
    }

    .car h3 {
      margin: 0 0 10px 0;
      font-size: 24px;
      line-height: 1.2;
    }

    .price {
      color: #d11a2a;
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .status {
      background: white;
      margin: 20px;
      padding: 16px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .action-buttons {
      display: flex;
      gap: 10px;
      margin-top: 15px;
      flex-wrap: wrap;
    }

    .call-btn,
    .whatsapp-btn,
    .view-btn {
      flex: 1;
      text-align: center;
      padding: 12px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      color: white;
      min-width: 120px;
      border: none;
    }

    .call-btn {
      background: #2f55c7;
    }

    .whatsapp-btn {
      background: #25D366;
    }

    .view-btn {
      background: #111827;
    }
  </style>
</head>

<body>

  <div class="header">
    <h1>DealerFlow</h1>
    <p>Turn your stock into sales</p>
  </div>

  <div class="card">
    <h2>For Dealers</h2>
    <p>Load your vehicle stock and receive real buyer leads directly via call, WhatsApp, or enquiry.</p>
    <a href="upload6.html" class="btn">Upload Your Stock</a>
  </div>

  <div class="search-wrap">
    <input
      id="searchInput"
      class="search-box"
      type="text"
      placeholder="Search vehicles (e.g. BMW, Toyota, Urban Cruiser)"
    >
  </div>

  <h2 style="padding: 0 20px;">Latest Vehicles</h2>

  <div id="status" class="status">Loading vehicles...</div>
  <div id="cars" class="cars-wrap"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const supabaseUrl = "https://ddmvzypiccryjndcwlre.supabase.co";
    const supabaseKey = "sb_publishable_D7saHOTE_JhSlMnSgBnIhQ_mOAOUD9s";

    const client = window.supabase.createClient(supabaseUrl, supabaseKey);

    async function loadCars() {
      const carsContainer = document.getElementById("cars");
      const statusBox = document.getElementById("status");
      const searchValue = document.getElementById("searchInput").value.toLowerCase().trim();

      try {
        const { data, error } = await client
          .from("vehicles")
          .select("*")
          .order("id", { ascending: false });

        if (error) {
          console.log(error);
          statusBox.innerHTML = "Error loading vehicles.";
          return;
        }

        if (!data || data.length === 0) {
          statusBox.innerHTML = "No vehicles found.";
          return;
        }

        carsContainer.innerHTML = "";

        const filteredCars = data.filter(car => {
          const title = (car.title || "").toLowerCase();
          const dealer = (car.dealer || "").toLowerCase();
          const location = (car.location || "").toLowerCase();

          return (
            title.includes(searchValue) ||
            dealer.includes(searchValue) ||
            location.includes(searchValue)
          );
        });

        if (filteredCars.length === 0) {
          statusBox.style.display = "block";
          statusBox.innerHTML = "No matching vehicles found.";
          return;
        }

        statusBox.style.display = "none";

        filteredCars.forEach(car => {
          const imageUrl = car.image || "";
          const phone = car.phone || "";
          const mileageValue = car.mileage || "";
          const whatsappNumber = phone.startsWith("0")
            ? "27" + phone.substring(1)
            : phone;

          const div = document.createElement("div");
          div.className = "car";

          div.innerHTML = `
            <img src="${imageUrl}" alt="${car.title || ''}">
            <h3>${car.title || ""}</h3>
            <div class="price">R${car.price || ""}</div>
            <p><strong>Mileage:</strong> ${mileageValue} km</p>
            <p><strong>Location:</strong> ${car.location || ""}</p>
            <p><strong>Dealer:</strong> ${car.dealer || ""}</p>
            <p><strong>Phone:</strong> ${phone}</p>

            <div class="action-buttons">
              <a href="details.html?id=${car.id}" class="view-btn">View Details</a>
              <a href="tel:${phone}" class="call-btn">📞 Call</a>
              <a href="https://wa.me/${whatsappNumber}" target="_blank" class="whatsapp-btn">💬 WhatsApp</a>
            </div>
          `;

          carsContainer.appendChild(div);
        });

      } catch (e) {
        console.log("Unexpected error:", e);
        statusBox.innerHTML = "Something went wrong loading vehicles.";
      }
    }

    loadCars();

    document.getElementById("searchInput").addEventListener("input", function () {
      loadCars();
    });
  </script>

</body>
</html>
