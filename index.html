<!DOCTYPE html>
<html>
<head>
  <title>DealerFlow</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body { margin:0; font-family:Arial; background:#f3f4f6; }

    .header { background:#2f55c7; color:white; padding:20px; }

    .card {
      background:white;
      margin:20px;
      padding:20px;
      border-radius:12px;
    }

    .btn {
      background:#2f55c7;
      color:white;
      padding:12px 20px;
      border-radius:8px;
      text-decoration:none;
      display:inline-block;
      font-weight:bold;
    }

    .cars-wrap { padding:20px; }

    .car {
      background:white;
      margin-bottom:20px;
      padding:15px;
      border-radius:12px;
    }

    .car img {
      width:100%;
      border-radius:10px;
      margin-bottom:10px;
    }

    .price {
      color:#d11a2a;
      font-size:26px;
      font-weight:bold;
    }

    .featured {
      border:3px solid gold;
    }

    .badge {
      background:gold;
      color:black;
      padding:5px 10px;
      border-radius:6px;
      font-weight:bold;
      display:inline-block;
      margin-bottom:10px;
    }

    .buttons a {
      display:block;
      margin-top:10px;
      padding:12px;
      border-radius:8px;
      text-align:center;
      text-decoration:none;
      color:white;
      font-weight:bold;
    }

    .view { background:#111827; }
    .call { background:#2f55c7; }
    .whatsapp { background:#25D366; }
  </style>
</head>

<body>

<div class="header">
  <h1>DealerFlow</h1>
  <p>Turn your stock into sales</p>
</div>

<div class="card">
  <h2>For Dealers</h2>
  <a href="upload6.html" class="btn">Upload Your Stock</a>
</div>

<h2 style="padding:20px;">⭐ Featured Vehicles</h2>
<div id="featuredCars" class="cars-wrap"></div>

<h2 style="padding:20px;">Latest Vehicles</h2>
<div id="cars" class="cars-wrap"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl = "https://ddmvzypiccryjndcwlre.supabase.co";
const supabaseKey = "sb_publishable_D7saHOTE_JhSlMnSgBnIhQ_mOAOUD9s";
const client = window.supabase.createClient(supabaseUrl, supabaseKey);

function getImages(car) {
  if (!car.images) return [car.image];
  return car.images.split(",");
}

function createCarHTML(car, isFeatured=false) {
  const images = getImages(car);
  const phone = car.phone;
  const whatsapp = phone.startsWith("0") ? "27"+phone.substring(1) : phone;

  return `
    <div class="car ${isFeatured ? 'featured' : ''}">
      ${isFeatured ? '<div class="badge">⭐ Featured</div>' : ''}
      <img src="${images[0]}">
      <h3>${car.title}</h3>
      <div class="price">R${car.price}</div>
      <p><b>Mileage:</b> ${car.mileage} km</p>
      <p><b>Location:</b> ${car.location}</p>
      <p><b>Dealer:</b> ${car.dealer}</p>

      <div class="buttons">
        <a href="details.html?id=${car.id}" class="view">View Details</a>
        <a href="tel:${phone}" class="call">📞 Call</a>
        <a href="https://wa.me/${whatsapp}" class="whatsapp">💬 WhatsApp</a>
      </div>
    </div>
  `;
}

async function loadCars() {
  const { data } = await client.from("vehicles").select("*");

  const featuredDiv = document.getElementById("featuredCars");
  const normalDiv = document.getElementById("cars");

  featuredDiv.innerHTML = "";
  normalDiv.innerHTML = "";

  data.forEach(car => {
    if (car.featured) {
      featuredDiv.innerHTML += createCarHTML(car, true);
    } else {
      normalDiv.innerHTML += createCarHTML(car);
    }
  });
}

loadCars();
</script>

</body>
</html>
