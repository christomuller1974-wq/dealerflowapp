<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DealerFlow</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f1f5f9;
}

/* HEADER */
.header {
  background: #3156c7;
  color: white;
  text-align: center;
  padding: 30px 15px;
}

.header h1 {
  margin: 0;
  font-size: 40px;
  font-weight: 900;
}

.header p {
  margin: 6px 0 0;
  font-size: 16px;
}

/* GRID */
.container {
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
}

/* CARD */
.card {
  background: white;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 6px 16px rgba(0,0,0,0.12);
  transition: 0.2s;
}

.card:hover {
  transform: translateY(-5px);
}

/* IMAGE */
.card-img {
  position: relative;
}

.card-img img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.thumb-row {
  display: flex;
  gap: 6px;
  padding: 8px;
}

.thumb-row img {
  width: 50px;
  height: 38px;
  object-fit: cover;
  border-radius: 6px;
}

/* CONTENT */
.card-body {
  padding: 14px;
}

.title {
  font-size: 18px;
  font-weight: 900;
  margin-bottom: 6px;
}

.price {
  color: #dc2626;
  font-size: 22px;
  font-weight: 900;
  margin-bottom: 8px;
}

.meta {
  font-size: 13px;
  color: #475569;
  margin-bottom: 6px;
}

/* BUTTON */
.btn {
  display: block;
  width: 100%;
  text-align: center;
  background: linear-gradient(135deg, #3156c7, #4f7cff);
  color: white;
  text-decoration: none;
  padding: 12px;
  border-radius: 10px;
  font-weight: 900;
  margin-top: 10px;
}

/* EMPTY */
.empty {
  text-align: center;
  padding: 40px;
  font-weight: 700;
}
</style>
</head>

<body>

<div class="header">
  <h1>DealerFlow</h1>
  <p>Find your next vehicle</p>
</div>

<div class="container">
  <div id="grid" class="grid"></div>
</div>

<script>
const supabaseUrl = "https://ddmvzypiccryjndcwlre.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkbXZ6eXBpY2NyeWpuZGN3bHJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NTQ2NzYsImV4cCI6MjA5MTQzMDY3Nn0.mNkODdvX8gllTZeqfr7nllMWfF7ATdj9MY-EKEE3G6w";

/* HELPERS */
function formatPrice(price) {
  const num = Number(String(price || "").replace(/\D/g, ""));
  if (!num) return "R0";
  return "R" + num.toLocaleString("en-ZA");
}

function getImages(v) {
  const arr = [];

  if (v.image) arr.push(v.image);

  if (v.images) {
    v.images.split(",").forEach(x => {
      const img = x.trim();
      if (img && !arr.includes(img)) arr.push(img);
    });
  }

  if (!arr.length) {
    arr.push("https://via.placeholder.com/400x300?text=No+Image");
  }

  return arr;
}

/* LOAD VEHICLES */
async function loadVehicles() {
  const res = await fetch(
    supabaseUrl + "/rest/v1/active_vehicles?select=*",
    {
      headers: {
        apikey: supabaseKey,
        Authorization: "Bearer " + supabaseKey
      }
    }
  );

  const data = await res.json();

  const grid = document.getElementById("grid");

  if (!data.length) {
    grid.innerHTML = '<div class="empty">No vehicles found</div>';
    return;
  }

  let html = "";

  data.forEach(v => {
    const images = getImages(v);
    const dealer = v.dealer || "Dealer";

    let thumbs = "";
    images.slice(0,4).forEach(img => {
      thumbs += <img src="${img}">;
    });

    html += `
      <div class="card">

        <div class="card-img">
          <img src="${images[0]}">
          <div class="thumb-row">${thumbs}</div>
        </div>

        <div class="card-body">
          <div class="title">${v.year || ""} ${v.make || ""} ${v.model || ""}</div>

          <div class="price">${formatPrice(v.price)}</div>

          <div class="meta">📍 ${v.location || "-"}</div>
          <div class="meta">🚗 ${v.mileage || "-"}</div>
          <div class="meta">🏢 ${dealer}</div>

          <a href="details.html?id=${v.id}" class="btn">View Details</a>
        </div>

      </div>
    `;
  });

  grid.innerHTML = html;
}

loadVehicles();
</script>

</body>
</html>
