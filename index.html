<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>DealerFlow</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
body {
  margin:0;
  font-family:Arial;
  background:#dfe3ea;
}

.hero {
  background:#3156c7;
  color:white;
  text-align:center;
  padding:40px 20px 30px;
}

.hero h1 {
  margin:0;
  font-size:46px;
}

.hero p {
  margin:10px 0;
}

.hero-buttons {
  margin-top:15px;
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
}

.hero-btn {
  background:#111827;
  color:white;
  border:none;
  padding:10px 14px;
  border-radius:999px;
  font-weight:bold;
  cursor:pointer;
}

.hero-btn.green {
  background:#16a34a;
}

.search-panel {
  margin-top:15px;
}

.hidden {
  display:none;
}

.search-grid {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(140px,1fr));
  gap:10px;
  margin-top:10px;
}

input, select {
  padding:10px;
  border-radius:10px;
  border:none;
}

.search-clear {
  background:#111827;
  color:white;
  border:none;
  padding:10px;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.vehicle-grid {
  display:grid;
  grid-template-columns: repeat(auto-fill,minmax(280px,1fr));
  gap:15px;
  padding:15px;
}

.vehicle-card {
  background:white;
  padding:12px;
  border-radius:12px;
}

.vehicle-thumb {
  width:100%;
  height:200px;
  object-fit:cover;
  border-radius:10px;
}

.price {
  color:red;
  font-weight:bold;
  margin:8px 0;
}

.btn {
  display:block;
  margin-top:6px;
  padding:10px;
  text-align:center;
  border-radius:8px;
  text-decoration:none;
  color:white;
}

.btn-blue { background:#3156c7; }
.btn-green { background:#16a34a; }
.btn-dark { background:#1f2937; }
.btn-whatsapp { background:#25d366; }
</style>
</head>

<body>

<div class="hero">
  <h1>DealerFlow</h1>
  <p>Drive your dream. Find the right vehicle fast.</p>

  <div class="hero-buttons">
    <a href="dealer-admin.html" class="hero-btn">Dealer Login</a>
    <button id="searchToggle" class="hero-btn green">Search Vehicle</button>
  </div>

  <div id="searchPanel" class="search-panel hidden">
    <div class="search-grid">
      
      <select id="provinceFilter">
        <option value="">Province</option>
        <option>Gauteng</option>
        <option>Western Cape</option>
        <option>KwaZulu-Natal</option>
        <option>Eastern Cape</option>
        <option>Free State</option>
        <option>Limpopo</option>
        <option>Mpumalanga</option>
        <option>North West</option>
        <option>Northern Cape</option>
      </select>

      <input id="makeFilter" placeholder="Make">
      <input id="modelFilter" placeholder="Model">

      <select id="yearFilter"></select>

      <input id="minPrice" placeholder="Min Price">
      <input id="maxPrice" placeholder="Max Price">

      <button class="search-clear" onclick="clearSearch()">Clear</button>

    </div>
  </div>
</div>

<div id="vehicle-list" class="vehicle-grid"></div>

<script>
const supabaseUrl = "https://ddmvzypiccryjndcwlre.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkbXZ6eXBpY2NyeWpuZGN3bHJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NTQ2NzYsImV4cCI6MjA5MTQzMDY3Nn0.mNkODdvX8gllTZeqfr7nllMWfF7ATdj9MY-EKEE3G6w";

let allVehicles = [];

// populate years
const yearSelect = document.getElementById("yearFilter");
yearSelect.innerHTML = '<option value="">Year</option>';
for(let y=new Date().getFullYear(); y>=1980; y--){
  let o=document.createElement("option");
  o.value=y;
  o.text=y;
  yearSelect.appendChild(o);
}

// toggle search
document.getElementById("searchToggle").onclick = ()=>{
  document.getElementById("searchPanel").classList.toggle("hidden");
};

// filter
function filterVehicles(){
  const province = provinceFilter.value.toLowerCase();
  const make = makeFilter.value.toLowerCase();
  const model = modelFilter.value.toLowerCase();
  const year = yearFilter.value;
  const min = parseInt(minPrice.value) || 0;
  const max = parseInt(maxPrice.value) || 999999999;

  let filtered = allVehicles.filter(v=>{
    return (
      (!province || (v.location||"").toLowerCase().includes(province)) &&
      (!make || (v.make||"").toLowerCase().includes(make)) &&
      (!model || (v.model||"").toLowerCase().includes(model)) &&
      (!year || String(v.year)===year) &&
      ((v.price||0) >= min) &&
      ((v.price||0) <= max)
    );
  });

  render(filtered);
}

// attach listeners
["provinceFilter","makeFilter","modelFilter","yearFilter","minPrice","maxPrice"]
.forEach(id=>{
  document.getElementById(id).addEventListener("input", filterVehicles);
});

// clear
function clearSearch(){
  provinceFilter.value="";
  makeFilter.value="";
  modelFilter.value="";
  yearFilter.value="";
  minPrice.value="";
  maxPrice.value="";
  render(allVehicles);
}

// render vehicles
function render(vehicles){
  let container=document.getElementById("vehicle-list");
  container.innerHTML="";

  if(!vehicles.length){
    container.innerHTML="<p>No vehicles found</p>";
    return;
  }

  vehicles.forEach(v=>{
    let img = v.image || "https://via.placeholder.com/400x250";

    container.innerHTML += `
      <div class="vehicle-card">
        <img src="${img}" class="vehicle-thumb">
        <h3>${v.make || ""} ${v.model || ""}</h3>
        <div>${v.year || ""} | ${v.location || ""}</div>
        <div class="price">R${v.price || 0}</div>

        <a href="details.html?id=${v.id}" class="btn btn-blue">View</a>
        <a href="dealer.html?dealer=${encodeURIComponent(v.dealer||"")}" class="btn btn-green">Dealer</a>
        <a href="tel:${v.phone||""}" class="btn btn-dark">Call</a>
        <a href="https://wa.me/27${(v.phone||"").replace(/^0/,"")}" class="btn btn-whatsapp">WhatsApp</a>
      </div>
    `;
  });
}

// load data
async function load(){
  let res = await fetch(
    supabaseUrl + "/rest/v1/vehicles?select=*&order=id.desc",
    {
      headers:{
        apikey:supabaseKey,
        Authorization:"Bearer "+supabaseKey
      }
    }
  );

  let data = await res.json();
  allVehicles = data;
  render(allVehicles);
}

load();
</script>

</body>
</html>
