<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CarScoutZA | Used Cars for Sale South Africa</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="google-site-verification" content="oOba0W7_EqwqEoXSWQad1Hymmbeiy8oUrvwCztLuX-M" />

<meta name="description" content="Find used cars for sale in South Africa. CarScoutZA connects buyers and dealers with trusted listings and fast contact.">
<meta property="og:title" content="CarScoutZA - Used Cars South Africa">
<meta property="og:description" content="Find used cars from trusted dealers across South Africa.">
<meta property="og:type" content="website">

<style>
* { box-sizing:border-box; }

body {
  margin:0;
  font-family:Arial, sans-serif;
  background:#f4f6f9;
  color:#111827;
}

.header {
  background:linear-gradient(135deg,#111827,#1e3a8a,#2563eb);
  color:white;
  text-align:center;
  padding:60px 20px 105px;
  position:relative;
}

.header h1 {
  font-size:44px;
  margin:0;
  font-weight:900;
  letter-spacing:-1px;
}

.header p {
  margin:10px 0 0;
  font-size:18px;
}

.dealer-btn {
  position:absolute;
  top:15px;
  right:15px;
  background:#111827;
  color:white;
  padding:10px 14px;
  border-radius:10px;
  text-decoration:none;
  font-weight:bold;
  font-size:13px;
  box-shadow:0 6px 16px rgba(0,0,0,0.25);
}

.search-bar {
  background:rgba(255,255,255,0.96);
  backdrop-filter:blur(10px);
  margin:-50px auto 28px;
  max-width:1180px;
  padding:12px;
  border-radius:18px;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  position:sticky;
  top:0;
  z-index:1000;
  box-shadow:0 10px 30px rgba(0,0,0,0.14);
}

.search-bar input,
.search-bar select {
  flex:1;
  min-width:130px;
  padding:11px;
  border-radius:12px;
  border:1px solid #e5e7eb;
  font-size:13px;
  outline:none;
  background:white;
}

.search-bar input:focus,
.search-bar select:focus {
  border-color:#2563eb;
  box-shadow:0 0 0 2px rgba(37,99,235,0.18);
}

.search-btn,
.clear-btn {
  color:white;
  border:none;
  border-radius:12px;
  padding:11px 16px;
  font-size:13px;
  font-weight:900;
  cursor:pointer;
}

.search-btn { background:#2563eb; }
.clear-btn { background:#111827; }

.count-box {
  width:100%;
  font-size:13px;
  font-weight:900;
  padding:4px 2px 0;
  color:#475569;
}

.grid {
  max-width:1320px;
  margin:auto;
  padding:22px;
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(260px, 1fr));
  gap:24px;
}

.grid:has(.card:only-child) {
  max-width:340px;
}

.card {
  background:white;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 8px 24px rgba(0,0,0,0.10);
  width:100%;
  max-width:100%;
  transition:0.25s;
  border:1px solid #eef2f7;
}

.card:hover {
  transform:translateY(-5px);
  box-shadow:0 16px 34px rgba(0,0,0,0.16);
}

.img-wrap {
  position:relative;
  background:#e5e7eb;
  overflow:hidden;
}

.card img {
  width:100%;
  height:190px;
  object-fit:cover;
  display:block;
  background:#e5e7eb;
  transition:0.3s;
}

.card:hover img {
  transform:scale(1.04);
}

.featured-badge {
  position:absolute;
  top:10px;
  left:10px;
  background:#facc15;
  color:#111827;
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
}

.photo-badge {
  position:absolute;
  right:10px;
  bottom:10px;
  background:rgba(17,24,39,0.86);
  color:white;
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
}

.card-body {
  padding:15px;
}

.card h3 {
  margin:0 0 10px;
  font-size:18px;
  min-height:44px;
  line-height:1.25;
  font-weight:900;
}

.price {
  color:#dc2626;
  font-weight:900;
  font-size:21px;
  margin-bottom:8px;
}

.meta {
  color:#475569;
  font-size:14px;
  margin-top:6px;
}

.btn {
  display:block;
  text-align:center;
  padding:12px;
  margin:10px 12px;
  border-radius:12px;
  text-decoration:none;
  font-weight:900;
  border:none;
  cursor:pointer;
}

.view-btn {
  background:#2563eb;
  color:white;
}

.whatsapp-btn {
  background:#25D366;
  color:white;
  margin-top:0;
}

.empty {
  grid-column:1/-1;
  text-align:center;
  padding:34px;
  background:white;
  border-radius:16px;
  font-weight:900;
  box-shadow:0 8px 24px rgba(0,0,0,0.08);
}

@media(max-width:700px){
  .header {
    padding:64px 15px 55px;
  }

  .header h1 {
    font-size:36px;
  }

  .header p {
    font-size:15px;
  }

  .dealer-btn {
    top:12px;
    right:12px;
  }

  .search-bar {
    position:static;
    margin:10px;
    border-radius:16px;
  }

  .search-bar input,
  .search-bar select,
  .search-btn,
  .clear-btn {
    width:100%;
    flex:1 1 100%;
  }

  .grid {
    grid-template-columns:1fr;
    padding:14px;
  }

  .grid:has(.card:only-child) {
    max-width:100%;
  }

  .card img {
    height:220px;
  }
}
</style>
</head>

<body>

<div class="header">
  <a href="dealer-admin.html" class="dealer-btn">Dealer Login</a>
  <h1>CarScoutZA</h1>
  <p>Used Cars for Sale in South Africa</p>
</div>

<div class="search-bar">
  <input id="search" placeholder="Search make or model">
  <input id="min" placeholder="Min Price" type="number">
  <input id="max" placeholder="Max Price" type="number">

  <select id="province">
    <option value="">All Provinces</option>
    <option>Gauteng</option>
    <option>Western Cape</option>
    <option>Eastern Cape</option>
    <option>KwaZulu-Natal</option>
    <option>Free State</option>
    <option>Limpopo</option>
    <option>Mpumalanga</option>
    <option>North West</option>
    <option>Northern Cape</option>
  </select>

  <select id="sort">
    <option value="">Sort</option>
    <option value="low">Price Low → High</option>
    <option value="high">Price High → Low</option>
  </select>

  <button class="search-btn" onclick="loadCars()">Search</button>
  <button class="clear-btn" onclick="clearSearch()">Clear</button>

  <div id="count" class="count-box"></div>
</div>

<div id="grid" class="grid"></div>

<script>
const supabaseUrl = "https://ddmvzypiccryjndcwlre.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkbXZ6eXBpY2NyeWpuZGN3bHJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NTQ2NzYsImV4cCI6MjA5MTQzMDY3Nn0.mNkODdvX8gllTZeqfr7nllMWfF7ATdj9MY-EKEE3G6w";

function formatPrice(p){
  const num = Number(String(p || "").replace(/\D/g, ""));
  if (!num) return "R0";
  return "R" + num.toLocaleString("en-ZA");
}

function cleanPhone(phone){
  return String(phone || "").replace(/\D/g, "");
}

function whatsappLink(v, title){
  let phone = cleanPhone(v.phone || v.dealer_phone || "");
  if (!phone) return "#";
  if (phone.startsWith("0")) phone = "27" + phone.substring(1);

  return "https://wa.me/" + phone + "?text=" +
    encodeURIComponent("Hi, I'm interested in the " + title);
}

function getImages(v){
  let arr = [];

  if (v.image && String(v.image).trim()) {
    arr.push(String(v.image).trim());
  }

  if (v.images && String(v.images).trim()) {
    String(v.images).split(",").forEach(function(i){
      const img = i.trim();
      if (img && !arr.includes(img)) arr.push(img);
    });
  }

  if (!arr.length) {
    arr.push("https://via.placeholder.com/400x300?text=No+Image");
  }

  return arr;
}

async function trackClick(vehicleId, dealerId){
  try{
    await fetch(supabaseUrl + "/rest/v1/vehicle_clicks", {
      method:"POST",
      headers:{
        apikey:supabaseKey,
        Authorization:"Bearer " + supabaseKey,
        "Content-Type":"application/json",
        Prefer:"return=minimal"
      },
      body: JSON.stringify({
        vehicle_id: vehicleId,
        dealer_user_id: dealerId || null,
        click_type: "view"
      })
    });
  } catch(e) {
    console.log(e);
  }
}

async function loadCars(){
  const grid = document.getElementById("grid");
  const count = document.getElementById("count");

  grid.innerHTML = '<div class="empty">Loading vehicles...</div>';
  count.innerText = "";

  try {
    const res = await fetch(
      supabaseUrl + "/rest/v1/active_vehicles?select=*&order=id.desc",
      {
        headers:{
          apikey:supabaseKey,
          Authorization:"Bearer " + supabaseKey
        }
      }
    );

    let data = await res.json();

    if (!Array.isArray(data)) {
      grid.innerHTML = '<div class="empty">Could not load vehicles.</div>';
      return;
    }

    const search = document.getElementById("search").value.toLowerCase().trim();
    const min = Number(document.getElementById("min").value) || 0;
    const max = Number(document.getElementById("max").value) || 999999999;
    const province = document.getElementById("province").value.toLowerCase().trim();
    const sort = document.getElementById("sort").value;

    data = data.filter(function(v){
      const text = (
        (v.year || "") + " " +
        (v.make || "") + " " +
        (v.model || "") + " " +
        (v.title || "")
      ).toLowerCase();

      const price = Number(String(v.price || "").replace(/\D/g, "")) || 0;
      const location = String(v.location || "").toLowerCase();
      const vehicleProvince = String(v.province || "").toLowerCase();

      if (search && !text.includes(search)) return false;
      if (price < min) return false;
      if (price > max) return false;

      if (province) {
        if (!location.includes(province) && !vehicleProvince.includes(province)) return false;
      }

      return true;
    });

    if (sort === "low") {
      data.sort(function(a,b){
        return (Number(String(a.price || "").replace(/\D/g, "")) || 0) -
               (Number(String(b.price || "").replace(/\D/g, "")) || 0);
      });
    }

    if (sort === "high") {
      data.sort(function(a,b){
        return (Number(String(b.price || "").replace(/\D/g, "")) || 0) -
               (Number(String(a.price || "").replace(/\D/g, "")) || 0);
      });
    }

    count.innerText = data.length + " vehicles found";

    if (!data.length) {
      grid.innerHTML = '<div class="empty">No vehicles found</div>';
      return;
    }

    let html = "";

    data.forEach(function(v){
      const title = [v.year, v.make, v.model].filter(Boolean).join(" ") || v.title || "Vehicle";
      const vehicleImages = getImages(v);
      const img = vehicleImages[0];
      const featured = v.featured ? '<div class="featured-badge">Featured</div>' : "";

      html += `
        <div class="card">
          <div class="img-wrap">
            ${featured}
            <img src="${img}" loading="lazy" onerror="this.src='https://via.placeholder.com/400x300?text=No+Image'">
            <div class="photo-badge">📷 ${vehicleImages.length}</div>
          </div>

          <div class="card-body">
            <h3>${title}</h3>
            <div class="price">${formatPrice(v.price)}</div>
            <div class="meta">📍 ${v.location || "-"}</div>
            <div class="meta">🚗 ${v.mileage || "-"}</div>
            <div class="meta">🏢 ${v.dealer || v.dealer_name || "Dealer"}</div>
          </div>

          <button class="btn view-btn" onclick="openVehicle(${v.id}, '${v.user_id || ""}')">View Details</button>
          <a href="${whatsappLink(v, title)}" target="_blank" class="btn whatsapp-btn">WhatsApp</a>
        </div>
      `;
    });

    grid.innerHTML = html;

  } catch(err) {
    console.error(err);
    grid.innerHTML = '<div class="empty">Error loading vehicles.</div>';
  }
}

function openVehicle(id, dealerId){
  trackClick(id, dealerId);
  window.location.href = "details.html?id=" + id;
}

function clearSearch(){
  document.getElementById("search").value = "";
  document.getElementById("min").value = "";
  document.getElementById("max").value = "";
  document.getElementById("province").value = "";
  document.getElementById("sort").value = "";
  loadCars();
}

loadCars();
</script>

</body>
</html>
