<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CarScoutZA | Used Cars for Sale South Africa</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial,sans-serif;
  background:#f4f6f9;
  color:#111827;
}

.hero{
  width:100%;
  height:420px;
  background-image:url('hero-banner.jpeg');
  background-size:cover;
  background-position:center;
  position:relative;
}

.hero-buttons{
  position:absolute;
  top:20px;
  right:20px;
  display:flex;
  gap:10px;
  z-index:10;
}

.hero-buttons a{
  color:white;
  text-decoration:none;
  padding:12px 18px;
  border-radius:12px;
  font-weight:900;
}

.contact-btn{
  background:#2563eb;
}

.login-btn{
  background:#111827;
}

.search-bar{
  background:white;
  max-width:1180px;
  margin:-40px auto 30px;
  padding:14px;
  border-radius:18px;
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  box-shadow:0 10px 30px rgba(0,0,0,0.12);
  position:relative;
  z-index:20;
}

.search-bar input,
.search-bar select{
  flex:1;
  min-width:140px;
  padding:12px;
  border:1px solid #dbe1e8;
  border-radius:12px;
  font-size:14px;
}

.search-btn,
.clear-btn{
  border:none;
  color:white;
  padding:12px 18px;
  border-radius:12px;
  cursor:pointer;
  font-weight:900;
}

.search-btn{
  background:#2563eb;
}

.clear-btn{
  background:#111827;
}

.count-box{
  width:100%;
  font-size:14px;
  font-weight:bold;
  color:#475569;
}

.grid{
  max-width:1320px;
  margin:auto;
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:24px;
}

.card{
  background:white;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 8px 24px rgba(0,0,0,0.10);
  transition:0.25s;
}

.card:hover{
  transform:translateY(-4px);
}

.img-wrap{
  position:relative;
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
  display:block;
}

.featured-badge{
  position:absolute;
  top:10px;
  left:10px;
  background:#facc15;
  color:#111827;
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
}

.photo-badge{
  position:absolute;
  right:10px;
  bottom:10px;
  background:rgba(0,0,0,0.7);
  color:white;
  padding:6px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
}

.card-body{
  padding:15px;
}

.card h3{
  margin:0 0 10px;
  font-size:18px;
}

.price{
  color:#dc2626;
  font-size:22px;
  font-weight:900;
}

.meta{
  margin-top:6px;
  color:#475569;
  font-size:14px;
}

.empty{
  text-align:center;
  padding:40px;
  background:white;
  border-radius:16px;
  font-weight:900;
}

@media(max-width:700px){

  .hero{
    height:290px;
    background-position:center top;
  }

  .hero-buttons{
    left:15px;
    right:15px;
    justify-content:center;
  }

  .search-bar{
    margin:20px 12px;
  }

  .search-bar input,
  .search-bar select,
  .search-btn,
  .clear-btn{
    width:100%;
    flex:1 1 100%;
  }

  .grid{
    grid-template-columns:1fr;
    padding:14px;
  }

  .card img{
    height:220px;
  }
}
</style>
</head>

<body>

<div class="hero">

  <div class="hero-buttons">

    <a href="contact.html" class="contact-btn">
      Contact
    </a>

    <a href="dealer-admin.html" class="login-btn">
      Dealer Login
    </a>

  </div>

</div>

<div class="search-bar">

  <input id="search" placeholder="Search make or model">

  <input id="min" placeholder="Min Price" type="number">

  <input id="max" placeholder="Max Price" type="number">

  <select id="province">
    <option value="">All Provinces</option>
    <option>Gauteng</option>
    <option>Western Cape</option>
    <option>Eastern Cape</option>
    <option>KwaZulu-Natal</option>
    <option>Free State</option>
    <option>Limpopo</option>
    <option>Mpumalanga</option>
    <option>North West</option>
    <option>Northern Cape</option>
  </select>

  <select id="sort">
    <option value="">Sort</option>
    <option value="low">Price Low → High</option>
    <option value="high">Price High → Low</option>
  </select>

  <button class="search-btn" onclick="loadCars()">
    Search
  </button>

  <button class="clear-btn" onclick="clearSearch()">
    Clear
  </button>

  <div id="count" class="count-box"></div>

</div>

<div style="max-width:1320px;margin:auto;padding:0 22px;">
  <h2 style="font-size:34px;font-weight:900;">
    Latest Vehicles
  </h2>
</div>

<div id="grid" class="grid"></div>

<script>

const supabaseUrl =
"https://ddmvzypiccryjndcwlre.supabase.co";

const supabaseKey =
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkbXZ6eXBpY2NyeWpuZGN3bHJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NTQ2NzYsImV4cCI6MjA5MTQzMDY3Nn0.mNkODdvX8gllTZeqfr7nllMWfF7ATdj9MY-EKEE3G6w";

function getImages(v){

  let arr = [];

  if(v.image){
    arr.push(v.image);
  }

  if(v.images){

    v.images.split(",").forEach(function(i){

      const img = i.trim();

      if(img && !arr.includes(img)){
        arr.push(img);
      }

    });

  }

  if(!arr.length){

    arr.push(
      "https://via.placeholder.com/400x300?text=No+Image"
    );

  }

  return arr;
}

function formatPrice(p){

  const num =
  Number(
    String(p || "").replace(/\D/g,"")
  );

  if(!num) return "R0";

  return "R" +
  num.toLocaleString("en-ZA");
}

async function loadCars(){

  const grid =
  document.getElementById("grid");

  const count =
  document.getElementById("count");

  grid.innerHTML =
  '<div class="empty">Loading vehicles...</div>';

  try{

    const res = await fetch(
      supabaseUrl +
      "/rest/v1/active_vehicles?select=*&order=id.desc",
      {
        headers:{
          apikey:supabaseKey,
          Authorization:"Bearer " + supabaseKey
        }
      }
    );

    let data = await res.json();

    const search =
    document.getElementById("search")
    .value
    .toLowerCase();

    const min =
    Number(
      document.getElementById("min").value
    ) || 0;

    const max =
    Number(
      document.getElementById("max").value
    ) || 999999999;

    const province =
    document.getElementById("province")
    .value
    .toLowerCase();

    data = data.filter(function(v){

      const text =
      (
        (v.year || "") + " " +
        (v.make || "") + " " +
        (v.model || "")
      ).toLowerCase();

      const price =
      Number(
        String(v.price || "")
        .replace(/\D/g,"")
      ) || 0;

      const location =
      String(v.location || "")
      .toLowerCase();

      if(search && !text.includes(search)){
        return false;
      }

      if(price < min){
        return false;
      }

      if(price > max){
        return false;
      }

      if(province && !location.includes(province)){
        return false;
      }

      return true;

    });

    count.innerText =
    data.length + " vehicles found";

    let html = "";

    data.forEach(function(v){

      const images =
      getImages(v);

      const img =
      images[0];

      const title =
      [v.year,v.make,v.model]
      .filter(Boolean)
      .join(" ");

      html += `

      <div class="card">

        <div class="img-wrap">

          <img
            src="${img}"
            onclick="window.location.href='details.html?id=${v.id}'"
          >

          <div class="photo-badge">
            📷 ${images.length}
          </div>

        </div>

        <div class="card-body">

          <h3>${title}</h3>

          <div class="price">
            ${formatPrice(v.price)}
          </div>

          <div class="meta">
            📍 ${v.location || "-"}
          </div>

          <div class="meta">
            🚗 ${v.mileage || "-"}
          </div>

          <div class="meta">
            🏢 ${v.dealer || "Dealer"}
          </div>

        </div>

      </div>

      `;

    });

    grid.innerHTML =
    html ||
    '<div class="empty">No vehicles found</div>';

  }catch(err){

    console.log(err);

    grid.innerHTML =
    '<div class="empty">Error loading vehicles.</div>';

  }

}

function clearSearch(){

  document.getElementById("search").value = "";
  document.getElementById("min").value = "";
  document.getElementById("max").value = "";
  document.getElementById("province").value = "";
  document.getElementById("sort").value = "";

  loadCars();
}

loadCars();

</script>

</body>
</html>
