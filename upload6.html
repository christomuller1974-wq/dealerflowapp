<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DealerFlow Upload</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      margin: 0;
      color: #0f172a;
    }

    .header {
      background: #1d4ed8;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .container {
      max-width: 700px;
      margin: 20px auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      font-size: 15px;
      background: #1d4ed8;
      color: white;
    }

    .preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .preview-grid img {
      width: 100%;
      height: 110px;
      object-fit: cover;
      border-radius: 10px;
      border: 1px solid #ddd;
    }

    .status {
      margin-top: 14px;
      padding: 12px;
      border-radius: 8px;
      font-weight: bold;
      background: #e2e8f0;
      color: #0f172a;
      min-height: 20px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="header">
    <h2>DealerFlow Upload</h2>
    <p>Add multiple vehicle photos</p>
  </div>

  <div class="container">
    <input type="file" id="photos" accept="image/*" multiple />
    <div id="previewGrid" class="preview-grid"></div>

    <input id="title" placeholder="Vehicle Title" />
    <input id="price" placeholder="Price" />
    <input id="mileage" placeholder="Mileage" />
    <input id="location" placeholder="Location" />
    <input id="dealer" placeholder="Dealer Name" />
    <input id="phone" placeholder="Phone Number" />

    <button type="button" onclick="publishVehicle()">Publish Vehicle</button>

    <div id="status" class="status">Page loaded.</div>
  </div>

  <script>
    const projectUrl = "https://ddmvzypiccryjndcwlre.supabase.co";
    const publishableKey = "sb_publishable_D7saHOTE_JhSlMnSgBnIhQ_mOAOUD9s";
    const bucketName = "vehicle-images";

    const photosInput = document.getElementById("photos");
    const previewGrid = document.getElementById("previewGrid");
    const statusBox = document.getElementById("status");

    photosInput.addEventListener("change", () => {
      previewGrid.innerHTML = "";
      const files = Array.from(photosInput.files || []);

      if (!files.length) {
        statusBox.textContent = "No photos selected.";
        return;
      }

      files.forEach(file => {
        const reader = new FileReader();
        reader.onload = function (e) {
          const img = document.createElement("img");
          img.src = e.target.result;
          previewGrid.appendChild(img);
        };
        reader.readAsDataURL(file);
      });

      statusBox.textContent = files.length + " photo(s) selected.";
    });

    async function uploadOneFile(file) {
      const fileExt = file.name.split(".").pop();
      const fileName = Date.now() + "-" + Math.floor(Math.random() * 100000) + "." + fileExt;
      const filePath = "vehicles/" + fileName;

      const uploadRes = await fetch(
        projectUrl + "/storage/v1/object/" + bucketName + "/" + filePath,
        {
          method: "POST",
          headers: {
            "Authorization": "Bearer " + publishableKey,
            "apikey": publishableKey,
            "x-upsert": "false",
            "Content-Type": file.type || "image/jpeg"
          },
          body: file
        }
      );

      if (!uploadRes.ok) {
        const uploadText = await uploadRes.text();
        throw new Error(uploadText);
      }

      return projectUrl + "/storage/v1/object/public/" + bucketName + "/" + filePath;
    }

    async function publishVehicle() {
      statusBox.textContent = "Starting upload...";

      const title = document.getElementById("title").value.trim();
      const price = document.getElementById("price").value.trim();
      const mileage = document.getElementById("mileage").value.trim();
      const location = document.getElementById("location").value.trim();
      const dealer = document.getElementById("dealer").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const files = Array.from(photosInput.files || []);

      if (!title || !price || !mileage || !location || !dealer || !phone) {
        statusBox.textContent = "Please fill in all fields.";
        return;
      }

      if (!files.length) {
        statusBox.textContent = "Please choose at least one photo.";
        return;
      }

      try {
        const uploadedUrls = [];

        for (let i = 0; i < files.length; i++) {
          statusBox.textContent = "Uploading photo " + (i + 1) + " of " + files.length + "...";
          const imageUrl = await uploadOneFile(files[i]);
          uploadedUrls.push(imageUrl);
        }

        statusBox.textContent = "Saving vehicle...";

        const mainImage = uploadedUrls[0];
        const imagesString = uploadedUrls.join(",");

        const insertRes = await fetch(projectUrl + "/rest/v1/vehicles", {
          method: "POST",
          headers: {
            "Authorization": "Bearer " + publishableKey,
            "apikey": publishableKey,
            "Content-Type": "application/json",
            "Prefer": "return=representation"
          },
          body: JSON.stringify([{
            title: title,
            price: price,
            mileage: mileage,
            location: location,
            dealer: dealer,
            phone: phone,
            image: mainImage,
            images: imagesString
          }])
        });

        if (!insertRes.ok) {
          const insertText = await insertRes.text();
          statusBox.textContent = "Vehicle save failed: " + insertText;
          return;
        }

        statusBox.textContent = "Vehicle uploaded successfully!";

        document.getElementById("title").value = "";
        document.getElementById("price").value = "";
        document.getElementById("mileage").value = "";
        document.getElementById("location").value = "";
        document.getElementById("dealer").value = "";
        document.getElementById("phone").value = "";
        photosInput.value = "";
        previewGrid.innerHTML = "";
      } catch (err) {
        statusBox.textContent = "Something went wrong: " + err.message;
      }
    }
  </script>
</body>
</html>
