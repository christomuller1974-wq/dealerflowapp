<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DealerFlow Upload V6</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      margin: 0;
      color: #0f172a;
    }
    .header {
      background: #1d4ed8;
      color: white;
      padding: 20px;
      text-align: center;
    }
    .container {
      max-width: 520px;
      margin: 20px auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      font-size: 14px;
    }
    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      font-size: 15px;
      background: #1d4ed8;
      color: white;
    }
    .preview {
      width: 100%;
      max-height: 280px;
      object-fit: cover;
      border-radius: 10px;
      margin-bottom: 12px;
      display: none;
      border: 1px solid #ddd;
    }
    .status {
      margin-top: 14px;
      padding: 12px;
      border-radius: 8px;
      font-weight: bold;
      background: #e2e8f0;
      color: #0f172a;
      min-height: 20px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="header">
    <h2>DealerFlow Upload V6</h2>
    <p>Direct upload test</p>
  </div>

  <div class="container">
    <input type="file" id="photo" accept="image/*" />
    <img id="preview" class="preview" alt="Preview" />

    <input id="title" placeholder="Vehicle Title" />
    <input id="price" placeholder="Price" />
    <input id="mileage" placeholder="Mileage" />
    <input id="location" placeholder="Location" />
    <input id="dealer" placeholder="Dealer Name" />
    <input id="phone" placeholder="Phone Number" />

    <button type="button" onclick="publishVehicle()">Publish Vehicle</button>

    <div id="status" class="status">Page loaded.</div>
  </div>

  <script>
    const projectUrl = "https://ddmvzypiccryjndcwlre.supabase.co";
    const publishableKey = "sb_publishable_D7saHOTE_JhSlMnSgBnIhQ_mOAOUD9s";
    const bucketName = "vehicle-images";

    const photoInput = document.getElementById("photo");
    const preview = document.getElementById("preview");
    const statusBox = document.getElementById("status");

    photoInput.addEventListener("change", () => {
      const file = photoInput.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function (e) {
        preview.src = e.target.result;
        preview.style.display = "block";
        statusBox.textContent = "Photo selected.";
      };
      reader.readAsDataURL(file);
    });

    async function publishVehicle() {
      statusBox.textContent = "Button clicked.";

      const title = document.getElementById("title").value.trim();
      const price = document.getElementById("price").value.trim();
      const mileage = document.getElementById("mileage").value.trim();
      const location = document.getElementById("location").value.trim();
      const dealer = document.getElementById("dealer").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const file = photoInput.files[0];

      if (!title || !price || !mileage || !location || !dealer || !phone) {
        statusBox.textContent = "Please fill in all fields.";
        return;
      }

      if (!file) {
        statusBox.textContent = "Please choose a photo.";
        return;
      }

      try {
        statusBox.textContent = "Uploading image...";

        const fileExt = file.name.split(".").pop();
        const fileName = Date.now() + "." + fileExt;
        const filePath = "vehicles/" + fileName;

        const uploadRes = await fetch(
          projectUrl + "/storage/v1/object/" + bucketName + "/" + filePath,
          {
            method: "POST",
            headers: {
              "Authorization": "Bearer " + publishableKey,
              "apikey": publishableKey,
              "x-upsert": "false",
              "Content-Type": file.type || "image/jpeg"
            },
            body: file
          }
        );

        if (!uploadRes.ok) {
          const uploadText = await uploadRes.text();
          statusBox.textContent = "Image upload failed: " + uploadText;
          return;
        }

        const imageUrl =
          projectUrl +
          "/storage/v1/object/public/" +
          bucketName +
          "/" +
          filePath;

        statusBox.textContent = "Saving vehicle...";

        const insertRes = await fetch(projectUrl + "/rest/v1/vehicles", {
          method: "POST",
          headers: {
            "Authorization": "Bearer " + publishableKey,
            "apikey": publishableKey,
            "Content-Type": "application/json",
            "Prefer": "return=representation"
          },
          body: JSON.stringify([{
            title: title,
            price: price,
            mileage: mileage,
            location: location,
            dealer: dealer,
            phone: phone,
            image: imageUrl
          }])
        });

        if (!insertRes.ok) {
          const insertText = await insertRes.text();
          statusBox.textContent = "Vehicle save failed: " + insertText;
          return;
        }

        statusBox.textContent = "Vehicle uploaded successfully!";
      } catch (err) {
        statusBox.textContent = "Something went wrong: " + err.message;
      }
    }
  </script>
</body>
</html>
