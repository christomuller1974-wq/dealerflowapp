<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DealerFlow Upload</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      margin: 0;
      color: #0f172a;
    }

    .header {
      background: #1d4ed8;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .container {
      max-width: 700px;
      margin: 20px auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .top-actions {
      margin-bottom: 15px;
    }

    .top-actions a,
    .top-actions button {
      background: #111827;
      color: white;
      padding: 10px 14px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      display: inline-block;
      margin-right: 10px;
      margin-bottom: 10px;
      border: none;
      cursor: pointer;
      font-size: 14px;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      font-size: 14px;
    }

    button.publish-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      font-size: 15px;
      background: #1d4ed8;
      color: white;
    }

    .preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .preview-grid img {
      width: 100%;
      height: 110px;
      object-fit: cover;
      border-radius: 10px;
      border: 1px solid #ddd;
    }

    .status {
      margin-top: 14px;
      padding: 12px;
      border-radius: 8px;
      font-weight: bold;
      background: #e2e8f0;
      color: #0f172a;
      min-height: 20px;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="header">
    <h2>DealerFlow Upload</h2>
    <p>Add vehicles to your own dealer account</p>
  </div>

  <div class="container">
    <div class="top-actions">
      <a href="dealer-admin.html">← Back to Dashboard</a>
      <a href="index.html">Website</a>
      <button type="button" onclick="logout()">Logout</button>
    </div>

    <div id="dealerInfo" class="status">Checking login...</div>

    <input type="file" id="photos" accept="image/*" multiple />
    <div id="previewGrid" class="preview-grid"></div>

    <input id="title" placeholder="Vehicle Title" />
    <input id="price" placeholder="Price" />
    <input id="mileage" placeholder="Mileage" />
    <input id="location" placeholder="Location" />
    <input id="dealer" placeholder="Dealer Name" />
    <input id="phone" placeholder="Phone Number" />

    <button type="button" class="publish-btn" onclick="publishVehicle()">Publish Vehicle</button>

    <div id="status" class="status">Ready.</div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseUrl = "https://ddmvzypiccryjndcwlre.supabase.co";
    const supabaseKey = "sb_publishable_D7saHOTE_JhSlMnSgBnIhQ_mOAOUD9s";
    const bucketName = "vehicle-images";

    const client = window.supabase.createClient(supabaseUrl, supabaseKey, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true
      }
    });

    const photosInput = document.getElementById("photos");
    const previewGrid = document.getElementById("previewGrid");
    const statusBox = document.getElementById("status");
    const dealerInfoBox = document.getElementById("dealerInfo");

    let currentUser = null;

    function setStatus(message) {
      statusBox.textContent = message;
    }

    async function logout() {
      await client.auth.signOut();
      window.location.href = "login.html";
    }

    async function checkUser() {
      try {
        const sessionResult = await client.auth.getSession();
        const session = sessionResult.data.session;

        if (!session) {
          dealerInfoBox.textContent = "Not logged in. Redirecting to login...";
          setTimeout(() => {
            window.location.href = "login.html";
          }, 1500);
          return;
        }

        currentUser = session.user;
        dealerInfoBox.textContent = "Logged in as: " + currentUser.email;
      } catch (err) {
        console.log("checkUser error:", err);
        dealerInfoBox.textContent = "Could not verify login.";
      }
    }

    photosInput.addEventListener("change", () => {
      previewGrid.innerHTML = "";
      const files = Array.from(photosInput.files || []);

      if (!files.length) {
        setStatus("No photos selected.");
        return;
      }

      files.forEach(file => {
        const reader = new FileReader();
        reader.onload = function (e) {
          const img = document.createElement("img");
          img.src = e.target.result;
          previewGrid.appendChild(img);
        };
        reader.readAsDataURL(file);
      });

      setStatus(files.length + " photo(s) selected.");
    });

    async function uploadOneFile(file) {
      const fileExt = file.name.split(".").pop();
      const fileName = Date.now() + "-" + Math.floor(Math.random() * 100000) + "." + fileExt;
      const filePath = "vehicles/" + fileName;

      const uploadRes = await fetch(
        supabaseUrl + "/storage/v1/object/" + bucketName + "/" + filePath,
        {
          method: "POST",
          headers: {
            "Authorization": "Bearer " + supabaseKey,
            "apikey": supabaseKey,
            "x-upsert": "false",
            "Content-Type": file.type || "image/jpeg"
          },
          body: file
        }
      );

      if (!uploadRes.ok) {
        const uploadText = await uploadRes.text();
        throw new Error(uploadText);
      }

      return supabaseUrl + "/storage/v1/object/public/" + bucketName + "/" + filePath;
    }

    async function publishVehicle() {
      if (!currentUser) {
        setStatus("You must be logged in first.");
        return;
      }

      const title = document.getElementById("title").value.trim();
      const price = document.getElementById("price").value.trim();
      const mileage = document.getElementById("mileage").value.trim();
      const location = document.getElementById("location").value.trim();
      const dealer = document.getElementById("dealer").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const files = Array.from(photosInput.files || []);

      if (!title || !price || !mileage || !location || !dealer || !phone) {
        setStatus("Please fill in all fields.");
        return;
      }

      if (!files.length) {
        setStatus("Please choose at least one photo.");
        return;
      }

      try {
        const uploadedUrls = [];

        for (let i = 0; i < files.length; i++) {
          setStatus("Uploading photo " + (i + 1) + " of " + files.length + "...");
          const imageUrl = await uploadOneFile(files[i]);
          uploadedUrls.push(imageUrl);
        }

        setStatus("Saving vehicle...");

        const mainImage = uploadedUrls[0];
        const imagesString = uploadedUrls.join(",");

        const { error } = await client
          .from("vehicles")
          .insert([{
            title: title,
            price: price,
            mileage: mileage,
            location: location,
            dealer: dealer,
            phone: phone,
            image: mainImage,
            images: imagesString,
            featured: false,
            user_id: currentUser.id
          }]);

        if (error) {
          console.log("insert error:", error);
          setStatus("Vehicle save failed: " + error.message);
          return;
        }

        setStatus("Vehicle uploaded successfully to your account.");

        document.getElementById("title").value = "";
        document.getElementById("price").value = "";
        document.getElementById("mileage").value = "";
        document.getElementById("location").value = "";
        document.getElementById("dealer").value = "";
        document.getElementById("phone").value = "";
        photosInput.value = "";
        previewGrid.innerHTML = "";

        setTimeout(() => {
          window.location.href = "dealer-admin.html";
        }, 1000);

      } catch (err) {
        console.log("publish error:", err);
        setStatus("Something went wrong: " + err.message);
      }
    }

    checkUser();
  </script>
</body>
</html>
