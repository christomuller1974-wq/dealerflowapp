<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>DealerFlow Upload</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #dfe3ea;
      color: #111827;
    }

    .hero {
      background: linear-gradient(135deg, #3156c7, #1f3f9e);
      color: white;
      text-align: center;
      padding: 42px 18px 32px;
    }

    .hero h1 {
      margin: 0;
      font-size: 48px;
      font-weight: 800;
    }

    .hero p {
      margin: 10px 0 0;
      font-size: 18px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 18px;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .top-btn {
      background: #1f2937;
      color: white;
      text-decoration: none;
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
    }

    .top-btn.blue {
      background: #3156c7;
    }

    .status {
      background: white;
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 16px;
      font-weight: bold;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .card {
      background: #f7f7f8;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .card h2 {
      margin: 0 0 14px;
      font-size: 30px;
    }

    .field {
      margin-bottom: 14px;
    }

    .field label {
      display: block;
      font-weight: 700;
      margin-bottom: 6px;
      font-size: 14px;
    }

    input,
    select,
    textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 13px 14px;
      border-radius: 12px;
      border: 1px solid #cbd5e1;
      font-size: 15px;
      background: white;
      color: #111827;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .three-col {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 14px;
    }

    .preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-top: 10px;
      margin-bottom: 8px;
    }

    .preview-item {
      background: #eef2f7;
      border: 1px solid #d1d5db;
      border-radius: 14px;
      padding: 10px;
      text-align: center;
      min-height: 190px;
    }

    .preview-item img {
      width: 100%;
      max-height: 130px;
      height: auto;
      object-fit: contain;
      border-radius: 10px;
      display: block;
      margin-bottom: 8px;
      background: #e5e7eb;
    }

    .preview-label {
      font-size: 13px;
      color: #334155;
      font-weight: 700;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 10px;
      background: white;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid #cbd5e1;
    }

    .checkbox-row input[type="checkbox"] {
      width: auto;
      margin: 0;
      transform: scale(1.2);
    }

    .save-btn {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 15px;
      font-weight: 800;
      background: #3156c7;
      color: white;
      cursor: pointer;
      margin-top: 8px;
    }

    .save-btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    @media (max-width: 800px) {
      .hero h1 {
        font-size: 38px;
      }

      .two-col,
      .three-col {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <div class="hero">
    <h1>DealerFlow Upload</h1>
    <p>Add vehicles to your stock in minutes</p>
  </div>

  <div class="container">
    <div class="top-actions">
      <a href="dealer-admin.html" class="top-btn">Back to Dashboard</a>
      <a href="index.html" class="top-btn blue">Website</a>
      <button class="top-btn" onclick="logout()">Logout</button>
    </div>

    <div id="status" class="status">Starting upload page...</div>

    <div class="card">
      <h2>Vehicle Upload</h2>

      <div class="field">
        <label for="vehiclePhotos">Vehicle Photos</label>
        <input type="file" id="vehiclePhotos" multiple accept="image/*" />
      </div>

      <div class="field">
        <label>Photo Preview</label>
        <div id="photoPreview" class="preview-grid">
          <div class="preview-item">
            <div class="preview-label">No photos selected yet.</div>
          </div>
        </div>
      </div>

      <div class="field">
        <label for="title">Vehicle Title</label>
        <input type="text" id="title" placeholder="e.g. Toyota Hilux 2.8 GD-6 4x4" />
      </div>

      <div class="two-col">
        <div class="field">
          <label for="year">Select Year</label>
          <select id="year"></select>
        </div>

        <div class="field">
          <label for="price">Price</label>
          <input type="text" id="price" placeholder="e.g. 349900" />
        </div>
      </div>

      <div class="two-col">
        <div class="field">
          <label for="mileage">Mileage</label>
          <input type="text" id="mileage" placeholder="e.g. 120000" />
        </div>

        <div class="field">
          <label for="location">Location</label>
          <input type="text" id="location" placeholder="e.g. Kimberley" />
        </div>
      </div>

      <div class="two-col">
        <div class="field">
          <label for="dealer">Dealer Name</label>
          <input type="text" id="dealer" placeholder="Dealer name" />
        </div>

        <div class="field">
          <label for="phone">Phone</label>
          <input type="text" id="phone" placeholder="e.g. 0825744526" />
        </div>
      </div>

      <div class="field">
        <label for="description">Description</label>
        <textarea id="description" placeholder="Optional vehicle description"></textarea>
      </div>

      <div class="field">
        <label>Featured Vehicle</label>
        <div class="checkbox-row">
          <input type="checkbox" id="featured" />
          <span>Show this vehicle as featured</span>
        </div>
      </div>

      <button id="saveBtn" class="save-btn" onclick="submitVehicle()">Save Vehicle</button>
    </div>
  </div>

  <script>
    const supabaseUrl = "https://ddmvzypiccryjndcwlre.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkbXZ6eXBpY2NyeWpuZGN3bHJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NTQ2NzYsImV4cCI6MjA5MTQzMDY3Nn0.mNkODdvX8gllTZeqfr7nllMWfF7ATdj9MY-EKEE3G6w";
    const client = window.supabase.createClient(supabaseUrl, supabaseKey);

    let currentUser = null;
    let currentProfile = null;
    let selectedFiles = [];

    function setStatus(message) {
      document.getElementById("status").textContent = message;
      console.log("[STATUS]", message);
    }

    function populateYears() {
      const yearSelect = document.getElementById("year");
      yearSelect.innerHTML = '<option value="">Select year</option>';

      const currentYear = new Date().getFullYear();
      for (let y = currentYear; y >= 1980; y--) {
        const option = document.createElement("option");
        option.value = y;
        option.textContent = y;
        yearSelect.appendChild(option);
      }
    }

    function renderPreview(files) {
      const preview = document.getElementById("photoPreview");
      preview.innerHTML = "";

      if (!files.length) {
        preview.innerHTML = `
          <div class="preview-item">
            <div class="preview-label">No photos selected yet.</div>
          </div>
        `;
        return;
      }

      files.forEach((file, index) => {
        const url = URL.createObjectURL(file);
        const label = index === 0 ? "Main image" : "Extra image";

        const div = document.createElement("div");
        div.className = "preview-item";
        div.innerHTML = `
          <img src="${url}" alt="Preview ${index + 1}">
          <div class="preview-label">${label}</div>
        `;
        preview.appendChild(div);
      });
    }

    function setupPhotoInput() {
      const fileInput = document.getElementById("vehiclePhotos");

      fileInput.addEventListener("change", function () {
        selectedFiles = Array.from(fileInput.files || []);
        renderPreview(selectedFiles);
      });
    }

    async function requireUser() {
      const { data, error } = await client.auth.getUser();

      if (error || !data.user) {
        window.location.href = "login.html";
        return false;
      }

      currentUser = data.user;
      return true;
    }

    async function loadProfile() {
      setStatus("Loading your profile...");

      const { data, error } = await client
        .from("profiles")
        .select("*")
        .eq("id", currentUser.id)
        .single();

      if (error || !data) {
        console.log(error);
        setStatus("Could not load dealer profile.");
        return false;
      }

      currentProfile = data;

      // Auto-fill dealer fields
      document.getElementById("dealer").value =
        data.dealer_name || data.name || "Auto Excellence";

      document.getElementById("location").value =
        data.location || "Kimberley";

      document.getElementById("phone").value =
        data.phone || "";

      return true;
    }

    async function uploadOneFile(file) {
      const extension = file.name.split(".").pop();
      const randomPart = Math.random().toString(36).slice(2);
      const fileName = Date.now() + "-" + randomPart + "." + extension;
      const filePath = "vehicles/" + fileName;

      const { error } = await client.storage
        .from("vehicle-images")
        .upload(filePath, file);

      if (error) {
        throw error;
      }

      const { data } = client.storage
        .from("vehicle-images")
        .getPublicUrl(filePath);

      return data.publicUrl;
    }

    async function uploadAllFiles(files) {
      const urls = [];

      for (const file of files) {
        const url = await uploadOneFile(file);
        urls.push(url);
      }

      return urls;
    }

    async function submitVehicle() {
      const saveBtn = document.getElementById("saveBtn");
      saveBtn.disabled = true;

      try {
        if (!currentUser) {
          setStatus("User not ready.");
          saveBtn.disabled = false;
          return;
        }

        const title = document.getElementById("title").value.trim();
        const year = document.getElementById("year").value;
        const price = document.getElementById("price").value.trim();
        const mileage = document.getElementById("mileage").value.trim();
        const location = document.getElementById("location").value.trim();
        const dealer = document.getElementById("dealer").value.trim();
        const phone = document.getElementById("phone").value.trim();
        const description = document.getElementById("description").value.trim();
        const featured = document.getElementById("featured").checked;

        if (!title || !year || !price || !mileage || !location || !dealer || !phone) {
          setStatus("Please complete all required fields.");
          saveBtn.disabled = false;
          return;
        }

        if (!selectedFiles.length) {
          setStatus("Please choose at least one vehicle photo.");
          saveBtn.disabled = false;
          return;
        }

        setStatus("Uploading photos...");
        const uploadedUrls = await uploadAllFiles(selectedFiles);

        const mainImage = uploadedUrls[0] || "";
        const extraImages = uploadedUrls.slice(1);

        setStatus("Saving vehicle...");

        const payload = {
          title: title,
          year: year,
          price: price,
          mileage: mileage,
          location: location,
          dealer: dealer,
          phone: phone,
          description: description,
          featured: featured,
          image: mainImage,
          images: extraImages.join(","),
          user_id: currentUser.id
        };

        const { error } = await client
          .from("vehicles")
          .insert([payload]);

        if (error) {
          console.log(error);
          setStatus("Could not save vehicle.");
          saveBtn.disabled = false;
          return;
        }

        // Reset form after success
        document.getElementById("title").value = "";
        document.getElementById("year").value = "";
        document.getElementById("price").value = "";
        document.getElementById("mileage").value = "";
        document.getElementById("description").value = "";
        document.getElementById("featured").checked = false;
        document.getElementById("vehiclePhotos").value = "";
        selectedFiles = [];
        renderPreview([]);

        // keep autofilled dealer details
        document.getElementById("dealer").value =
          currentProfile?.dealer_name || currentProfile?.name || dealer;
        document.getElementById("location").value =
          currentProfile?.location || location;
        document.getElementById("phone").value =
          currentProfile?.phone || phone;

        setStatus("Vehicle saved successfully.");
      } catch (err) {
        console.log(err);
        setStatus("Something went wrong while saving.");
      }

      saveBtn.disabled = false;
    }

    async function logout() {
      await client.auth.signOut();
      window.location.href = "login.html";
    }

    async function startPage() {
      populateYears();
      setupPhotoInput();

      const okUser = await requireUser();
      if (!okUser) return;

      const okProfile = await loadProfile();
      if (!okProfile) return;

      setStatus("Upload page ready.");
    }

    startPage();
  </script>
</body>
</html>
