<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>DealerFlow Upload ULTRA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#dfe3ea;
}

.hero {
  background:#3156c7;
  color:white;
  text-align:center;
  padding:40px;
}

.container {
  max-width:1000px;
  margin:auto;
  padding:20px;
}

.card {
  background:white;
  padding:20px;
  border-radius:14px;
}

.status {
  background:white;
  padding:12px;
  border-radius:10px;
  margin-bottom:15px;
  font-weight:bold;
}

input, select, textarea {
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

button {
  padding:14px;
  border:none;
  border-radius:10px;
  background:#3156c7;
  color:white;
  font-weight:bold;
  width:100%;
  cursor:pointer;
}

.preview-grid {
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.preview-item {
  width:120px;
  position:relative;
}

.preview-item img {
  width:100%;
  border-radius:10px;
}

.remove-btn {
  position:absolute;
  top:5px;
  right:5px;
  background:red;
  color:white;
  border:none;
  border-radius:50%;
  width:22px;
  height:22px;
  cursor:pointer;
}

.dragging {
  opacity:0.4;
}
</style>
</head>

<body>

<div class="hero">
  <h1>DealerFlow Upload</h1>
</div>

<div class="container">

<div id="status" class="status">Loading...</div>

<div class="card">

<input type="file" id="photos" multiple />

<div id="preview" class="preview-grid"></div>

<input id="title" placeholder="Vehicle Title">
<select id="year"></select>
<input id="price" placeholder="Price">
<input id="mileage" placeholder="Mileage">
<input id="location" placeholder="Location">
<input id="dealer" placeholder="Dealer">
<input id="phone" placeholder="Phone">
<textarea id="description"></textarea>

<button onclick="saveVehicle()">Save Vehicle</button>

</div>
</div>

<script>

const supabaseUrl = "https://ddmvzypiccryjndcwlre.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkbXZ6eXBpY2NyeWpuZGN3bHJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NTQ2NzYsImV4cCI6MjA5MTQzMDY3Nn0.mNkODdvX8gllTZeqfr7nllMWfF7ATdj9MY-EKEE3G6w";
const client = supabase.createClient(supabaseUrl, supabaseKey);

let files = [];
let user = null;

const MAX = 40;

function setStatus(t){
  document.getElementById("status").innerText = t;
}

function initYears(){
  let y = new Date().getFullYear();
  let select = document.getElementById("year");
  for(let i=y;i>=1980;i--){
    let o=document.createElement("option");
    o.value=i;o.text=i;
    select.appendChild(o);
  }
}

document.getElementById("photos").addEventListener("change", e=>{
  files = Array.from(e.target.files);
  render();
});

function render(){
  let preview=document.getElementById("preview");
  preview.innerHTML="";

  files.forEach((f,i)=>{
    let div=document.createElement("div");
    div.className="preview-item";
    div.draggable=true;

    div.innerHTML=`
      <img src="${URL.createObjectURL(f)}">
      <button class="remove-btn" onclick="removeImg(${i})">x</button>
    `;

    div.addEventListener("dragstart", ()=>div.classList.add("dragging"));
    div.addEventListener("dragend", ()=>div.classList.remove("dragging"));

    div.addEventListener("dragover", e=>{
      e.preventDefault();
      const dragging = document.querySelector(".dragging");
      if(dragging !== div){
        let nodes=[...preview.children];
        let dragIndex = nodes.indexOf(dragging);
        let dropIndex = nodes.indexOf(div);
        files.splice(dropIndex,0,files.splice(dragIndex,1)[0]);
        render();
      }
    });

    preview.appendChild(div);
  });
}

function removeImg(i){
  files.splice(i,1);
  render();
}

async function compress(file){
  return new Promise(res=>{
    let reader=new FileReader();
    reader.onload=e=>{
      let img=new Image();
      img.onload=()=>{
        let canvas=document.createElement("canvas");
        let ctx=canvas.getContext("2d");

        let w=1600;
        let h=(img.height/img.width)*w;

        canvas.width=w;
        canvas.height=h;
        ctx.drawImage(img,0,0,w,h);

        canvas.toBlob(b=>{
          res(new File([b],file.name,{type:"image/jpeg"}));
        },"image/jpeg",0.8);
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

async function upload(file){
  let c = await compress(file);
  let name=Date.now()+"-"+Math.random()+".jpg";

  await client.storage.from("vehicle-images")
  .upload(name,c);

  let {data}=client.storage.from("vehicle-images")
  .getPublicUrl(name);

  return data.publicUrl;
}

async function countVehicles(){
  let {count}=await client.from("vehicles")
  .select("*",{count:"exact",head:true})
  .eq("user_id",user.id);
  return count;
}

async function saveVehicle(){

  let count = await countVehicles();

  if(count>=MAX){
    setStatus("LIMIT REACHED (40)");
    return;
  }

  setStatus("Uploading...");

  let urls=[];

  for(let f of files){
    urls.push(await upload(f));
  }

  let payload={
    title: title.value,
    year: year.value,
    price: price.value,
    mileage: mileage.value,
    location: location.value,
    dealer: dealer.value,
    phone: phone.value,
    description: description.value,
    image: urls[0],
    images: urls.slice(1).join(","),
    user_id: user.id
  };

  let {error}=await client.from("vehicles").insert([payload]);

  if(error){
    console.log(error);
    setStatus("ERROR saving");
    return;
  }

  setStatus("Saved successfully!");
}

async function init(){
  let {data}=await client.auth.getUser();
  if(!data.user){
    location.href="login.html";
    return;
  }
  user=data.user;

  let c=await countVehicles();
  setStatus("Vehicles: "+c+" / 40");

  initYears();
}

init();

</script>
</body>
</html>
