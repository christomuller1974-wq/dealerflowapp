<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DealerFlow Upload</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #e5e7eb;
      color: #111827;
    }

    .hero {
      background: #2f55c7;
      color: white;
      padding: 24px 20px;
      text-align: center;
    }

    .hero h1 {
      margin: 0 0 8px 0;
      font-size: 34px;
    }

    .hero p {
      margin: 0;
      font-size: 16px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 18px;
    }

    .top-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 14px;
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      text-align: center;
      font-weight: 600;
      font-size: 12px;
      padding: 8px 12px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      color: white;
    }

    .btn-blue { background: #3f5cc9; }
    .btn-dark { background: #1f2937; }

    .card {
      background: #ffffff;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-bottom: 18px;
    }

    .status {
      background: #ffffff;
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      font-weight: bold;
      font-size: 14px;
    }

    .warning {
      background: #fff7ed;
      color: #9a3412;
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      font-weight: bold;
      font-size: 14px;
      display: none;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .field label {
      display: block;
      font-size: 13px;
      font-weight: bold;
      color: #334155;
      margin-bottom: 5px;
    }

    .field input,
    .field select,
    .field textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      background: white;
      font-size: 14px;
      font-family: Arial, sans-serif;
    }

    .field textarea {
      min-height: 100px;
      resize: vertical;
    }

    .preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 12px;
      margin-top: 14px;
    }

    .preview-card {
      background: #f8fafc;
      border-radius: 12px;
      padding: 10px;
      box-shadow: inset 0 0 0 1px #e5e7eb;
    }

    .preview-image-wrap {
      width: 100%;
      height: 120px;
      background: #eef2f7;
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 8px;
    }

    .preview-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #eef2f7;
      display: block;
    }

    .preview-label {
      font-size: 12px;
      color: #475569;
      text-align: center;
      word-break: break-word;
    }

    .submit-row {
      margin-top: 16px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    @media (min-width: 768px) {
      .form-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .full-width {
        grid-column: 1 / -1;
      }
    }
  </style>
</head>
<body>

  <div class="hero">
    <h1>DealerFlow Upload</h1>
    <p>Add vehicles to your own dealer account</p>
  </div>

  <div class="container">
    <div class="top-actions">
      <a href="dealer-admin.html" class="btn btn-dark">Back to Dashboard</a>
      <a href="index.html" class="btn btn-dark">Website</a>
      <button type="button" class="btn btn-dark" id="logoutBtn">Logout</button>
    </div>

    <div id="status" class="status">Starting upload page...</div>
    <div id="warningBox" class="warning"></div>

    <div class="card">
      <h2 style="margin-top:0;">Vehicle Upload</h2>

      <div class="form-grid">
        <div class="field full-width">
          <label for="photoInput">Vehicle Photos</label>
          <input type="file" id="photoInput" accept="image/*" multiple>
        </div>

        <div class="field full-width">
          <label>Photo Preview</label>
          <div id="previewGrid" class="preview-grid"></div>
        </div>

        <div class="field full-width">
          <label for="title">Vehicle Title</label>
          <input type="text" id="title" placeholder="e.g. Chev Ute 1.4">
        </div>

        <div class="field">
          <label for="year">Select Year</label>
          <select id="year"></select>
        </div>

        <div class="field">
          <label for="price">Price</label>
          <input type="number" id="price" placeholder="e.g. 169900">
        </div>

        <div class="field">
          <label for="mileage">Mileage</label>
          <input type="number" id="mileage" placeholder="e.g. 155000">
        </div>

        <div class="field">
          <label for="location">Location</label>
          <input type="text" id="location" placeholder="e.g. Kimberley">
        </div>

        <div class="field">
          <label for="dealer">Dealer Name</label>
          <input type="text" id="dealer" placeholder="Dealer name">
        </div>

        <div class="field">
          <label for="phone">Phone</label>
          <input type="text" id="phone" placeholder="e.g. 0825744526">
        </div>

        <div class="field full-width">
          <label for="description">Description</label>
          <textarea id="description" placeholder="Optional vehicle description"></textarea>
        </div>
      </div>

      <div class="submit-row">
        <button type="button" id="uploadBtn" class="btn btn-blue">Save Vehicle</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseUrl = "https://ddmvzypiccryjndcwlre.supabase.co";
    const supabaseKey = "sb_publishable_D7saHOTE_JhSlMnSgBnIhQ_mOAOUD9s";

    const client = window.supabase.createClient(supabaseUrl, supabaseKey, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true
      }
    });

    let currentUser = null;
    let currentProfile = null;
    let selectedFiles = [];

    function setStatus(message) {
      document.getElementById("status").textContent = message;
      console.log("STATUS:", message);
    }

    function setWarning(message) {
      const box = document.getElementById("warningBox");
      if (!message) {
        box.style.display = "none";
        box.textContent = "";
        return;
      }
      box.style.display = "block";
      box.textContent = message;
    }

    function setUploadBusy(isBusy) {
      const btn = document.getElementById("uploadBtn");
      btn.disabled = isBusy;
      btn.textContent = isBusy ? "Saving..." : "Save Vehicle";
      btn.style.opacity = isBusy ? "0.7" : "1";
      btn.style.cursor = isBusy ? "not-allowed" : "pointer";
    }

    function fillYearDropdown() {
      const yearSelect = document.getElementById("year");
      yearSelect.innerHTML = '<option value="">Select Year</option>';

      const currentYear = new Date().getFullYear();
      for (let y = currentYear; y >= 1980; y--) {
        const option = document.createElement("option");
        option.value = String(y);
        option.textContent = String(y);
        yearSelect.appendChild(option);
      }
    }

    function showPreview() {
      const grid = document.getElementById("previewGrid");
      grid.innerHTML = "";

      if (!selectedFiles.length) {
        grid.innerHTML = "<div class='preview-card'>No photos selected yet.</div>";
        return;
      }

      selectedFiles.forEach((file, index) => {
        const reader = new FileReader();
        reader.onload = function(e) {
          const card = document.createElement("div");
          card.className = "preview-card";
          card.innerHTML = `
            <div class="preview-image-wrap">
              <img src="${e.target.result}" class="preview-image" alt="Preview">
            </div>
            <div class="preview-label">${index === 0 ? "Main image" : "Extra image"}</div>
          `;
          grid.appendChild(card);
        };
        reader.readAsDataURL(file);
      });
    }

    async function logoutUser() {
      await client.auth.signOut();
      window.location.href = "login.html";
    }

    async function loadProfile(userId) {
      const { data, error } = await client
        .from("profiles")
        .select("*")
        .eq("id", userId)
        .single();

      console.log("PROFILE RESULT:", data, error);

      if (error || !data) {
        return false;
      }

      currentProfile = data;
      return true;
    }

    async function uploadSingleFile(file) {
      const ext = file.name.split(".").pop() || "jpg";
      const fileName = ${Date.now()}-${Math.random().toString(36).slice(2)}.${ext};
      const filePath = vehicles/${fileName};

      const { error } = await client.storage
        .from("vehicle-images")
        .upload(filePath, file);

      if (error) {
        throw error;
      }

      const { data } = client.storage
        .from("vehicle-images")
        .getPublicUrl(filePath);

      return data.publicUrl;
    }

    async function submitVehicle() {
      if (!currentUser || !currentProfile) {
        setStatus("User not ready yet.");
        return;
      }

      if (!currentProfile.is_active) {
        setWarning("Your account is not active yet. Please contact admin after payment.");
        return;
      }

      const title = document.getElementById("title").value.trim();
      const year = document.getElementById("year").value.trim();
      const price = document.getElementById("price").value.trim();
      const mileage = document.getElementById("mileage").value.trim();
      const location = document.getElementById("location").value.trim();
      const dealer = document.getElementById("dealer").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const description = document.getElementById("description").value.trim();

      if (!title || !year || !price || !mileage || !location || !dealer || !phone) {
        setStatus("Please complete all required fields.");
        return;
      }

      if (!selectedFiles.length) {
        setStatus("Please select at least one photo.");
        return;
      }

      try {
        setUploadBusy(true);
        setStatus("Uploading photos...");

        const uploadedUrls = [];
        for (const file of selectedFiles) {
          const url = await uploadSingleFile(file);
          uploadedUrls.push(url);
        }

        const mainImage = uploadedUrls[0] || "";
        const allImages = uploadedUrls.join(",");

        setStatus("Saving vehicle...");

        const { error } = await client
          .from("vehicles")
          .insert([{
            user_id: currentUser.id,
            title,
            year,
            price,
            mileage,
            location,
            dealer,
            phone,
            description,
            image: mainImage,
            images: allImages,
            featured: false
          }]);

        if (error) {
          console.log("SAVE VEHICLE ERROR:", error);
          setStatus("Could not save vehicle: " + error.message);
          setUploadBusy(false);
          return;
        }

        setStatus("Vehicle saved successfully.");

        document.getElementById("title").value = "";
        document.getElementById("year").value = "";
        document.getElementById("price").value = "";
        document.getElementById("mileage").value = "";
        document.getElementById("location").value = currentProfile.location || "";
        document.getElementById("dealer").value = currentProfile.dealer_name || "";
        document.getElementById("phone").value = currentProfile.phone || "";
        document.getElementById("description").value = "";
        document.getElementById("photoInput").value = "";
        selectedFiles = [];
        showPreview();

        setUploadBusy(false);
      } catch (err) {
        console.log("UPLOAD ERROR:", err);
        setStatus("Upload failed: " + err.message);
        setUploadBusy(false);
      }
    }

    async function startUploadPage() {
      try {
        setStatus("Checking login...");

        const { data, error } = await client.auth.getUser();
        console.log("USER RESULT:", data, error);

        if (error || !data || !data.user) {
          setStatus("Not logged in. Redirecting...");
          setTimeout(() => {
            window.location.href = "login.html";
          }, 1200);
          return;
        }

        currentUser = data.user;

        setStatus("Loading dealer profile...");
        const profileOk = await loadProfile(currentUser.id);

        if (!profileOk) {
          setStatus("Profile not found.");
          return;
        }

        document.getElementById("dealer").value = currentProfile.dealer_name || "";
        document.getElementById("phone").value = currentProfile.phone || "";
        document.getElementById("location").value = currentProfile.location || "";

        if (!currentProfile.is_active) {
          setWarning("Your account is not active yet. Please contact admin after payment.");
        } else {
          setWarning("");
        }

        setStatus("Upload page ready.");
      } catch (err) {
        console.log("START PAGE ERROR:", err);
        setStatus("Error starting upload page.");
      }
    }

    document.addEventListener("DOMContentLoaded", function () {
      fillYearDropdown();
      showPreview();

      document.getElementById("photoInput").addEventListener("change", function(event) {
        selectedFiles = Array.from(event.target.files || []);
        showPreview();
      });

      document.getElementById("uploadBtn").addEventListener("click", submitVehicle);
      document.getElementById("logoutBtn").addEventListener("click", logoutUser);

      startUploadPage();
    });
  </script>

</body>
</html>
