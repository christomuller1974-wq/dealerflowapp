<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dealer Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #e5e7eb;
      color: #111827;
    }

    .hero {
      background: linear-gradient(135deg, #2f55c7, #1e3a8a);
      color: white;
      padding: 24px 20px;
    }

    .hero h1 {
      margin: 0 0 8px 0;
      font-size: 42px;
    }

    .hero p {
      margin: 0;
      font-size: 16px;
    }

    .container {
      max-width: 1300px;
      margin: 0 auto;
      padding: 18px;
    }

    .status {
      background: #ffffff;
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      font-weight: bold;
      font-size: 14px;
    }

    .dealer-card {
      background: #ffffff;
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-bottom: 18px;
    }

    .dealer-card h2 {
      margin: 0 0 6px 0;
      font-size: 36px;
    }

    .dealer-card .meta {
      font-size: 16px;
      color: #475569;
      margin-bottom: 12px;
    }

    .top-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      text-align: center;
      font-weight: 700;
      font-size: 13px;
      padding: 10px 12px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      color: white;
    }

    .btn-blue { background: #3f5cc9; }
    .btn-green { background: #16a34a; }
    .btn-dark { background: #1f2937; }
    .btn-whatsapp { background: #25d366; }

    .section-title {
      font-size: 30px;
      margin: 0 0 14px 0;
    }

    .cars-wrap {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
    }

    .car-card {
      background: #ffffff;
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      position: relative;
    }

    .featured-ribbon {
      position: absolute;
      top: 12px;
      right: 12px;
      background: #f59e0b;
      color: white;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: bold;
      z-index: 2;
    }

    .card-image-wrap {
      width: 100%;
      height: 220px;
      background: #eef2f7;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
    }

    .card-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #eef2f7;
      display: block;
    }

    .car-title {
      font-size: 24px;
      font-weight: bold;
      line-height: 1.2;
      margin-bottom: 10px;
    }

    .year-badge {
      display: inline-block;
      background: #dbeafe;
      color: #1d4ed8;
      font-weight: bold;
      padding: 6px 10px;
      border-radius: 999px;
      margin-bottom: 12px;
      font-size: 12px;
    }

    .car-price {
      color: #c53030;
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 14px;
    }

    .car-meta {
      font-size: 14px;
      margin-bottom: 8px;
      line-height: 1.5;
    }

    .car-buttons {
      display: grid;
      grid-template-columns: 1fr;
      gap: 6px;
      margin-top: 12px;
    }

    @media (min-width: 768px) {
      .cars-wrap {
        grid-template-columns: repeat(2, 1fr);
      }

      .card-image-wrap {
        height: 190px;
      }
    }

    @media (min-width: 1100px) {
      .cars-wrap {
        grid-template-columns: repeat(3, 1fr);
      }

      .card-image-wrap {
        height: 180px;
      }
    }
  </style>
</head>
<body>

  <div class="hero">
    <h1>Dealer Profile</h1>
    <p>View this dealer’s stock</p>
  </div>

  <div class="container">
    <div id="status" class="status">Loading dealer...</div>

    <div class="dealer-card">
      <h2 id="dealerName">Dealer</h2>
      <div class="meta">Phone: <span id="dealerPhone">-</span></div>

      <div class="top-buttons">
        <a href="index.html" class="btn btn-dark">Back</a>
        <a id="dealerWhatsapp" href="#" target="_blank" class="btn btn-whatsapp">WhatsApp</a>
        <a id="dealerCall" href="#" class="btn btn-blue">Call Dealer</a>
      </div>
    </div>

    <h2 class="section-title">Dealer Vehicles</h2>
    <div id="dealerCars" class="cars-wrap"></div>
  </div>

  <script>
    const supabaseUrl = "https://ddmvzypiccryjndcwlre.supabase.co";
    const supabaseKey = "sb_publishable_D7saHOTE_JhSlMnSgBnIhQ_mOAOUD9s";

    function setStatus(message) {
      document.getElementById("status").textContent = message;
      console.log(message);
    }

    function safeText(value) {
      return String(value || "");
    }

    function normalisePhone(phone) {
      return String(phone || "").replace(/\s+/g, "");
    }

    function getDealerNameFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get("dealer");
    }

    function getVehicleIdFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get("id");
    }

    async function getDealerFromVehicleId(vehicleId) {
      const response = await fetch(
        supabaseUrl + "/rest/v1/vehicles?id=eq." + vehicleId + "&select=dealer",
        {
          headers: {
            apikey: supabaseKey,
            Authorization: "Bearer " + supabaseKey
          }
        }
      );

      if (!response.ok) return "";

      const data = await response.json();
      if (!data || !data.length) return "";

      return data[0].dealer || "";
    }

    function buildCarCard(car) {
      const phoneClean = normalisePhone(car.phone);
      const whatsappLink = phoneClean
        ? "https://wa.me/27" + phoneClean.replace(/^0/, "") + "?text=" + encodeURIComponent("Hi, I'm interested in the " + safeText(car.title || "vehicle"))
        : "#";

      const detailsLink = "details.html?id=" + car.id;

      return `
        <div class="car-card">
          ${car.featured ? '<div class="featured-ribbon">FEATURED</div>' : ''}
          <div class="card-image-wrap">
            <img src="${safeText(car.image)}" alt="${safeText(car.title)}" class="card-image">
          </div>

          <div class="car-title">${safeText(car.title)}</div>
          <div class="year-badge">Year: ${safeText(car.year) || "Not set"}</div>
          <div class="car-price">R${safeText(car.price)}</div>
          <div class="car-meta"><strong>Mileage:</strong> ${safeText(car.mileage)} km</div>
          <div class="car-meta"><strong>Location:</strong> ${safeText(car.location)}</div>

          <div class="car-buttons">
            <a href="${detailsLink}" class="btn btn-dark">View Details</a>
            <a href="tel:${phoneClean}" class="btn btn-blue">Call</a>
            <a href="${whatsappLink}" target="_blank" class="btn btn-whatsapp">WhatsApp</a>
          </div>
        </div>
      `;
    }

    async function loadDealerPage() {
      try {
        let dealer = getDealerNameFromUrl();
        const vehicleId = getVehicleIdFromUrl();

        if (!dealer && vehicleId) {
          setStatus("Finding dealer from vehicle...");
          dealer = await getDealerFromVehicleId(vehicleId);
        }

        if (!dealer) {
          setStatus("Dealer not found.");
          return;
        }

        document.getElementById("dealerName").textContent = dealer;

        const response = await fetch(
          supabaseUrl + "/rest/v1/vehicles?dealer=eq." + encodeURIComponent(dealer) + "&select=*&order=featured.desc,id.desc",
          {
            headers: {
              apikey: supabaseKey,
              Authorization: "Bearer " + supabaseKey
            }
          }
        );

        if (!response.ok) {
          const text = await response.text();
          setStatus("Could not load dealer vehicles: " + text);
          return;
        }

        const cars = await response.json();

        if (!cars || !cars.length) {
          document.getElementById("dealerCars").innerHTML = "<div class='dealer-card'>No vehicles found for this dealer.</div>";
          setStatus("No vehicles found.");
          return;
        }

        const phone = cars[0].phone || "";
        const phoneClean = normalisePhone(phone);

        document.getElementById("dealerPhone").textContent = phone;
        document.getElementById("dealerCall").href = "tel:" + phoneClean;
        document.getElementById("dealerWhatsapp").href =
          "https://wa.me/27" + phoneClean.replace(/^0/, "") + "?text=" + encodeURIComponent("Hi, I'm interested in your vehicle listings");

        document.getElementById("dealerCars").innerHTML = cars.map(car => buildCarCard(car)).join("");
        setStatus(cars.length + " vehicle(s) found.");
      } catch (err) {
        console.log(err);
        setStatus("Something went wrong loading dealer page.");
      }
    }

    loadDealerPage();
  </script>
</body>
</html>
