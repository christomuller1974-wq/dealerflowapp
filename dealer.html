<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Dealer Stock</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #dfe3ea;
}

/* HERO */
.hero {
  background: linear-gradient(135deg, #3156c7, #1f3f9e);
  color: white;
  padding: 40px 18px 30px;
  position: relative;
}

.hero-inner {
  max-width: 1100px;
  margin: auto;
  text-align: center;
  position: relative;
}

.hero h1 {
  margin: 0;
  font-size: 44px;
}

.hero-buttons {
  position: absolute;
  right: 0;
  top: 0;
  display: flex;
  gap: 10px;
}

.hero-btn {
  padding: 9px 14px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: bold;
  text-decoration: none;
  color: white;
}

.dark { background:#111827; }
.green { background:#16a34a; }

/* SEARCH */
.search-panel {
  margin-top: 20px;
}

.hidden { display:none; }

.search-input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
}

/* DEALER BOX */
.dealer-box {
  background: white;
  margin: 15px;
  padding: 15px;
  border-radius: 14px;
}

.dealer-box h2 {
  margin: 0 0 6px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill,minmax(280px,1fr));
  gap: 15px;
  padding: 15px;
}

.card {
  background: white;
  padding: 12px;
  border-radius: 14px;
}

.card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  border-radius: 10px;
}

.title {
  font-weight: bold;
  margin: 10px 0;
}

.price {
  color: red;
  font-weight: bold;
}

/* BUTTONS */
.btn {
  display: block;
  margin-top: 6px;
  padding: 10px;
  text-align: center;
  border-radius: 8px;
  text-decoration: none;
  color: white;
  font-size: 13px;
  font-weight: bold;
}

.blue { background:#3156c7; }
.green2 { background:#16a34a; }
.dark2 { background:#1f2937; }
.whatsapp { background:#25d366; }

</style>
</head>
<body>

<div class="hero">
  <div class="hero-inner">

    <div class="hero-buttons">
      <a href="dealer-admin.html" class="hero-btn dark">Dealer Login</a>
      <button id="searchBtn" class="hero-btn green">Search Vehicle</button>
    </div>

    <h1 id="dealerName">Dealer Stock</h1>

    <div id="searchPanel" class="search-panel hidden">
      <input id="searchInput" class="search-input" placeholder="Search vehicles..." />
    </div>

  </div>
</div>

<div class="dealer-box">
  <h2 id="dealerTitle"></h2>
  <div id="dealerPhone"></div>
</div>

<div id="grid" class="grid"></div>

<script>
const supabaseUrl = "https://ddmvzypiccryjndcwlre.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkbXZ6eXBpY2NyeWpuZGN3bHJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NTQ2NzYsImV4cCI6MjA5MTQzMDY3Nn0.mNkODdvX8gllTZeqfr7nllMWfF7ATdj9MY-EKEE3G6w";

let allVehicles = [];

function getParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

function getImage(v) {
  if (v.image) return v.image;
  if (v.images) return v.images.split(",")[0];
  return "https://via.placeholder.com/400x250";
}

function cleanPhone(p){
  return (p||"").replace(/\s+/g,"");
}

function callLink(p){
  return "tel:"+cleanPhone(p);
}

function whatsapp(p,title){
  return "https://wa.me/27"+cleanPhone(p).replace(/^0/,"")+
  "?text="+encodeURIComponent("Hi I'm interested in "+title);
}

function render(list){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  if(!list.length){
    grid.innerHTML = "No vehicles found";
    return;
  }

  list.forEach(v=>{
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${getImage(v)}">
      <div class="title">${v.title}</div>
      <div>Year: ${v.year}</div>
      <div>Location: ${v.location}</div>
      <div class="price">R${v.price}</div>

      <a href="details.html?id=${v.id}" class="btn blue">View Details</a>
      <a href="${callLink(v.phone)}" class="btn dark2">Call</a>
      <a href="${whatsapp(v.phone,v.title)}" class="btn whatsapp">WhatsApp</a>
    `;

    grid.appendChild(div);
  });
}

function filter(text){
  text = text.toLowerCase();

  const filtered = allVehicles.filter(v=>{
    return (
      (v.title||"").toLowerCase().includes(text) ||
      (v.year||"").toString().includes(text)
    );
  });

  render(filtered);
}

async function load(){
  const dealer = getParam("dealer");

  document.getElementById("dealerName").textContent = dealer;
  document.getElementById("dealerTitle").textContent = dealer;

  const res = await fetch(
    supabaseUrl + "/rest/v1/vehicles?dealer=eq." + encodeURIComponent(dealer),
    {
      headers:{
        apikey:supabaseKey,
        Authorization:"Bearer "+supabaseKey
      }
    }
  );

  const data = await res.json();

  allVehicles = data;
  render(allVehicles);

  if(data.length){
    document.getElementById("dealerPhone").textContent =
      "Phone: " + data[0].phone;
  }
}

/* SEARCH TOGGLE */
document.getElementById("searchBtn").onclick = () => {
  document.getElementById("searchPanel").classList.toggle("hidden");
};

document.getElementById("searchInput").oninput = (e)=>{
  filter(e.target.value);
};

load();
</script>

</body>
</html>
