<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dealer Dashboard</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f6fa;
}

header {
  background: #1e3a8a;
  color: white;
  padding: 20px;
  text-align: center;
}

.vehicle-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 20px;
  padding: 20px;
}

.vehicle-card {
  background: white;
  border-radius: 10px;
  padding: 12px;
  box-shadow: 0 3px 10px rgba(0,0,0,0.1);
}

.vehicle-thumb {
  width: 100%;
  height: 180px;
  object-fit: cover;
  border-radius: 8px;
}

.btn {
  display: block;
  margin-top: 8px;
  padding: 10px;
  text-align: center;
  border-radius: 6px;
  text-decoration: none;
  color: white;
}

.btn-view { background: #2563eb; }
.btn-edit { background: #16a34a; }
.btn-delete { background: #dc2626; }
</style>
</head>

<body>

<header>
  <h1>Dealer Dashboard</h1>
  <p>Manage your vehicles</p>
</header>

<div id="vehicle-list" class="vehicle-grid"></div>

<script>
const supabaseUrl = "https://ddmvzypiccryjndcwlre.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkbXZ6eXBpY2NyeWpuZGN3bHJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NTQ2NzYsImV4cCI6MjA5MTQzMDY3Nn0.mNkODdvX8gllTZeqfr7nllMWfF7ATdj9MY-EKEE3G6w";

async function loadVehicles() {
  const res = await fetch(
    supabaseUrl + "/rest/v1/vehicles?select=*",
    {
      headers: {
        apikey: supabaseKey,
        Authorization: "Bearer " + supabaseKey
      }
    }
  );

  const vehicles = await res.json();
  const container = document.getElementById("vehicle-list");
  container.innerHTML = "";

  vehicles.forEach(v => {
    const mainImage = v.images?.[0] || "";

    const card = document.createElement("div");
    card.className = "vehicle-card";

    card.innerHTML = `
      <img src="${mainImage}" class="vehicle-thumb">

      <h3>${v.title}</h3>
      <p><strong>R${v.price}</strong></p>

      <a href="details.html?id=${v.id}" class="btn btn-view">View</a>
      <a href="edit.html?id=${v.id}" class="btn btn-edit">Edit</a>
      <button class="btn btn-delete" onclick="deleteVehicle(${v.id})">
        Delete
      </button>
    `;

    container.appendChild(card);
  });
}

async function deleteVehicle(id) {
  if (!confirm("Delete this vehicle?")) return;

  await fetch(
    supabaseUrl + "/rest/v1/vehicles?id=eq." + id,
    {
      method: "DELETE",
      headers: {
        apikey: supabaseKey,
        Authorization: "Bearer " + supabaseKey
      }
    }
  );

  loadVehicles();
}

loadVehicles();
</script>

</body>
</html>
