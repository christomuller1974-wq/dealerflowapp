<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dealer Stock</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #dfe3ea;
      color: #111827;
    }

    .hero {
      background: linear-gradient(135deg, #3156c7, #1f3f9e);
      color: white;
      text-align: center;
      padding: 34px 18px 24px;
    }

    .hero h1 {
      margin: 0;
      font-size: 42px;
      font-weight: 800;
    }

    .hero p {
      margin: 10px 0 0;
      font-size: 18px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 18px;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .top-btn {
      display: inline-block;
      text-decoration: none;
      background: #1f2937;
      color: white;
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
    }

    .top-btn.blue {
      background: #3156c7;
    }

    .status {
      background: white;
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 16px;
      font-weight: bold;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .vehicle-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 18px;
    }

    .vehicle-card {
      background: white;
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.10);
    }

    .vehicle-thumb {
      width: 100%;
      height: 210px;
      object-fit: cover;
      border-radius: 12px;
      background: #e5e7eb;
      display: block;
    }

    .vehicle-title {
      margin: 12px 0 8px;
      font-size: 18px;
      font-weight: 800;
      line-height: 1.25;
    }

    .vehicle-meta {
      font-size: 14px;
      color: #475569;
      margin-bottom: 4px;
    }

    .price {
      color: #dc2626;
      font-size: 18px;
      font-weight: 800;
      margin: 8px 0 10px;
    }

    .button-stack {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .btn {
      display: block;
      width: 100%;
      text-align: center;
      text-decoration: none;
      color: white;
      padding: 11px 12px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 14px;
    }

    .btn-blue { background: #3156c7; }
    .btn-dark { background: #1f2937; }
    .btn-whatsapp { background: #25d366; }

    .empty-box {
      background: white;
      border-radius: 14px;
      padding: 24px;
      text-align: center;
      color: #475569;
      font-weight: 700;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    @media (max-width: 700px) {
      .hero h1 {
        font-size: 34px;
      }

      .vehicle-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <div class="hero">
    <h1 id="dealerTitle">Dealer Stock</h1>
    <p>Browse available vehicles from this dealer</p>
  </div>

  <div class="container">
    <div class="top-actions">
      <a href="index.html" class="top-btn">Back to Website</a>
      <a href="dealer-admin.html" class="top-btn blue">Dealer Login</a>
    </div>

    <div id="status" class="status">Loading dealer stock...</div>
    <div id="vehicleList" class="vehicle-grid"></div>
  </div>

  <script>
    const supabaseUrl = "https://ddmvzypiccryjndcwlre.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkbXZ6eXBpY2NyeWpuZGN3bHJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NTQ2NzYsImV4cCI6MjA5MTQzMDY3Nn0.mNkODdvX8gllTZeqfr7nllMWfF7ATdj9MY-EKEE3G6w";

    function setStatus(message) {
      document.getElementById("status").textContent = message;
    }

    function getDealerFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get("dealer") || "";
    }

    function getMainImage(vehicle) {
      if (vehicle.image && typeof vehicle.image === "string" && vehicle.image.trim() !== "") {
        return vehicle.image.trim();
      }

      if (vehicle.images && typeof vehicle.images === "string" && vehicle.images.trim() !== "") {
        return vehicle.images.split(",")[0].trim();
      }

      return "https://via.placeholder.com/400x250?text=No+Image";
    }

    function cleanPhone(phone) {
      return String(phone || "").replace(/\s+/g, "");
    }

    function whatsappLink(phone, title) {
      const phoneClean = cleanPhone(phone);
      if (!phoneClean) return "#";
      return "https://wa.me/27" + phoneClean.replace(/^0/, "") +
        "?text=" + encodeURIComponent("Hi, I'm interested in the " + (title || "vehicle") + ".");
    }

    function callLink(phone) {
      const phoneClean = cleanPhone(phone);
      if (!phoneClean) return "#";
      return "tel:" + phoneClean;
    }

    async function loadDealerVehicles() {
      const dealerName = getDealerFromUrl();
      const container = document.getElementById("vehicleList");

      if (!dealerName) {
        setStatus("Missing dealer name.");
        container.innerHTML = '<div class="empty-box">Dealer not found.</div>';
        return;
      }

      document.getElementById("dealerTitle").textContent = dealerName;
      setStatus("Loading dealer stock...");

      try {
        const url =
          supabaseUrl +
          "/rest/v1/active_vehicles?select=*&dealer=eq." +
          encodeURIComponent(dealerName) +
          "&order=id.desc";

        const res = await fetch(url, {
          headers: {
            apikey: supabaseKey,
            Authorization: "Bearer " + supabaseKey
          }
        });

        const data = await res.json();
        container.innerHTML = "";

        if (!Array.isArray(data) || data.length === 0) {
          setStatus("No vehicles found.");
          container.innerHTML = '<div class="empty-box">No vehicles found for this dealer.</div>';
          return;
        }

        data.forEach(vehicle => {
          const mainImage = getMainImage(vehicle);
          const fallbackTitle = [vehicle.year, vehicle.make, vehicle.model].filter(Boolean).join(" ");
          const title = vehicle.title || fallbackTitle || "No Title";

          const card = document.createElement("div");
          card.className = "vehicle-card";

          card.innerHTML = `
            <img
              src="${mainImage}"
              class="vehicle-thumb"
              alt="${title}"
              onerror="this.src='https://via.placeholder.com/400x250?text=No+Image'"
            >

            <div class="vehicle-title">${title}</div>
            <div class="vehicle-meta">Year: ${vehicle.year || "-"}</div>
            <div class="vehicle-meta">Location: ${vehicle.location || "-"}</div>
            <div class="price">R${vehicle.price || 0}</div>

            <div class="button-stack">
              <a href="details.html?id=${vehicle.id}" class="btn btn-blue">View</a>
              <a href="${callLink(vehicle.phone)}" class="btn btn-dark">Call</a>
              <a href="${whatsappLink(vehicle.phone, title)}" target="_blank" class="btn btn-whatsapp">WhatsApp</a>
            </div>
          `;

          container.appendChild(card);
        });

        setStatus("Dealer stock loaded.");
      } catch (err) {
        console.error(err);
        setStatus("Could not load dealer stock.");
        container.innerHTML = '<div class="empty-box">Could not load dealer stock.</div>';
      }
    }

    loadDealerVehicles();
  </script>

</body>
</html>
