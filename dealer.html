<body>

  <div class="hero">
    <h1 id="dealerNameHero">Dealer Profile</h1>
    <p>View this dealer's stock</p>
  </div>

  <div class="container">
    <div id="status" class="status">Loading dealer profile...</div>

    <div id="profileCard" class="profile-card" style="display:none;">
      <div id="dealerName" class="profile-title"></div>
      <div class="profile-meta"><strong>Phone:</strong> <span id="dealerPhone"></span></div>

      <a href="index.html" class="btn">← Back to Listings</a>
      <a id="dealerWhatsApp" href="#" target="_blank" class="btn" style="background:#66cc6a;">WhatsApp Dealer</a>
    </div>

    <h2>Dealer Vehicles</h2>
    <div id="cars"></div>
  </div>

  <script>
    const supabaseUrl = "https://ddmvzypiccryjndcwlre.supabase.co";
    const supabaseKey = "sb_publishable_D7saHOTE_JhSlMnSgBnIhQ_mOAOUD9s";

    function getDealerNameFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get("dealer");
    }

    function setStatus(message) {
      document.getElementById("status").textContent = message;
    }

    function normalisePhone(phone) {
      return String(phone || "").replace(/\s+/g, "");
    }

    function safeText(value) {
      return String(value || "");
    }

    async function loadDealerPage() {
      const dealerName = getDealerNameFromUrl();

      if (!dealerName) {
        setStatus("Dealer not found.");
        return;
      }

      try {
        const response = await fetch(
          supabaseUrl + "/rest/v1/vehicles?select=*&dealer=eq." + encodeURIComponent(dealerName) + "&order=id.desc",
          {
            headers: {
              apikey: supabaseKey,
              Authorization: "Bearer " + supabaseKey
            }
          }
        );

        if (!response.ok) {
          const text = await response.text();
          setStatus("Could not load dealer vehicles: " + text);
          return;
        }

        const cars = await response.json();

        if (!cars.length) {
          setStatus("No vehicles found for this dealer.");
          return;
        }

        const dealerPhone = cars[0].phone || "";
        const phoneClean = normalisePhone(dealerPhone);
        const whatsappLink = phoneClean
          ? "https://wa.me/27" + phoneClean.replace(/^0/, "") + "?text=" + encodeURIComponent("Hi, I'm interested in your vehicles")
          : "#";

        document.getElementById("dealerNameHero").textContent = dealerName;
        document.getElementById("dealerName").textContent = dealerName;
        document.getElementById("dealerPhone").textContent = dealerPhone;
        document.getElementById("dealerWhatsApp").href = whatsappLink;
        document.getElementById("profileCard").style.display = "block";

        setStatus(cars.length + " vehicle(s) found for " + dealerName + ".");

        const container = document.getElementById("cars");
        container.innerHTML = "";

        cars.forEach(car => {
          const phoneCleanCar = normalisePhone(car.phone);
          const whatsappCar = phoneCleanCar
            ? "https://wa.me/27" + phoneCleanCar.replace(/^0/, "") + "?text=" + encodeURIComponent("Hi, I'm interested in the " + safeText(car.title))
            : "#";

          const div = document.createElement("div");
          div.className = "car-card";
          div.innerHTML = `
            <img src="${safeText(car.image)}" alt="${safeText(car.title)}">
            <div class="car-title">${safeText(car.title)}</div>
            <div class="year-badge">Year: ${safeText(car.year) || "Not set"}</div>
            <div class="car-price">R${safeText(car.price)}</div>
            <div class="car-meta"><strong>Mileage:</strong> ${safeText(car.mileage)} km</div>
            <div class="car-meta"><strong>Location:</strong> ${safeText(car.location)}</div>
            <div class="car-meta"><strong>Dealer:</strong> ${safeText(car.dealer)}</div>
            <div class="car-meta"><strong>Phone:</strong> ${safeText(car.phone)}</div>

            <div class="car-buttons">
              <a href="details.html?id=${car.id}" class="details-btn">View Details</a>
              <a href="tel:${phoneCleanCar}" class="call-btn">📞 Call Dealer</a>
              <a href="${whatsappCar}" target="_blank" class="wa-btn">💬 WhatsApp Dealer</a>
            </div>
          `;
          container.appendChild(div);
        });

      } catch (err) {
        console.log("Dealer page error:", err);
        setStatus("Something went wrong loading the dealer page.");
      }
    }

    loadDealerPage();
  </script>

</body>
</html>
