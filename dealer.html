<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dealer Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #e5e7eb;
      color: #111827;
    }

    .hero {
      background: #2f55c7;
      color: white;
      padding: 20px;
    }

    .hero h1 {
      margin: 0;
      font-size: 26px;
    }

    .container {
      padding: 14px;
    }

    .profile-card {
      background: #fff;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 16px;
      font-size: 14px;
    }

    .profile-title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .btn {
      display: inline-block;
      background: #111827;
      color: white;
      text-decoration: none;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      margin-top: 8px;
      margin-right: 6px;
    }

    .status {
      font-size: 14px;
      margin-bottom: 10px;
    }

    .car-card {
      background: #fff;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 16px;
    }

    .car-card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .car-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .year-badge {
      display: inline-block;
      background: #dbeafe;
      color: #1d4ed8;
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 20px;
      margin-bottom: 6px;
    }

    .car-price {
      color: #c53030;
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .car-meta {
      font-size: 13px;
      margin-bottom: 4px;
    }

    .car-buttons a {
      display: block;
      text-align: center;
      text-decoration: none;
      color: white;
      font-size: 14px;
      padding: 10px;
      border-radius: 8px;
      margin-top: 6px;
    }

    .details-btn { background: #0f172a; }
    .call-btn { background: #3f5cc9; }
    .wa-btn { background: #66cc6a; }
  </style>
</head>
<body>

  <div class="hero">
    <h1 id="dealerNameHero">Dealer Profile</h1>
  </div>

  <div class="container">
    <div id="status" class="status">Loading dealer profile...</div>

    <div id="profileCard" class="profile-card" style="display:none;">
      <div id="dealerName" class="profile-title"></div>
      <div class="car-meta"><strong>Phone:</strong> <span id="dealerPhone"></span></div>

      <a href="index.html" class="btn">← Back</a>
      <a id="dealerWhatsApp" href="#" target="_blank" class="btn" style="background:#66cc6a;">WhatsApp</a>
    </div>

    <h3>Dealer Vehicles</h3>
    <div id="cars"></div>
  </div>

  <script>
    const supabaseUrl = "https://ddmvzypiccryjndcwlre.supabase.co";
    const supabaseKey = "sb_publishable_D7saHOTE_JhSlMnSgBnIhQ_mOAOUD9s";

    function getDealerNameFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get("dealer");
    }

    function normalisePhone(phone) {
      return String(phone || "").replace(/\s+/g, "");
    }

    function safeText(value) {
      return String(value || "");
    }

    async function loadDealerPage() {
      const dealerName = getDealerNameFromUrl();

      if (!dealerName) {
        document.getElementById("status").textContent = "Dealer not found.";
        return;
      }

      try {
        const response = await fetch(
          supabaseUrl + "/rest/v1/vehicles?select=*&dealer=eq." + encodeURIComponent(dealerName) + "&order=id.desc",
          {
            headers: {
              apikey: supabaseKey,
              Authorization: "Bearer " + supabaseKey
            }
          }
        );

        const cars = await response.json();

        if (!cars.length) {
          document.getElementById("status").textContent = "No vehicles found.";
          return;
        }

        const dealerPhone = cars[0].phone || "";
        const phoneClean = normalisePhone(dealerPhone);

        document.getElementById("dealerNameHero").textContent = dealerName;
        document.getElementById("dealerName").textContent = dealerName;
        document.getElementById("dealerPhone").textContent = dealerPhone;

        document.getElementById("dealerWhatsApp").href =
          "https://wa.me/27" + phoneClean.replace(/^0/, "") + "?text=Hi I'm interested in your vehicles";

        document.getElementById("profileCard").style.display = "block";
        document.getElementById("status").textContent = cars.length + " vehicles found";

        const container = document.getElementById("cars");
        container.innerHTML = "";

        cars.forEach(car => {
          const phoneCleanCar = normalisePhone(car.phone);

          const div = document.createElement("div");
          div.className = "car-card";
          div.innerHTML = `
            <img src="${safeText(car.image)}">
            <div class="car-title">${safeText(car.title)}</div>
            <div class="year-badge">Year: ${safeText(car.year)}</div>
            <div class="car-price">R${safeText(car.price)}</div>
            <div class="car-meta">Mileage: ${safeText(car.mileage)} km</div>
            <div class="car-meta">Location: ${safeText(car.location)}</div>

            <div class="car-buttons">
              <a href="details.html?id=${car.id}" class="details-btn">View Details</a>
              <a href="tel:${phoneCleanCar}" class="call-btn">Call</a>
              <a href="https://wa.me/27${phoneCleanCar.replace(/^0/, "")}" target="_blank" class="wa-btn">WhatsApp</a>
            </div>
          `;
          container.appendChild(div);
        });

      } catch (err) {
        console.log(err);
        document.getElementById("status").textContent = "Error loading dealer.";
      }
    }

    loadDealerPage();
  </script>

</body>
</html>
