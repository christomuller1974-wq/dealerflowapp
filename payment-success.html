<!DOCTYPE html>
<html>
<head>
<title>Payment Success | CarScoutZA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family:Arial,sans-serif;
  background:#eef2f7;
  margin:0;
  padding:20px;
  color:#111827;
}

.receipt{
  max-width:700px;
  margin:40px auto;
  background:white;
  padding:30px;
  border-radius:20px;
  box-shadow:0 8px 24px rgba(0,0,0,0.12);
}

h1{
  color:#16a34a;
}

.line{
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid #e5e7eb;
  padding:12px 0;
  font-weight:700;
}

.btn{
  display:inline-block;
  margin-top:20px;
  padding:14px 18px;
  border:none;
  border-radius:12px;
  background:#2563eb;
  color:white;
  font-weight:900;
  cursor:pointer;
  text-decoration:none;
}

.dark{
  background:#111827;
}

@media print{
  .btn{
    display:none;
  }
}
</style>
</head>

<body>

<div class="receipt">

  <h1>Payment Successful</h1>

  <p>Thank you for your CarScoutZA dealer subscription payment.</p>

  <div class="line">
    <span>Receipt Date</span>
    <span id="receiptDate"></span>
  </div>

  <div class="line">
    <span>Package</span>
    <span>Monthly Dealer Subscription</span>
  </div>

  <div class="line">
    <span>Amount Paid</span>
    <span>R2000.00</span>
  </div>

  <div class="line">
    <span>Status</span>
    <span>Paid</span>
  </div>

  <div class="line">
    <span>Valid For</span>
    <span>30 Days</span>
  </div>

  <button class="btn" onclick="window.print()">
    Download / Print Receipt
  </button>

  <a href="dealer-admin.html" class="btn dark">
    Go to Dashboard
  </a>

</div>

<script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseUrl = "https://ddmvzypiccryjndcwlre.supabase.co";

const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkbXZ6eXBpY2NyeWpuZGN3bHJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NTQ2NzYsImV4cCI6MjA5MTQzMDY3Nn0.mNkODdvX8gllTZeqfr7nllMWfF7ATdj9MY-EKEE3G6w";

const client = window.supabase.createClient(supabaseUrl, supabaseKey);

document.getElementById("receiptDate").textContent =
new Date().toLocaleDateString("en-ZA");

async function activateAfterPayment() {

  const { data, error } = await client.auth.getUser();

  if (error || !data.user) {
    alert("Please log in first so we can activate your dealer account.");
    window.location.href = "login.html";
    return;
  }

  const paidUntil = new Date();
  paidUntil.setDate(paidUntil.getDate() + 30);

  const { error:updateError } = await client
    .from("profiles")
    .update({
      active:true,
      admin_blocked:false,
      paid_until:paidUntil.toISOString(),
      payment_status:"PAID"
    })
    .eq("id", data.user.id);

  if (updateError) {
    alert("Payment received, but activation failed.");
    console.error(updateError);
    return;
  }

}

activateAfterPayment();

</script>
