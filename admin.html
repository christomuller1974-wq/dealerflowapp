<!DOCTYPE html>
<html>
<head>
  <title>DealerFlow Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
    }

    .header {
      background: #2f55c7;
      color: white;
      padding: 20px;
    }

    .header h1 {
      margin: 0 0 8px 0;
    }

    .header p {
      margin: 0;
    }

    .top-actions {
      padding: 20px;
    }

    .top-actions a {
      background: #111827;
      color: white;
      padding: 12px 18px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      display: inline-block;
      margin-right: 10px;
      margin-bottom: 10px;
    }

    .status {
      background: white;
      margin: 0 20px 20px 20px;
      padding: 16px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      font-weight: bold;
    }

    .wrap {
      padding: 0 20px 20px 20px;
    }

    .vehicle-card {
      background: white;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .vehicle-card img {
      width: 100%;
      max-height: 280px;
      object-fit: cover;
      border-radius: 10px;
      margin-bottom: 12px;
      background: #e5e7eb;
    }

    .vehicle-card h3 {
      margin: 0 0 15px 0;
      font-size: 24px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }

    input, textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 15px;
      background: white;
    }

    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 15px;
    }

    button {
      border: none;
      border-radius: 8px;
      padding: 12px 16px;
      font-weight: bold;
      cursor: pointer;
      color: white;
      min-width: 140px;
    }

    .save-btn {
      background: #2f55c7;
    }

    .delete-btn {
      background: #dc2626;
    }

    .refresh-btn {
      background: #16a34a;
    }

    .small {
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>DealerFlow Admin</h1>
    <p>Edit and delete your vehicle listings</p>
  </div>

  <div class="top-actions">
    <a href="index.html">← Back to Website</a>
    <a href="upload6.html">+ Add Vehicle</a>
  </div>

  <div id="status" class="status">Loading vehicles...</div>

  <div class="wrap">
    <div id="vehicleList"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const supabaseUrl = "https://ddmvzypiccryjndcwlre.supabase.co";
    const supabaseKey = "sb_publishable_D7saHOTE_JhSlMnSgBnIhQ_mOAOUD9s";
    const client = window.supabase.createClient(supabaseUrl, supabaseKey);

    function setStatus(message) {
      document.getElementById("status").textContent = message;
    }

    async function loadVehicles() {
      const vehicleList = document.getElementById("vehicleList");
      setStatus("Loading vehicles...");
      vehicleList.innerHTML = "";

      try {
        const { data, error } = await client
          .from("vehicles")
          .select("*")
          .order("id", { ascending: false });

        if (error) {
          console.log(error);
          setStatus("Error loading vehicles.");
          return;
        }

        if (!data || data.length === 0) {
          setStatus("No vehicles found.");
          return;
        }

        setStatus("Vehicles loaded.");

        data.forEach(car => {
          const card = document.createElement("div");
          card.className = "vehicle-card";

          const imageUrl = car.image || "";
          const mileageValue = car.mileage || "";
          const featuredChecked = car.featured ? "checked" : "";

          card.innerHTML = `
            <img src="${imageUrl}" alt="${car.title || ""}">
            <h3>${car.title || "Untitled Vehicle"}</h3>
            <div class="small">Vehicle ID: ${car.id}</div>

            <div class="grid">
              <div>
                <label>Title</label>
                <input type="text" id="title-${car.id}" value="${escapeHtml(car.title || "")}">
              </div>

              <div>
                <label>Price</label>
                <input type="number" id="price-${car.id}" value="${escapeHtml(car.price || "")}">
              </div>

              <div>
                <label>Mileage</label>
                <input type="number" id="mileage-${car.id}" value="${escapeHtml(mileageValue || "")}">
              </div>

              <div>
                <label>Location</label>
                <input type="text" id="location-${car.id}" value="${escapeHtml(car.location || "")}">
              </div>

              <div>
                <label>Dealer</label>
                <input type="text" id="dealer-${car.id}" value="${escapeHtml(car.dealer || "")}">
              </div>

              <div>
                <label>Phone</label>
                <input type="text" id="phone-${car.id}" value="${escapeHtml(car.phone || "")}">
              </div>

              <div>
                <label>Main image URL</label>
                <input type="text" id="image-${car.id}" value="${escapeHtml(car.image || "")}">
              </div>

              <div>
                <label>All images (comma separated)</label>
                <input type="text" id="images-${car.id}" value="${escapeHtml(car.images || "")}">
              </div>

              <div>
                <label>Featured</label>
                <div style="padding-top:10px;">
                  <input type="checkbox" id="featured-${car.id}" ${featuredChecked} style="width:auto; transform:scale(1.3);">
                </div>
              </div>
            </div>

            <div class="buttons">
              <button class="save-btn" onclick="saveVehicle(${car.id})">Save Changes</button>
              <button class="delete-btn" onclick="deleteVehicle(${car.id})">Delete Vehicle</button>
            </div>
          `;

          vehicleList.appendChild(card);
        });

      } catch (e) {
        console.log(e);
        setStatus("Something went wrong loading vehicles.");
      }
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/"/g, "&quot;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    async function saveVehicle(id) {
      const title = document.getElementById(`title-${id}`).value.trim();
      const price = document.getElementById(`price-${id}`).value.trim();
      const mileage = document.getElementById(`mileage-${id}`).value.trim();
      const location = document.getElementById(`location-${id}`).value.trim();
      const dealer = document.getElementById(`dealer-${id}`).value.trim();
      const phone = document.getElementById(`phone-${id}`).value.trim();
      const image = document.getElementById(`image-${id}`).value.trim();
      const images = document.getElementById(`images-${id}`).value.trim();
      const featured = document.getElementById(`featured-${id}`).checked;

      setStatus("Saving vehicle " + id + "...");

      try {
        const { error } = await client
          .from("vehicles")
          .update({
            title: title,
            price: price,
            mileage: mileage,
            location: location,
            dealer: dealer,
            phone: phone,
            image: image,
            images: images,
            featured: featured
          })
          .eq("id", id);

        if (error) {
          console.log(error);
          setStatus("Save failed for vehicle " + id + ".");
          return;
        }

        setStatus("Vehicle " + id + " saved successfully.");
        loadVehicles();
      } catch (e) {
        console.log(e);
        setStatus("Something went wrong saving vehicle " + id + ".");
      }
    }

    async function deleteVehicle(id) {
      const confirmed = confirm("Are you sure you want to delete this vehicle?");
      if (!confirmed) return;

      setStatus("Deleting vehicle " + id + "...");

      try {
        const { error } = await client
          .from("vehicles")
          .delete()
          .eq("id", id);

        if (error) {
          console.log(error);
          setStatus("Delete failed for vehicle " + id + ".");
          return;
        }

        setStatus("Vehicle " + id + " deleted successfully.");
        loadVehicles();
      } catch (e) {
        console.log(e);
        setStatus("Something went wrong deleting vehicle " + id + ".");
      }
    }

    loadVehicles();
  </script>

</body>
</html>
