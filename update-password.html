<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex,nofollow">
<title>Create New Password | CarScoutZA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #e5e7eb;
  color: #111827;
}

.hero {
  background: #3156c7;
  color: white;
  text-align: center;
  padding: 28px 20px;
}

.hero h1 {
  margin: 0 0 8px;
  font-size: 36px;
}

.hero p {
  margin: 0;
}

.container {
  max-width: 520px;
  margin: 65px auto;
  padding: 0 18px;
}

.status {
  background: white;
  padding: 12px 14px;
  margin-bottom: 16px;
  border-radius: 10px;
  font-weight: 700;
}

.card {
  background: white;
  padding: 24px;
  border-radius: 14px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.10);
}

.card h2 {
  margin-top: 0;
}

label {
  display: block;
  font-weight: 700;
  margin-bottom: 7px;
}

input {
  width: 100%;
  padding: 13px;
  border: 1px solid #cbd5e1;
  border-radius: 9px;
  font-size: 16px;
  margin-bottom: 16px;
}

button {
  width: 100%;
  padding: 13px;
  border: none;
  border-radius: 9px;
  background: #3156c7;
  color: white;
  font-size: 15px;
  font-weight: 800;
  cursor: pointer;
}

button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.back-link {
  text-align: center;
  margin-top: 18px;
}

.back-link a {
  color: #3156c7;
  font-weight: 700;
}
</style>
</head>

<body>

<div class="hero">
  <h1>Create New Password</h1>
  <p>Choose a secure password for your dealer account</p>
</div>

<div class="container">

  <div id="status" class="status">
    Checking your secure recovery link...
  </div>

  <div class="card">
    <h2>Set your new password</h2>

    <label for="password">New Password</label>
    <input
      type="password"
      id="password"
      placeholder="Enter a new password"
      disabled
    >

    <label for="confirmPassword">Confirm New Password</label>
    <input
      type="password"
      id="confirmPassword"
      placeholder="Enter the password again"
      disabled
    >

    <button id="updateBtn" onclick="updatePassword()" disabled>
      Save New Password
    </button>

    <div class="back-link">
      <a href="login.html">Back to Dealer Login</a>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl =
  "https://ddmvzypiccryjndcwlre.supabase.co";

const supabaseKey =
  "sb_publishable_D7saHOTE_JhSlMnSgBnIhQ_mOAOUD9s";

const client = window.supabase.createClient(
  supabaseUrl,
  supabaseKey
);

function setStatus(message) {
  document.getElementById("status").textContent = message;
}

function enablePasswordForm() {
  document.getElementById("password").disabled = false;
  document.getElementById("confirmPassword").disabled = false;
  document.getElementById("updateBtn").disabled = false;

  setStatus("Secure recovery link accepted. Enter your new password.");
}

async function checkRecoverySession() {
  const url = new URL(window.location.href);
  const code = url.searchParams.get("code");

  if (code) {
    const { error } = await client.auth.exchangeCodeForSession(code);

    if (error) {
      console.error(error);
      setStatus("This recovery link is invalid or has expired.");
      return;
    }

    enablePasswordForm();
    return;
  }

  const {
    data: { session }
  } = await client.auth.getSession();

  if (session) {
    enablePasswordForm();
    return;
  }

  setTimeout(async () => {
    const {
      data: { session: delayedSession }
    } = await client.auth.getSession();

    if (delayedSession) {
      enablePasswordForm();
    } else {
      setStatus("This recovery link is invalid or has expired.");
    }
  }, 1200);
}

client.auth.onAuthStateChange((event, session) => {
  if (event === "PASSWORD_RECOVERY" && session) {
    enablePasswordForm();
  }
});

async function updatePassword() {
  const password =
    document.getElementById("password").value;

  const confirmPassword =
    document.getElementById("confirmPassword").value;

  if (!password || !confirmPassword) {
    setStatus("Please complete both password fields.");
    return;
  }

  if (password.length < 8) {
    setStatus("Your password must contain at least 8 characters.");
    return;
  }

  if (password !== confirmPassword) {
    setStatus("The two passwords do not match.");
    return;
  }

  const button = document.getElementById("updateBtn");

  button.disabled = true;
  button.textContent = "Saving...";
  setStatus("Saving your new password...");

  const { error } = await client.auth.updateUser({
    password: password
  });

  if (error) {
    console.error(error);
    button.disabled = false;
    button.textContent = "Save New Password";
    setStatus("Could not update the password: " + error.message);
    return;
  }

  await client.auth.signOut();

  setStatus("Password updated successfully. Redirecting to login...");

  setTimeout(() => {
    window.location.href = "login.html";
  }, 1800);
}

checkRecoverySession();
</script>

</body>
</html>
