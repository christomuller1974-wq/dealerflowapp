<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dealer Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #e5e7eb;
      color: #111827;
    }

    .hero {
      background: #2f55c7;
      color: white;
      padding: 24px 20px;
    }

    .hero h1 {
      margin: 0 0 8px 0;
      font-size: 38px;
    }

    .hero p {
      margin: 0;
      font-size: 16px;
    }

    .container {
      max-width: 1300px;
      margin: 0 auto;
      padding: 18px;
    }

    .top-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 14px;
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      text-align: center;
      font-weight: 600;
      font-size: 13px;
      padding: 9px 12px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      color: white;
    }

    .btn-blue { background: #3f5cc9; }
    .btn-green { background: #16a34a; }
    .btn-dark { background: #1f2937; }
    .btn-red { background: #dc2626; }
    .btn-orange { background: #f59e0b; }

    .status {
      background: #ffffff;
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      font-weight: bold;
      font-size: 14px;
    }

    .section-title {
      font-size: 28px;
      margin: 0 0 14px 0;
    }

    .lead-list,
    .vehicle-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }

    .lead-card,
    .vehicle-card {
      background: #ffffff;
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .lead-card h3,
    .vehicle-card h3 {
      margin: 0 0 10px 0;
      font-size: 22px;
      line-height: 1.2;
    }

    .lead-meta,
    .small {
      color: #475569;
      font-size: 14px;
      margin-bottom: 8px;
      line-height: 1.5;
    }

    .lead-message {
      background: #f8fafc;
      border-radius: 10px;
      padding: 12px;
      margin-top: 10px;
      line-height: 1.5;
      white-space: pre-wrap;
      font-size: 14px;
    }

    .card-image-wrap {
      width: 100%;
      height: 220px;
      background: #eef2f7;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
    }

    .card-image {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #eef2f7;
      display: block;
    }

    .year-badge {
      display: inline-block;
      background: #dbeafe;
      color: #1d4ed8;
      font-weight: bold;
      padding: 6px 10px;
      border-radius: 999px;
      margin-bottom: 12px;
      font-size: 12px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .form-grid label {
      font-size: 13px;
      font-weight: bold;
      color: #334155;
      display: block;
      margin-bottom: 4px;
    }

    .form-grid input {
      width: 100%;
      box-sizing: border-box;
      padding: 11px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      background: white;
      font-size: 14px;
    }

    .vehicle-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    @media (min-width: 768px) {
      .vehicle-list {
        grid-template-columns: repeat(2, 1fr);
      }

      .card-image-wrap {
        height: 190px;
      }

      .vehicle-card h3 {
        font-size: 20px;
      }
    }

    @media (min-width: 1100px) {
      .vehicle-list {
        grid-template-columns: repeat(3, 1fr);
      }

      .card-image-wrap {
        height: 180px;
      }

      .vehicle-card h3 {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>

  <div class="hero">
    <h1>Dealer Dashboard</h1>
    <p>Manage your stock and view your leads</p>
  </div>

  <div class="container">
    <div class="top-actions">
      <a href="index.html" class="btn btn-dark">Back to Website</a>
      <a href="upload6.html" class="btn btn-blue">Add Vehicle</a>
      <button type="button" class="btn btn-dark" onclick="logout()">Logout</button>
    </div>

    <div id="status" class="status">Starting dashboard...</div>

    <h2 class="section-title">Your Leads</h2>
    <div id="leadList" class="lead-list">
      <div class="lead-card">Loading leads...</div>
    </div>

    <h2 class="section-title">Your Vehicles</h2>
    <div id="vehicleList" class="vehicle-list">
      <div class="vehicle-card">Loading vehicles...</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseUrl = "https://ddmvzypiccryjndcwlre.supabase.co";
    const supabaseKey = "sb_publishable_D7saHOTE_JhSlMnSgBnIhQ_mOAOUD9s";

    const client = window.supabase.createClient(supabaseUrl, supabaseKey, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true
      }
    });

    let currentUser = null;
    let currentProfile = null;

    function setStatus(message) {
      document.getElementById("status").textContent = message;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function formatDate(dateString) {
      if (!dateString) return "";
      return new Date(dateString).toLocaleString();
    }

    async function logout() {
      await client.auth.signOut();
      window.location.href = "login.html";
    }

    async function loadProfile(userId) {
      setStatus("Loading dealer profile...");

      const { data, error } = await client
        .from("profiles")
        .select("*")
        .eq("id", userId)
        .single();

      console.log("PROFILE RESULT:", data, error);

      if (error || !data) {
        return false;
      }

      currentProfile = data;
      return true;
    }

    async function loadMyLeads() {
      const leadList = document.getElementById("leadList");
      leadList.innerHTML = "";

      const { data, error } = await client
        .from("leads")
        .select("*")
        .eq("dealer_name", currentProfile.dealer_name)
        .order("id", { ascending: false });

      console.log("LEADS RESULT:", data, error);

      if (error) {
        leadList.innerHTML = "<div class='lead-card'>Could not load leads.</div>";
        return;
      }

      if (!data || data.length === 0) {
        leadList.innerHTML = "<div class='lead-card'>No leads yet.</div>";
        return;
      }

      data.forEach(lead => {
        const card = document.createElement("div");
        card.className = "lead-card";

        card.innerHTML = `
          <h3>${escapeHtml(lead.vehicle_title || "Vehicle Enquiry")}</h3>
          <div class="lead-meta"><strong>Buyer:</strong> ${escapeHtml(lead.buyer_name || "")}</div>
          <div class="lead-meta"><strong>Phone:</strong> ${escapeHtml(lead.buyer_phone || "")}</div>
          <div class="lead-meta"><strong>Sent:</strong> ${escapeHtml(formatDate(lead.created_at))}</div>
          <div class="lead-message">${escapeHtml(lead.message || "")}</div>
        `;

        leadList.appendChild(card);
      });
    }

    async function loadMyVehicles() {
      const vehicleList = document.getElementById("vehicleList");
      vehicleList.innerHTML = "";

      const { data, error } = await client
        .from("vehicles")
        .select("*")
        .eq("user_id", currentUser.id)
        .order("id", { ascending: false });

      console.log("VEHICLES RESULT:", data, error);

      if (error) {
        vehicleList.innerHTML = "<div class='vehicle-card'>Could not load vehicles.</div>";
        return;
      }

      if (!data || data.length === 0) {
        vehicleList.innerHTML = "<div class='vehicle-card'>No vehicles yet.</div>";
        return;
      }

      data.forEach(car => {
        const imageUrl = car.image || "";
        const featuredChecked = car.featured ? "checked" : "";

        const card = document.createElement("div");
        card.className = "vehicle-card";

        card.innerHTML = `
          <div class="card-image-wrap">
            <img src="${escapeHtml(imageUrl)}" alt="${escapeHtml(car.title || "")}" class="card-image">
          </div>

          <h3>${escapeHtml(car.title || "Untitled Vehicle")}</h3>
          <div class="year-badge">Year: ${escapeHtml(car.year || "Not set")}</div>
          <div class="small">Vehicle ID: ${car.id}</div>

          <div class="form-grid">
            <div>
              <label>Title</label>
              <input type="text" id="title-${car.id}" value="${escapeHtml(car.title || "")}">
            </div>

            <div>
              <label>Year</label>
              <input type="text" id="year-${car.id}" value="${escapeHtml(car.year || "")}">
            </div>

            <div>
              <label>Price</label>
              <input type="number" id="price-${car.id}" value="${escapeHtml(car.price || "")}">
            </div>

            <div>
              <label>Mileage</label>
              <input type="number" id="mileage-${car.id}" value="${escapeHtml(car.mileage || "")}">
            </div>

            <div>
              <label>Location</label>
              <input type="text" id="location-${car.id}" value="${escapeHtml(car.location || "")}">
            </div>

            <div>
              <label>Dealer</label>
              <input type="text" id="dealer-${car.id}" value="${escapeHtml(car.dealer || "")}">
            </div>

            <div>
              <label>Phone</label>
              <input type="text" id="phone-${car.id}" value="${escapeHtml(car.phone || "")}">
            </div>

            <div>
              <label>Main Image URL</label>
              <input type="text" id="image-${car.id}" value="${escapeHtml(car.image || "")}">
            </div>

            <div>
              <label>All Images (comma separated)</label>
              <input type="text" id="images-${car.id}" value="${escapeHtml(car.images || "")}">
            </div>

            <div>
              <label>
                <input type="checkbox" id="featured-${car.id}" ${featuredChecked} style="width:auto; margin-right:8px;">
                Featured
              </label>
            </div>
          </div>

          <div class="vehicle-buttons">
            <a class="btn btn-orange" href="edit.html?id=${car.id}">Edit</a>
            <button class="btn btn-blue" onclick="saveVehicle(${car.id})">Save Changes</button>
            <button class="btn btn-red" onclick="deleteVehicle(${car.id})">Delete Vehicle</button>
          </div>
        `;

        vehicleList.appendChild(card);
      });
    }

    async function saveVehicle(id) {
      const title = document.getElementById(title-${id}).value.trim();
      const year = document.getElementById(year-${id}).value.trim();
      const price = document.getElementById(price-${id}).value.trim();
      const mileage = document.getElementById(mileage-${id}).value.trim();
      const location = document.getElementById(location-${id}).value.trim();
      const dealer = document.getElementById(dealer-${id}).value.trim();
      const phone = document.getElementById(phone-${id}).value.trim();
      const image = document.getElementById(image-${id}).value.trim();
      const images = document.getElementById(images-${id}).value.trim();
      const featured = document.getElementById(featured-${id}).checked;

      setStatus("Saving vehicle " + id + "...");

      const { error } = await client
        .from("vehicles")
        .update({
          title,
          year,
          price,
          mileage,
          location,
          dealer,
          phone,
          image,
          images,
          featured
        })
        .eq("id", id)
        .eq("user_id", currentUser.id);

      console.log("SAVE RESULT:", error);

      if (error) {
        setStatus("Save failed for vehicle " + id + ".");
        return;
      }

      setStatus("Vehicle " + id + " saved successfully.");
      await loadMyVehicles();
    }

    async function deleteVehicle(id) {
      const confirmed = confirm("Are you sure you want to delete this vehicle?");
      if (!confirmed) return;

      setStatus("Deleting vehicle " + id + "...");

      const { error } = await client
        .from("vehicles")
        .delete()
        .eq("id", id)
        .eq("user_id", currentUser.id);

      console.log("DELETE RESULT:", error);

      if (error) {
        setStatus("Delete failed for vehicle " + id + ".");
        return;
      }

      setStatus("Vehicle " + id + " deleted successfully.");
      await loadMyVehicles();
    }

    async function startDashboard() {
      try {
        setStatus("Checking login...");

        const { data, error } = await client.auth.getUser();
        console.log("USER RESULT:", data, error);

        if (error || !data || !data.user) {
          setStatus("Not logged in. Please log in again.");
          document.getElementById("leadList").innerHTML = "<div class='lead-card'>Please log in first.</div>";
          document.getElementById("vehicleList").innerHTML = "<div class='vehicle-card'>Please log in first.</div>";
          return;
        }

        currentUser = data.user;
        setStatus("User found: " + (currentUser.email || currentUser.id));

        const profileOk = await loadProfile(currentUser.id);

        if (!profileOk) {
          setStatus("Profile not found for this user.");
          document.getElementById("leadList").innerHTML = "<div class='lead-card'>Profile not found.</div>";
          document.getElementById("vehicleList").innerHTML = "<div class='vehicle-card'>Profile not found.</div>";
          return;
        }

        if (!currentProfile.is_active) {
          setStatus("Your account is not active yet. Please contact admin after payment.");
          document.getElementById("leadList").innerHTML = "<div class='lead-card'>Account not active.</div>";
          document.getElementById("vehicleList").innerHTML = "<div class='vehicle-card'>Account not active.</div>";
          return;
        }

        setStatus("Loading leads...");
        await loadMyLeads();

        setStatus("Loading vehicles...");
        await loadMyVehicles();

        setStatus("Dashboard loaded successfully.");
      } catch (err) {
        console.log("DASHBOARD ERROR:", err);
        setStatus("Error loading dashboard.");
        document.getElementById("leadList").innerHTML = "<div class='lead-card'>Error loading leads.</div>";
        document.getElementById("vehicleList").innerHTML = "<div class='vehicle-card'>Error loading vehicles.</div>";
      }
    }

    startDashboard();
  </script>

</body>
</html>
