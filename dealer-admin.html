<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dealer Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #e5e7eb;
      color: #111827;
    }

    .hero {
      background: #2f55c7;
      color: white;
      padding: 24px 20px;
    }

    .hero h1 {
      margin: 0 0 8px 0;
      font-size: 38px;
    }

    .hero p {
      margin: 0;
      font-size: 16px;
    }

    .container {
      max-width: 1300px;
      margin: 0 auto;
      padding: 18px;
    }

    .top-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 14px;
    }

    .btn {
      display: inline-block;
      text-decoration: none;
      text-align: center;
      font-weight: 600;
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      color: white;
    }

    .btn-blue { background: #3f5cc9; }
    .btn-green { background: #16a34a; }
    .btn-dark { background: #1f2937; }
    .btn-red { background: #dc2626; }
    .btn-orange { background: #f59e0b; }

    .status {
      background: #ffffff;
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      font-weight: bold;
      font-size: 14px;
    }

    .section-title {
      font-size: 28px;
      margin: 0 0 14px 0;
    }

    .lead-list,
    .vehicle-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }

    .lead-card,
    .vehicle-card {
      background: #ffffff;
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .vehicle-card:hover,
    .lead-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 6px 16px rgba(0,0,0,0.15);
    }

    .lead-card h3,
    .vehicle-card h3 {
      margin: 0 0 10px 0;
      font-size: 22px;
      line-height: 1.2;
    }

    .meta {
      color: #475569;
      font-size: 14px;
      margin-bottom: 8px;
      line-height: 1.5;
    }

    .message-box {
      background: #f8fafc;
      border-radius: 10px;
      padding: 12px;
      margin-top: 10px;
      line-height: 1.5;
      white-space: pre-wrap;
      font-size: 14px;
    }

    .card-image-wrap {
      width: 100%;
      height: 180px;
      background: #eef2f7;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
      position: relative;
    }

    .card-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #eef2f7;
      display: block;
      border-radius: 12px;
    }

    .featured-ribbon {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #f59e0b;
      color: white;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: bold;
      z-index: 2;
    }

    .year-badge {
      display: inline-block;
      background: #dbeafe;
      color: #1d4ed8;
      font-weight: bold;
      padding: 6px 10px;
      border-radius: 999px;
      margin-bottom: 10px;
      font-size: 12px;
    }

    .price {
      font-size: 18px;
      font-weight: bold;
      color: #dc2626;
      margin-bottom: 8px;
    }

    .vehicle-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .checkbox-row {
      margin-top: 10px;
      margin-bottom: 10px;
      font-size: 14px;
      color: #334155;
      font-weight: bold;
    }

    .checkbox-row input {
      margin-right: 8px;
      transform: scale(1.1);
    }

    @media (min-width: 768px) {
      .vehicle-list {
        grid-template-columns: repeat(2, 1fr);
      }

      .card-image-wrap {
        height: 180px;
      }

      .vehicle-card h3 {
        font-size: 20px;
      }
    }

    @media (min-width: 1100px) {
      .vehicle-list {
        grid-template-columns: repeat(3, 1fr);
      }

      .card-image-wrap {
        height: 170px;
      }

      .vehicle-card h3 {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>

  <div class="hero">
    <h1>Dealer Dashboard</h1>
    <p>Manage your stock and view your leads</p>
  </div>

  <div class="container">
    <div class="top-actions">
      <a href="index.html" class="btn btn-dark">Back to Website</a>
      <a href="upload6.html" class="btn btn-blue">Add Vehicle</a>
      <button type="button" class="btn btn-dark" onclick="logoutUser()">Logout</button>
    </div>

    <div id="status" class="status">Starting dashboard...</div>

    <h2 class="section-title">Your Leads</h2>
    <div id="leadList" class="lead-list">
      <div class="lead-card">Loading leads...</div>
    </div>

    <h2 class="section-title">Your Vehicles</h2>
    <div id="vehicleList" class="vehicle-list">
      <div class="vehicle-card">Loading vehicles...</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseUrl = "https://ddmvzypiccryjndcwlre.supabase.co";
    const supabaseKey = "sb_publishable_D7saHOTE_JhSlMnSgBnIhQ_mOAOUD9s";

    const client = window.supabase.createClient(supabaseUrl, supabaseKey, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true
      }
    });

    let currentUser = null;
    let currentProfile = null;

    function setStatus(message) {
      document.getElementById("status").textContent = message;
      console.log("STATUS:", message);
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function formatDate(dateString) {
      if (!dateString) return "";
      return new Date(dateString).toLocaleString();
    }

    async function logoutUser() {
      await client.auth.signOut();
      window.location.href = "login.html";
    }

    async function loadProfile(userId) {
      setStatus("Loading dealer profile...");

      const { data, error } = await client
        .from("profiles")
        .select("*")
        .eq("id", userId)
        .single();

      if (error || !data) {
        return false;
      }

      currentProfile = data;
      return true;
    }

    async function loadLeads() {
      const leadList = document.getElementById("leadList");
      leadList.innerHTML = "";

      setStatus("Loading leads...");

      const { data, error } = await client
        .from("leads")
        .select("*")
        .eq("dealer_name", currentProfile.dealer_name)
        .order("id", { ascending: false });

      if (error) {
        leadList.innerHTML = "<div class='lead-card'>Could not load leads.</div>";
        return;
      }

      if (!data || data.length === 0) {
        leadList.innerHTML = "<div class='lead-card'>No leads yet.</div>";
        return;
      }

      data.forEach(lead => {
        const card = document.createElement("div");
        card.className = "lead-card";
        card.innerHTML = `
          <h3>${escapeHtml(lead.vehicle_title || "Vehicle Enquiry")}</h3>
          <div class="meta"><strong>Buyer:</strong> ${escapeHtml(lead.buyer_name || "")}</div>
          <div class="meta"><strong>Phone:</strong> ${escapeHtml(lead.buyer_phone || "")}</div>
          <div class="meta"><strong>Sent:</strong> ${escapeHtml(formatDate(lead.created_at))}</div>
          <div class="message-box">${escapeHtml(lead.message || "")}</div>
        `;
        leadList.appendChild(card);
      });
    }

    async function loadVehicles() {
      const vehicleList = document.getElementById("vehicleList");
      vehicleList.innerHTML = "";

      setStatus("Loading vehicles...");

      const { data, error } = await client
        .from("vehicles")
        .select("*")
        .eq("user_id", currentUser.id)
        .order("id", { ascending: false });

      if (error) {
        vehicleList.innerHTML = "<div class='vehicle-card'>Could not load vehicles.</div>";
        return;
      }

      if (!data || data.length === 0) {
        vehicleList.innerHTML = "<div class='vehicle-card'>No vehicles yet.</div>";
        return;
      }

      data.forEach(car => {
        const card = document.createElement("div");
        card.className = "vehicle-card";

        card.innerHTML = `
          <div class="card-image-wrap">
            ${car.featured ? '<div class="featured-ribbon">FEATURED</div>' : ''}
            <img src="${escapeHtml(car.image || "")}" alt="${escapeHtml(car.title || "")}" class="card-image">
          </div>

          <h3>${escapeHtml(car.title || "Untitled Vehicle")}</h3>
          <div class="year-badge">Year: ${escapeHtml(car.year || "Not set")}</div>
          <div class="price">R${escapeHtml(car.price || "")}</div>
          <div class="meta"><strong>Mileage:</strong> ${escapeHtml(car.mileage || "")} km</div>
          <div class="meta"><strong>Location:</strong> ${escapeHtml(car.location || "")}</div>
          <div class="meta"><strong>Phone:</strong> ${escapeHtml(car.phone || "")}</div>

          <div class="checkbox-row">
            <label>
              <input type="checkbox" id="featured-${car.id}" ${car.featured ? "checked" : ""}>
              Mark as Featured
            </label>
          </div>

          <div class="vehicle-buttons">
            <button class="btn btn-green" onclick="saveFeatured(${car.id})">Save Featured</button>
            <a class="btn btn-orange" href="edit.html?id=${car.id}">Edit</a>
            <a class="btn btn-blue" href="details.html?id=${car.id}">View Details</a>
          </div>
        `;

        vehicleList.appendChild(card);
      });
    }

    async function saveFeatured(id) {
      const featured = document.getElementById(featured-${id}).checked;

      setStatus("Saving featured setting...");

      const { error } = await client
        .from("vehicles")
        .update({ featured: featured })
        .eq("id", id)
        .eq("user_id", currentUser.id);

      if (error) {
        console.log(error);
        setStatus("Could not save featured setting.");
        return;
      }

      setStatus("Featured setting saved.");
      await loadVehicles();
    }

    async function startDashboard() {
      try {
        setStatus("Checking login...");

        const { data, error } = await client.auth.getUser();

        if (error || !data || !data.user) {
          setStatus("Not logged in. Please log in again.");
          document.getElementById("leadList").innerHTML = "<div class='lead-card'>Please log in first.</div>";
          document.getElementById("vehicleList").innerHTML = "<div class='vehicle-card'>Please log in first.</div>";
          return;
        }

        currentUser = data.user;
        setStatus("User found: " + (currentUser.email || currentUser.id));

        const profileOk = await loadProfile(currentUser.id);

        if (!profileOk) {
          setStatus("Profile not found for this user.");
          document.getElementById("leadList").innerHTML = "<div class='lead-card'>Profile not found.</div>";
          document.getElementById("vehicleList").innerHTML = "<div class='vehicle-card'>Profile not found.</div>";
          return;
        }

        if (!currentProfile.is_active) {
          setStatus("Your account is not active yet. Please contact admin after payment.");
          document.getElementById("leadList").innerHTML = "<div class='lead-card'>Account not active.</div>";
          document.getElementById("vehicleList").innerHTML = "<div class='vehicle-card'>Account not active.</div>";
          return;
        }

        await loadLeads();
        await loadVehicles();

        setStatus("Dashboard loaded successfully.");
      } catch (err) {
        console.log("DASHBOARD ERROR:", err);
        setStatus("Error loading dashboard.");
        document.getElementById("leadList").innerHTML = "<div class='lead-card'>Error loading leads.</div>";
        document.getElementById("vehicleList").innerHTML = "<div class='vehicle-card'>Error loading vehicles.</div>";
      }
    }

    startDashboard();
  </script>

</body>
</html>
