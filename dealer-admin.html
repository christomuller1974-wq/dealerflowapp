<!DOCTYPE html>
<html>
<head>
  <title>Dealer Admin - DealerFlow</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
    }

    .header {
      background: #2f55c7;
      color: white;
      padding: 20px;
    }

    .header h1 {
      margin: 0 0 8px 0;
    }

    .header p {
      margin: 0;
    }

    .top-actions {
      padding: 20px;
    }

    .top-actions a,
    .top-actions button {
      background: #111827;
      color: white;
      padding: 12px 18px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      display: inline-block;
      margin-right: 10px;
      margin-bottom: 10px;
      border: none;
      cursor: pointer;
      font-size: 14px;
    }

    .status {
      background: white;
      margin: 0 20px 20px 20px;
      padding: 16px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      font-weight: bold;
      line-height: 1.4;
    }

    .wrap {
      padding: 0 20px 20px 20px;
    }

    .vehicle-card {
      background: white;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .vehicle-card img {
      width: 100%;
      max-height: 280px;
      object-fit: cover;
      border-radius: 10px;
      margin-bottom: 12px;
      background: #e5e7eb;
    }

    .vehicle-card h3 {
      margin: 0 0 15px 0;
      font-size: 24px;
    }

    .small {
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 10px;
      line-height: 1.4;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }

    .grid input {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 15px;
      background: white;
      margin-top: 6px;
    }
