<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dealer Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
    }

    .header {
      background: #2f55c7;
      color: white;
      padding: 20px;
    }

    .header h1 {
      margin: 0 0 8px 0;
    }

    .header p {
      margin: 0;
    }

    .top-actions {
      padding: 20px;
    }

    .top-actions a,
    .top-actions button {
      background: #111827;
      color: white;
      padding: 12px 18px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
      display: inline-block;
      margin-right: 10px;
      margin-bottom: 10px;
      border: none;
      cursor: pointer;
      font-size: 14px;
    }

    .status {
      background: white;
      margin: 0 20px 20px 20px;
      padding: 16px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      font-weight: bold;
      line-height: 1.4;
    }

    .section {
      padding: 0 20px 20px 20px;
    }

    .section-title {
      font-size: 24px;
      margin: 0 0 14px 0;
    }

    .lead-card,
    .vehicle-card {
      background: white;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .lead-card h3,
    .vehicle-card h3 {
      margin: 0 0 10px 0;
      font-size: 22px;
    }

    .lead-meta,
    .small {
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 8px;
      line-height: 1.4;
    }

    .lead-message {
      background: #f8fafc;
      border-radius: 10px;
      padding: 12px;
      margin-top: 10px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .vehicle-card img {
      width: 100%;
      max-height: 260px;
      object-fit: cover;
      border-radius: 10px;
      margin-bottom: 12px;
      background: #e5e7eb;
    }

    .year-pill {
      display: inline-block;
      background: #dbeafe;
      color: #1d4ed8;
      font-weight: bold;
      padding: 6px 10px;
      border-radius: 999px;
      margin-bottom: 12px;
      font-size: 13px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }

    .grid input {
      width: 100%;
      box-sizing: border-box;
      padding: 12px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 15px;
      background: white;
      margin-top: 6px;
    }

    .checkbox-row {
      padding-top: 12px;
    }

    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 15px;
    }

    .save-btn,
    .delete-btn,
    .edit-btn {
      border: none;
      border-radius: 8px;
      padding: 12px 16px;
      font-weight: bold;
      cursor: pointer;
      color: white;
      min-width: 140px;
      text-decoration: none;
      text-align: center;
      display: inline-block;
    }

    .save-btn {
      background: #2f55c7;
    }

    .delete-btn {
      background: #dc2626;
    }

    .edit-btn {
      background: #f59e0b;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>Dealer Dashboard</h1>
    <p>Manage your stock and view your leads</p>
  </div>

  <div class="top-actions">
    <a href="index.html">← Back to Website</a>
    <a href="upload6.html">+ Add Vehicle</a>
    <button type="button" onclick="logout()">Logout</button>
  </div>

  <div id="status" class="status">Checking login...</div>

  <div class="section">
    <h2 class="section-title">Your Leads</h2>
    <div id="leadList"></div>
  </div>

  <div class="section">
    <h2 class="section-title">Your Vehicles</h2>
    <div id="vehicleList"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseUrl = "https://ddmvzypiccryjndcwlre.supabase.co";
    const supabaseKey = "sb_publishable_D7saHOTE_JhSlMnSgBnIhQ_mOAOUD9s";

    const client = window.supabase.createClient(supabaseUrl, supabaseKey, {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true
      }
    });

    let currentUser = null;
    let currentProfile = null;

    function setStatus(message) {
      document.getElementById("status").textContent = message;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function formatDate(dateString) {
      if (!dateString) return "";
      const date = new Date(dateString);
      return date.toLocaleString();
    }

    async function logout() {
      await client.auth.signOut();
      window.location.href = "login.html";
    }

    async function loadProfile(userId) {
      const { data, error } = await client
        .from("profiles")
        .select("*")
        .eq("id", userId)
        .single();

      if (error || !data) {
        console.log("profile error:", error);
        return false;
      }

      currentProfile = data;
      return true;
    }

    async function checkUser() {
      try {
        const { data: sessionData, error: sessionError } = await client.auth.getSession();

        if (sessionError) {
          console.log("Session error:", sessionError);
        }

        let session = sessionData?.session || null;

        if (!session || !session.user) {
          const { data: userData, error: userError } = await client.auth.getUser();

          if (userError) {
            console.log("User error:", userError);
          }

          if (!userData || !userData.user) {
            setStatus("Not logged in. Redirecting...");
            setTimeout(() => {
              window.location.href = "login.html";
            }, 1500);
            return;
          }

          currentUser = userData.user;
        } else {
          currentUser = session.user;
        }

        console.log("User loaded:", currentUser);

        const profileOk = await loadProfile(currentUser.id);
        if (!profileOk) {
          setStatus("Dealer profile not found.");
          return;
        }

        setStatus("Welcome " + (currentProfile.dealer_name || currentUser.email));

        await loadMyLeads();
        await loadMyVehicles();

      } catch (err) {
        console.log("checkUser error:", err);
        setStatus("Error loading dashboard.");
      }
    }

    async function loadMyLeads() {
      const leadList = document.getElementById("leadList");
      leadList.innerHTML = "";

      try {
        const { data, error } = await client
          .from("leads")
          .select("*")
          .eq("dealer_name", currentProfile.dealer_name)
          .order("id", { ascending: false });

        if (error) {
          console.log("load leads error:", error);
          leadList.innerHTML = "<div class='lead-card'>Could not load leads.</div>";
          return;
        }

        if (!data || data.length === 0) {
          leadList.innerHTML = "<div class='lead-card'>No leads yet.</div>";
          return;
        }

        data.forEach(lead => {
          const card = document.createElement("div");
          card.className = "lead-card";

          card.innerHTML = `
            <h3>${escapeHtml(lead.vehicle_title || "Vehicle Enquiry")}</h3>
            <div class="lead-meta"><strong>Buyer:</strong> ${escapeHtml(lead.buyer_name || "")}</div>
            <div class="lead-meta"><strong>Phone:</strong> ${escapeHtml(lead.buyer_phone || "")}</div>
            <div class="lead-meta"><strong>Sent:</strong> ${escapeHtml(formatDate(lead.created_at))}</div>
            <div class="lead-message">${escapeHtml(lead.message || "")}</div>
          `;

          leadList.appendChild(card);
        });
      } catch (err) {
        console.log("loadMyLeads catch:", err);
        leadList.innerHTML = "<div class='lead-card'>Something went wrong loading leads.</div>";
      }
    }

    async function loadMyVehicles() {
      const vehicleList = document.getElementById("vehicleList");
      vehicleList.innerHTML = "";

      try {
        const { data, error } = await client
          .from("vehicles")
          .select("*")
          .eq("user_id", currentUser.id)
          .order("id", { ascending: false });

        if (error) {
          console.log("load vehicles error:", error);
          setStatus("Error loading your vehicles.");
          return;
        }

        if (!data || data.length === 0) {
          vehicleList.innerHTML = "<div class='vehicle-card'>No vehicles yet.</div>";
          return;
        }

        data.forEach(car => {
          const imageUrl = car.image || "";
          const yearValue = car.year || "";
          const mileageValue = car.mileage || "";
          const featuredChecked = car.featured ? "checked" : "";

          const card = document.createElement("div");
          card.className = "vehicle-card";

          card.innerHTML = `
            <img src="${escapeHtml(imageUrl)}" alt="${escapeHtml(car.title || "")}">
            <h3>${escapeHtml(car.title || "Untitled Vehicle")}</h3>
            <div class="year-pill">Year: ${escapeHtml(yearValue || "Not set")}</div>
            <div class="small">Vehicle ID: ${car.id}</div>

            <div class="grid">
              <div>
                <label>Title</label>
                <input type="text" id="title-${car.id}" value="${escapeHtml(car.title || "")}">
              </div>

              <div>
                <label>Year</label>
                <input type="text" id="year-${car.id}" value="${escapeHtml(yearValue || "")}">
              </div>

              <div>
                <label>Price</label>
                <input type="number" id="price-${car.id}" value="${escapeHtml(car.price || "")}">
              </div>

              <div>
                <label>Mileage</label>
                <input type="number" id="mileage-${car.id}" value="${escapeHtml(mileageValue || "")}">
              </div>

              <div>
                <label>Location</label>
                <input type="text" id="location-${car.id}" value="${escapeHtml(car.location || "")}">
              </div>

              <div>
                <label>Dealer</label>
                <input type="text" id="dealer-${car.id}" value="${escapeHtml(car.dealer || "")}">
              </div>

              <div>
                <label>Phone</label>
                <input type="text" id="phone-${car.id}" value="${escapeHtml(car.phone || "")}">
              </div>

              <div>
                <label>Main Image URL</label>
                <input type="text" id="image-${car.id}" value="${escapeHtml(car.image || "")}">
              </div>

              <div>
                <label>All Images (comma separated)</label>
                <input type="text" id="images-${car.id}" value="${escapeHtml(car.images || "")}">
              </div>

              <div class="checkbox-row">
                <label>
                  <input type="checkbox" id="featured-${car.id}" ${featuredChecked} style="width:auto; transform:scale(1.2); margin-right:8px;">
                  Featured
                </label>
              </div>
            </div>

            <div class="buttons">
              <a class="edit-btn" href="edit.html?id=${car.id}">Edit</a>
              <button class="save-btn" onclick="saveVehicle(${car.id})">Save Changes</button>
              <button class="delete-btn" onclick="deleteVehicle(${car.id})">Delete Vehicle</button>
            </div>
          `;

          vehicleList.appendChild(card);
        });
      } catch (err) {
        console.log("loadMyVehicles catch:", err);
        setStatus("Something went wrong loading your vehicles.");
      }
    }

    async function saveVehicle(id) {
      const title = document.getElementById(`title-${id}`).value.trim();
      const year = document.getElementById(`year-${id}`).value.trim();
      const price = document.getElementById(`price-${id}`).value.trim();
      const mileage = document.getElementById(`mileage-${id}`).value.trim();
      const location = document.getElementById(`location-${id}`).value.trim();
      const dealer = document.getElementById(`dealer-${id}`).value.trim();
      const phone = document.getElementById(`phone-${id}`).value.trim();
      const image = document.getElementById(`image-${id}`).value.trim();
      const images = document.getElementById(`images-${id}`).value.trim();
      const featured = document.getElementById(`featured-${id}`).checked;

      setStatus("Saving vehicle " + id + "...");

      try {
        const { error } = await client
          .from("vehicles")
          .update({
            title,
            year,
            price,
            mileage,
            location,
            dealer,
            phone,
            image,
            images,
            featured
          })
          .eq("id", id)
          .eq("user_id", currentUser.id);

        if (error) {
          console.log("save error:", error);
          setStatus("Save failed for vehicle " + id + ".");
          return;
        }

        setStatus("Vehicle " + id + " saved successfully.");
        await loadMyVehicles();
      } catch (err) {
        console.log("save catch:", err);
        setStatus("Something went wrong saving vehicle " + id + ".");
      }
    }

    async function deleteVehicle(id) {
      const confirmed = confirm("Are you sure you want to delete this vehicle?");
      if (!confirmed) return;

      setStatus("Deleting vehicle " + id + "...");

      try {
        const { error } = await client
          .from("vehicles")
          .delete()
          .eq("id", id)
          .eq("user_id", currentUser.id);

        if (error) {
          console.log("delete error:", error);
          setStatus("Delete failed for vehicle " + id + ".");
          return;
        }

        setStatus("Vehicle " + id + " deleted successfully.");
        await loadMyVehicles();
      } catch (err) {
        console.log("delete catch:", err);
        setStatus("Something went wrong deleting vehicle " + id + ".");
      }
    }

    checkUser();
  </script>

</body>
</html>
