<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dealer Dashboard</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #f5f7fb;
    }

    .header {
      background: #1d4ed8;
      color: white;
      padding: 20px;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 20px;
    }

    .actions a, .actions button {
      margin-right: 10px;
      padding: 10px 14px;
      background: #111827;
      color: white;
      border: none;
      border-radius: 6px;
      text-decoration: none;
      cursor: pointer;
    }

    .card {
      background: white;
      margin-top: 15px;
      padding: 15px;
      border-radius: 10px;
      display: flex;
      gap: 15px;
      align-items: center;
    }

    .card img {
      width: 120px;
      height: 80px;
      object-fit: cover;
      border-radius: 8px;
    }

    .card h3 {
      margin: 0;
    }

    .buttons button {
      margin-right: 8px;
      padding: 6px 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .edit {
      background: #f59e0b;
      color: white;
    }

    .delete {
      background: #ef4444;
      color: white;
    }
  </style>
</head>
<body>

<div class="header">
  <h2>Dealer Dashboard</h2>
  <p>Manage only your own stock</p>
</div>

<div class="container">

  <div class="actions">
    <a href="index.html">← Back to Website</a>
    <a href="upload6.html">+ Add Vehicle</a>
    <button onclick="logout()">Logout</button>
  </div>

  <h2>Your Vehicles</h2>
  <div id="vehicles"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supabaseUrl = "https://ddmvzypiccryjndcwlre.supabase.co";
const supabaseKey = "sb_publishable_D7saHOTE_JhSlMnSgBnIhQ_mOAOUD9s";

const client = window.supabase.createClient(supabaseUrl, supabaseKey);

let currentUser = null;

async function logout() {
  await client.auth.signOut();
  window.location.href = "login.html";
}

async function loadVehicles() {
  const { data: sessionData } = await client.auth.getSession();

  if (!sessionData.session) {
    window.location.href = "login.html";
    return;
  }

  currentUser = sessionData.session.user;

  const { data, error } = await client
    .from("vehicles")
    .select("*")
    .eq("user_id", currentUser.id);

  const container = document.getElementById("vehicles");
  container.innerHTML = "";

  if (!data || data.length === 0) {
    container.innerHTML = "<p>No vehicles yet.</p>";
    return;
  }

  data.forEach(v => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${v.image}">
      <div>
        <h3>${v.title}</h3>
        <p>${v.price}</p>

        <div class="buttons">
          <button class="edit" onclick="editVehicle('${v.id}')">Edit</button>
          <button class="delete" onclick="deleteVehicle('${v.id}')">Delete</button>
        </div>
      </div>
    `;

    container.appendChild(div);
  });
}

function editVehicle(id) {
  window.location.href = "edit.html?id=" + id;
}

async function deleteVehicle(id) {
  if (!confirm("Delete this vehicle?")) return;

  await client.from("vehicles").delete().eq("id", id);

  alert("Deleted");
  loadVehicles();
}

loadVehicles();
</script>

</body>
</html>
