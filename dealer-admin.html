<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dealer Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
* { box-sizing:border-box; }

body {
  margin:0;
  font-family:Arial, sans-serif;
  background:#eef1f5;
  color:#111827;
}

.hero {
  background:linear-gradient(135deg,#3156c7,#1f3f9e);
  color:white;
  text-align:center;
  padding:38px 18px 30px;
}

.hero h1 {
  margin:0;
  font-size:46px;
  font-weight:900;
}

.hero p {
  margin:10px 0 0;
  font-size:17px;
}

.container {
  max-width:1300px;
  margin:0 auto;
  padding:18px;
}

.top-actions {
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:14px;
}

.top-btn {
  background:#111827;
  color:white;
  text-decoration:none;
  border:none;
  border-radius:12px;
  padding:11px 15px;
  font-size:14px;
  font-weight:900;
  cursor:pointer;
  display:inline-block;
}

.top-btn.blue { background:#3156c7; }
.top-btn.green { background:#16a34a; }

.status {
  background:white;
  border-radius:14px;
  padding:13px 15px;
  margin-bottom:16px;
  font-weight:900;
  box-shadow:0 3px 10px rgba(0,0,0,0.08);
}

.stats {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:14px;
  margin-bottom:18px;
}

.stat-card {
  background:white;
  border-radius:16px;
  padding:16px;
  box-shadow:0 4px 14px rgba(0,0,0,0.09);
}

.stat-card strong {
  font-size:28px;
  display:block;
}

.stat-card span {
  color:#64748b;
  font-weight:800;
}

.section-title {
  font-size:32px;
  font-weight:900;
  margin:18px 0 14px;
}

.vehicle-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(290px,1fr));
  gap:18px;
  align-items:start;
}

.vehicle-card {
  background:white;
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 5px 16px rgba(0,0,0,0.11);
  position:relative;
}

.vehicle-thumb-wrap {
  position:relative;
  height:210px;
  background:#e5e7eb;
  overflow:hidden;
}

.vehicle-thumb {
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

.featured-badge {
  position:absolute;
  top:10px;
  left:10px;
  background:#f59e0b;
  color:white;
  padding:7px 10px;
  border-radius:999px;
  font-size:12px;
  font-weight:900;
}

.vehicle-body {
  padding:14px;
}

.vehicle-title {
  margin:0 0 8px;
  font-size:18px;
  font-weight:900;
  line-height:1.25;
  min-height:46px;
}

.vehicle-meta {
  font-size:14px;
  color:#475569;
  margin-bottom:5px;
}

.click-box {
  background:#f8fafc;
  border:1px solid #e2e8f0;
  border-radius:12px;
  padding:10px;
  margin:10px 0;
}

.click-box div {
  font-size:14px;
  font-weight:800;
  color:#334155;
  margin:4px 0;
}

.price {
  color:#dc2626;
  font-size:20px;
  font-weight:900;
  margin:10px 0;
}

.button-stack {
  display:grid;
  gap:8px;
  margin-top:10px;
}

.btn {
  display:block;
  width:100%;
  text-align:center;
  text-decoration:none;
  color:white;
  padding:11px 12px;
  border-radius:10px;
  font-weight:900;
  font-size:14px;
  border:none;
  cursor:pointer;
}

.btn-blue { background:#3156c7; }
.btn-green { background:#16a34a; }
.btn-red { background:#dc2626; }
.btn-dark { background:#111827; }
.btn-gold { background:#f59e0b; }

.empty-box {
  grid-column:1 / -1;
  background:white;
  border-radius:14px;
  padding:24px;
  text-align:center;
  color:#475569;
  font-weight:900;
}

@media(max-width:700px) {
  .hero h1 { font-size:34px; }
  .section-title { font-size:26px; }
  .vehicle-grid { grid-template-columns:1fr; }
}
</style>
</head>

<body>

<div class="hero">
  <h1>Dealer Dashboard</h1>
  <p>Manage your stock quickly and easily</p>
</div>

<div class="container">
  <div class="top-actions">
    <a href="index.html" class="top-btn">Back to Website</a>
    <a href="upload6.html" class="top-btn blue">Add Vehicle</a>
    <span id="adminBtn"></span>
    <button class="top-btn" onclick="logout()">Logout</button>
  </div>

  <div id="status" class="status">Starting dashboard...</div>

  <div class="stats">
    <div class="stat-card">
      <strong id="totalCars">0</strong>
      <span>Total Vehicles</span>
    </div>
    <div class="stat-card">
      <strong id="featuredCars">0</strong>
      <span>Featured Vehicles</span>
    </div>
    <div class="stat-card">
      <strong id="clickCount">0</strong>
      <span>Total Vehicle Clicks</span>
    </div>
  </div>

  <div class="section-title">Your Vehicles</div>
  <div id="vehicleList" class="vehicle-grid"></div>
</div>

<script>
const supabaseUrl = "https://ddmvzypiccryjndcwlre.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkbXZ6eXBpY2NyeWpuZGN3bHJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NTQ2NzYsImV4cCI6MjA5MTQzMDY3Nn0.mNkODdvX8gllTZeqfr7nllMWfF7ATdj9MY-EKEE3G6w";
const client = window.supabase.createClient(supabaseUrl, supabaseKey);

const MAIN_ADMIN_EMAIL = "autoexcellence@telkomsa.net";

let currentUser = null;
let currentProfile = null;
let vehicles = [];
let clickCounts = {};

function setStatus(message) {
  document.getElementById("status").textContent = message;
  console.log(message);
}

function formatPrice(price) {
  const num = Number(String(price || "").replace(/\D/g, ""));
  if (!num) return "R0";
  return "R" + num.toLocaleString("en-ZA");
}

function getMainImage(vehicle) {
  if (vehicle.image && String(vehicle.image).trim()) return String(vehicle.image).trim();

  if (vehicle.images && String(vehicle.images).trim()) {
    return String(vehicle.images).split(",")[0].trim();
  }

  return "https://via.placeholder.com/400x250?text=No+Image";
}

function updateStats() {
  document.getElementById("totalCars").textContent = vehicles.length;

  document.getElementById("featuredCars").textContent =
    vehicles.filter(v => v.featured === true || v.featured === "true").length;

  let totalClicks = 0;
  Object.keys(clickCounts).forEach(function(id) {
    totalClicks += clickCounts[id].total || 0;
  });

  document.getElementById("clickCount").textContent = totalClicks;
}

async function loadClickCounts() {
  clickCounts = {};

  const { data, error } = await client
    .from("vehicle_clicks")
    .select("*")
    .eq("dealer_user_id", currentUser.id);

  if (error) {
    console.log(error);
    return;
  }

  (data || []).forEach(function(click) {
    const id = String(click.vehicle_id);

    if (!clickCounts[id]) {
      clickCounts[id] = {
        total:0,
        view:0,
        call:0,
        whatsapp:0
      };
    }

    clickCounts[id].total++;

    if (click.click_type === "view") clickCounts[id].view++;
    if (click.click_type === "call") clickCounts[id].call++;
    if (click.click_type === "whatsapp") clickCounts[id].whatsapp++;
  });
}

function showPendingApprovalScreen() {
  document.body.innerHTML = `
    <div class="approval-wrap">
      <div class="approval-card">
        <h2>Account Pending Approval</h2>
        <p>Your dealer account has not been approved yet.</p>
        <p>Please wait for admin approval before loading vehicles.</p>
        <div class="approval-actions">
          <a href="index.html" class="top-btn">Back to Website</a>
          <button class="top-btn" onclick="logout()">Logout</button>
        </div>
      </div>
    </div>
  `;
}

async function requireUser() {
  const { data, error } = await client.auth.getUser();

  if (error || !data.user) {
    window.location.href = "login.html";
    return false;
  }

  currentUser = data.user;
  return true;
}

async function loadProfile() {
  setStatus("Loading your profile...");

  const { data, error } = await client
    .from("profiles")
    .select("*")
    .eq("id", currentUser.id)
    .single();

  if (error || !data) {
    console.log(error);
    setStatus("Could not load your dealer profile.");
    return false;
  }

  currentProfile = data;
  return true;
}

function showAdminButton() {
  const adminHost = document.getElementById("adminBtn");
  if (!adminHost || !currentUser) return;

  const email = (currentUser.email || "").toLowerCase().trim();

  if (email === MAIN_ADMIN_EMAIL.toLowerCase()) {
    adminHost.innerHTML = '<a href="super-admin.html" class="top-btn green">Super Admin</a>';
  } else {
    adminHost.innerHTML = '';
  }
}

async function loadVehicles() {
  if (!currentUser) {
    setStatus("User not ready.");
    return;
  }

  setStatus("Loading your vehicles...");

  await loadClickCounts();

  const { data, error } = await client
    .from("vehicles")
    .select("*")
    .eq("user_id", currentUser.id)
    .order("id", { ascending:false });

  const container = document.getElementById("vehicleList");
  container.innerHTML = "";

  if (error) {
    console.log(error);
    setStatus("Could not load vehicles.");
    container.innerHTML = '<div class="empty-box">Could not load your vehicles.</div>';
    return;
  }

  vehicles = data || [];
  updateStats();

  if (!vehicles.length) {
    setStatus("No vehicles found.");
    container.innerHTML = '<div class="empty-box">You have not added any vehicles yet.</div>';
    return;
  }

  vehicles.forEach(vehicle => {
    const mainImage = getMainImage(vehicle);
    const title = vehicle.title || [vehicle.year, vehicle.make, vehicle.model].filter(Boolean).join(" ") || "Vehicle";
    const isFeatured = vehicle.featured === true || vehicle.featured === "true";
    const counts = clickCounts[String(vehicle.id)] || { total:0, view:0, call:0, whatsapp:0 };

    const card = document.createElement("div");
    card.className = "vehicle-card";

    card.innerHTML = `
      <div class="vehicle-thumb-wrap">
        ${isFeatured ? '<div class="featured-badge">Featured</div>' : ''}
        <img
          src="${mainImage}"
          class="vehicle-thumb"
          alt="${title}"
          onerror="this.src='https://via.placeholder.com/400x250?text=No+Image'"
        >
      </div>

      <div class="vehicle-body">
        <div class="vehicle-title">${title}</div>

        <div class="vehicle-meta">Year: ${vehicle.year || "-"}</div>
        <div class="vehicle-meta">Province: ${vehicle.province || "-"}</div>
        <div class="vehicle-meta">Location: ${vehicle.location || "-"}</div>
        <div class="vehicle-meta">Mileage: ${vehicle.mileage || "-"}</div>

        <div class="price">${formatPrice(vehicle.price)}</div>

        <div class="click-box">
          <div>🔥 Total Clicks: ${counts.total}</div>
          <div>👁️ Views: ${counts.view}</div>
          <div>📞 Calls: ${counts.call}</div>
          <div>💬 WhatsApp: ${counts.whatsapp}</div>
        </div>

        <div class="button-stack">
          <a href="details.html?id=${vehicle.id}" class="btn btn-blue">View</a>
          <a href="edit.html?id=${vehicle.id}" class="btn btn-green">Edit</a>
          <button class="btn btn-gold" onclick="toggleFeatured(${vehicle.id}, ${isFeatured})">
            ${isFeatured ? "Remove Featured" : "Mark Featured"}
          </button>
          <button class="btn btn-red" onclick="deleteVehicle(${vehicle.id})">Delete</button>
        </div>
      </div>
    `;

    container.appendChild(card);
  });

  setStatus("Dashboard loaded successfully.");
}

async function toggleFeatured(vehicleId, currentlyFeatured) {
  setStatus("Updating featured status...");

  const { error } = await client
    .from("vehicles")
    .update({ featured: !currentlyFeatured })
    .eq("id", vehicleId)
    .eq("user_id", currentUser.id);

  if (error) {
    console.log(error);
    setStatus("Could not update featured status.");
    return;
  }

  loadVehicles();
}

async function deleteVehicle(vehicleId) {
  const confirmed = confirm("Delete this vehicle?");
  if (!confirmed) return;

  setStatus("Deleting vehicle...");

  const { error } = await client
    .from("vehicles")
    .delete()
    .eq("id", vehicleId)
    .eq("user_id", currentUser.id);

  if (error) {
    console.log(error);
    setStatus("Could not delete vehicle.");
    return;
  }

  setStatus("Vehicle deleted successfully.");
  loadVehicles();
}

async function logout() {
  await client.auth.signOut();
  window.location.href = "login.html";
}

async function startDashboard() {
  const okUser = await requireUser();
  if (!okUser) return;

  const okProfile = await loadProfile();
  if (!okProfile) return;

  showAdminButton();

  if (!currentProfile.is_active) {
    showPendingApprovalScreen();
    return;
  }

  await loadVehicles();
}

startDashboard();
</script>
</body>
</html>
