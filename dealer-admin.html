<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dealer Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #dfe3ea;
      color: #111827;
    }

    .hero {
      background: linear-gradient(135deg, #3156c7, #1f3f9e);
      color: white;
      text-align: center;
      padding: 36px 18px 28px;
    }

    .hero h1 {
      margin: 0;
      font-size: 48px;
      font-weight: 800;
    }

    .hero p {
      margin: 10px 0 0;
      font-size: 18px;
    }

    .container {
      max-width: 1300px;
      margin: 0 auto;
      padding: 18px;
    }

    .vehicle-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 18px;
    }

    .vehicle-card {
      background: white;
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.10);
    }

    .vehicle-thumb {
      width: 100%;
      height: 210px;
      object-fit: cover;
      border-radius: 12px;
      background: #e5e7eb;
      display: block;
    }

    .vehicle-title {
      margin: 12px 0 8px;
      font-size: 18px;
      font-weight: 800;
      line-height: 1.25;
      min-height: 46px;
    }

    .price {
      color: #111827;
      font-size: 18px;
      font-weight: 800;
      margin: 8px 0 10px;
    }

    .button-stack {
      display: grid;
      gap: 8px;
      margin-top: 8px;
    }

    .btn {
      display: block;
      width: 100%;
      text-align: center;
      text-decoration: none;
      color: white;
      padding: 11px 12px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 14px;
      border: none;
      cursor: pointer;
    }

    .btn-blue {
      background: #3156c7;
    }

    .btn-green {
      background: #16a34a;
    }

    .btn-red {
      background: #dc2626;
    }
  </style>
</head>
<body>

  <div class="hero">
    <h1>Dealer Dashboard</h1>
    <p>Manage your vehicles</p>
  </div>

  <div class="container">
    <div id="vehicleList" class="vehicle-grid"></div>
  </div>

  <script>
    const supabaseUrl = "https://ddmvzypiccryjndcwlre.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRkbXZ6eXBpY2NyeWpuZGN3bHJlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4NTQ2NzYsImV4cCI6MjA5MTQzMDY3Nn0.mNkODdvX8gllTZeqfr7nllMWfF7ATdj9MY-EKEE3G6w";

    function getMainImage(vehicle) {
      if (vehicle.image && typeof vehicle.image === "string" && vehicle.image.trim() !== "") {
        return vehicle.image.trim();
      }

      if (vehicle.images && typeof vehicle.images === "string" && vehicle.images.trim() !== "") {
        return vehicle.images.split(",")[0].trim();
      }

      return "https://via.placeholder.com/400x250?text=No+Image";
    }

    async function loadVehicles() {
      const res = await fetch(
        supabaseUrl + "/rest/v1/vehicles?select=*&order=id.desc",
        {
          headers: {
            apikey: supabaseKey,
            Authorization: "Bearer " + supabaseKey
          }
        }
      );

      const vehicles = await res.json();
      const container = document.getElementById("vehicleList");
      container.innerHTML = "";

      vehicles.forEach(v => {
        const mainImage = getMainImage(v);
        const card = document.createElement("div");
        card.className = "vehicle-card";

        card.innerHTML = `
          <img
            src="${mainImage}"
            class="vehicle-thumb"
            alt="${v.title || "Vehicle"}"
            onerror="this.src='https://via.placeholder.com/400x250?text=No+Image'"
          >

          <div class="vehicle-title">${v.title || "No Title"}</div>
          <div class="price">R${v.price || 0}</div>

          <div class="button-stack">
            <a href="details.html?id=${v.id}" class="btn btn-blue">View</a>
            <a href="edit.html?id=${v.id}" class="btn btn-green">Edit</a>
            <button class="btn btn-red" onclick="deleteVehicle(${v.id})">Delete</button>
          </div>
        `;

        container.appendChild(card);
      });
    }

    async function deleteVehicle(id) {
      if (!confirm("Delete this vehicle?")) return;

      await fetch(
        supabaseUrl + "/rest/v1/vehicles?id=eq." + id,
        {
          method: "DELETE",
          headers: {
            apikey: supabaseKey,
            Authorization: "Bearer " + supabaseKey
          }
        }
      );

      loadVehicles();
    }

    loadVehicles();
  </script>

</body>
</html>
