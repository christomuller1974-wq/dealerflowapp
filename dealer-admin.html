<!DOCTYPE html>
<html>
<head>
  <title>Dealer Dashboard</title>
</head>

<body style="font-family: Arial; padding: 20px;">

<h1>Dealer Dashboard</h1>
<p id="user">Checking login...</p>

<a href="index.html">← Back to Website</a>
<button onclick="logout()">Logout</button>

<hr>

<h2>Your Vehicles</h2>
<div id="vehicles"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>
const supabaseUrl = "https://ddmvzypiccryjndcwlre.supabase.co";
const supabaseKey = "YOUR_KEY_HERE";
const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

// ✅ LOAD USER SESSION
async function loadUser() {
  const { data: { session } } = await supabase.auth.getSession();

  if (!session) {
    document.getElementById("user").innerText = "Not logged in";
    return;
  }

  const user = session.user;
  document.getElementById("user").innerText = "Logged in as: " + user.email;

  loadVehicles(user.id);
}

// ✅ LOAD ONLY USER VEHICLES
async function loadVehicles(userId) {
  const { data, error } = await supabase
    .from("vehicles")
    .select("*")
    .eq("user_id", userId);

  const container = document.getElementById("vehicles");
  container.innerHTML = "";

  if (!data || data.length === 0) {
    container.innerHTML = "<p>No vehicles found.</p>";
    return;
  }

  data.forEach(car => {
    container.innerHTML += `
      <div style="border:1px solid #ccc; padding:10px; margin-bottom:10px;">
        <h3>${car.title}</h3>
        <p>Price: R${car.price}</p>
        <p>Mileage: ${car.mileage} km</p>

        <button onclick="deleteVehicle(${car.id})">Delete</button>
      </div>
    `;
  });
}

// ✅ DELETE VEHICLE
async function deleteVehicle(id) {
  if (!confirm("Delete this vehicle?")) return;

  await supabase.from("vehicles").delete().eq("id", id);
  location.reload();
}

// ✅ LOGOUT
async function logout() {
  await supabase.auth.signOut();
  window.location.href = "login.html";
}

// 🚀 RUN
loadUser();
</script>

</body>
</html>
