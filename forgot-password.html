<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex,nofollow">
<title>Forgot Password | CarScoutZA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #e5e7eb;
  color: #111827;
}

.hero {
  background: #3156c7;
  color: white;
  text-align: center;
  padding: 28px 20px;
}

.hero h1 {
  margin: 0 0 8px;
  font-size: 36px;
}

.hero p {
  margin: 0;
}

.container {
  max-width: 520px;
  margin: 65px auto;
  padding: 0 18px;
}

.card {
  background: white;
  padding: 24px;
  border-radius: 14px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.10);
}

.card h2 {
  margin-top: 0;
}

.status {
  background: white;
  padding: 12px 14px;
  margin-bottom: 16px;
  border-radius: 10px;
  font-weight: 700;
}

label {
  display: block;
  font-weight: 700;
  margin-bottom: 7px;
}

input {
  width: 100%;
  padding: 13px;
  border: 1px solid #cbd5e1;
  border-radius: 9px;
  font-size: 16px;
  margin-bottom: 16px;
}

button {
  width: 100%;
  padding: 13px;
  border: none;
  border-radius: 9px;
  background: #3156c7;
  color: white;
  font-size: 15px;
  font-weight: 800;
  cursor: pointer;
}

.back-link {
  text-align: center;
  margin-top: 18px;
}

.back-link a {
  color: #3156c7;
  font-weight: 700;
}
</style>
</head>

<body>

<div class="hero">
  <h1>Forgot Password</h1>
  <p>Request a secure password reset email</p>
</div>

<div class="container">

  <div id="status" class="status">
    Enter your registered dealer email address.
  </div>

  <div class="card">
    <h2>Reset your password</h2>

    <label for="email">Email Address</label>
    <input
      type="email"
      id="email"
      placeholder="Enter your registered email"
    >

    <button id="resetBtn" onclick="sendResetEmail()">
      Send Password Reset Email
    </button>

    <div class="back-link">
      <a href="login.html">Back to Dealer Login</a>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseUrl =
  "https://ddmvzypiccryjndcwlre.supabase.co";

const supabaseKey =
  "sb_publishable_D7saHOTE_JhSlMnSgBnIhQ_mOAOUD9s";

const client = window.supabase.createClient(
  supabaseUrl,
  supabaseKey
);

function setStatus(message) {
  document.getElementById("status").textContent = message;
}

async function sendResetEmail() {
  const email =
    document.getElementById("email").value.toLowerCase().trim();

  if (!email) {
    setStatus("Please enter your email address.");
    return;
  }

  const button = document.getElementById("resetBtn");

  button.disabled = true;
  button.textContent = "Sending...";
  setStatus("Sending password reset email...");

  const { error } = await client.auth.resetPasswordForEmail(
    email,
    {
      redirectTo:
        "https://carscoutza.com/update-password.html"
    }
  );

  button.disabled = false;
  button.textContent = "Send Password Reset Email";

  if (error) {
    console.error(error);
    setStatus("Could not send the password reset email: " + error.message);
    return;
  }

  setStatus(
    "Password reset email sent. Please check your inbox and spam folder."
  );
}
</script>

</body>
</html>
